<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MEI Drive Africa</title>
    
    <!-- Load Supabase library first -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Load singleton Supabase instance (same as main app) -->
    <script src="supabase.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1a1f3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .reset-container {
            background: #1a1f3a;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .reset-container h2 {
            color: #00ff88;
            margin-bottom: 20px;
        }
        .reset-container p {
            color: #a0a0c0;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #00ff88;
            border-radius: 8px;
            background: #0a0e27;
            color: white;
        }
        input:focus {
            outline: none;
            border-color: #00ff88;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00ff88;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: #0a0e27;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }
        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        .success {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        a {
            display: block;
            margin-top: 20px;
            color: #00ff88;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h2>Reset Password</h2>
        <p>Enter your email to receive a password reset link.</p>
        <input type="email" id="email" placeholder="Email address">
        <button onclick="resetPassword()">Send Reset Link</button>
        <div id="message" class="message"></div>
        <a href="/">← Back to Login</a>
    </div>

    <script>
        // Get the existing Supabase instance (NO new initialization!)
        let supabase;
        
        // Wait for supabase to be ready from supabase.js
        if (window._supabaseInstance) {
            supabase = window._supabaseInstance;
            console.log('✅ Reset page: Using existing Supabase instance');
        } else if (window.getSupabase) {
            supabase = window.getSupabase();
            console.log('✅ Reset page: Using getSupabase()');
        } else if (window.supabase) {
            supabase = window.supabase;
            console.log('✅ Reset page: Using window.supabase');
        } else {
            console.error('❌ Supabase not initialized!');
            // Fallback - but this should not happen
            alert('System initializing. Please refresh the page.');
        }
        
        window.resetPassword = async () => {
            if (!supabase) {
                const messageDiv = document.getElementById('message');
                messageDiv.textContent = 'System error. Please refresh the page.';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');
            
            if (!email) {
                messageDiv.textContent = 'Please enter your email';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, { 
                    redirectTo: `${window.location.origin}/update-password.html` 
                });
                
                if (error) throw error;
                
                messageDiv.textContent = 'Password reset email sent! Check your inbox.';
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                
                // Clear email field
                document.getElementById('email').value = '';
            } catch (error) {
                messageDiv.textContent = error.message;
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        };
        
        // Handle Enter key press
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                window.resetPassword();
            }
        });
    </script>
</body>
</html>
