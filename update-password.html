<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password - MEI Drive Africa</title>
    
    <!-- ✅ ONLY these two scripts - NO createClient()! -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1a1f3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .update-container {
            background: #1a1f3a;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .update-container h2 {
            color: #00ff88;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #00ff88;
            border-radius: 8px;
            background: #0a0e27;
            color: white;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #00ff88;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00ff88;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: #0a0e27;
            font-size: 16px;
            margin-top: 10px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }
        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        .success {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid #00ff88;
        }
        a {
            display: block;
            margin-top: 20px;
            color: #00ff88;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="update-container">
        <h2>Create New Password</h2>
        <input type="password" id="password" placeholder="New password">
        <input type="password" id="confirmPassword" placeholder="Confirm new password">
        <button id="updateBtn">Update Password</button>
        <div id="message" class="message"></div>
        <a href="/">← Back to Login</a>
    </div>

    <script>
        // Get existing Supabase instance from supabase.js (NO createClient!)
        const supabase = window._supabase || window.getSupabase?.() || window.supabase;
        
        if (!supabase) {
            console.error('❌ Supabase not loaded');
            document.getElementById('message').textContent = 'System error. Please refresh.';
            document.getElementById('message').className = 'message error';
            document.getElementById('message').style.display = 'block';
        }
        
        async function updatePassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.style.display = 'none';
            
            if (!password || !confirmPassword) {
                messageDiv.textContent = 'Please fill in both fields';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                messageDiv.textContent = 'Passwords do not match';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.textContent = 'Password must be at least 6 characters';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            try {
                const { error } = await supabase.auth.updateUser({ password });
                
                if (error) throw error;
                
                messageDiv.textContent = 'Password updated successfully! Redirecting to login...';
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } catch (error) {
                messageDiv.textContent = error.message;
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
            }
        }
        
        // Handle Enter key
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updatePassword();
        });
        document.getElementById('confirmPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') updatePassword();
        });
        
        document.getElementById('updateBtn').addEventListener('click', updatePassword);
    </script>
</body>
</html>
