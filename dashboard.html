<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Dashboard | MEI DRIVE AFRICA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #FFFFFF;
            --soft-gray: #B7C4D6;
            --error: #ff4444;
            --warning: #ff9800;
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
        }
        
        .loading-spinner {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; display: none;
            justify-content: center; align-items: center;
        }
        .loading-spinner.active { display: flex; }
        .spinner {
            width: 50px; height: 50px; border: 3px solid var(--dark-navy);
            border-top-color: var(--neon-green); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast {
            position: fixed; bottom: 30px; right: 30px; z-index: 10000;
            background: var(--dark-navy); padding: 14px 24px; border-radius: 12px;
            transform: translateX(400px); transition: transform 0.3s;
            border-left: 4px solid var(--neon-green);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .toast.error { border-left-color: var(--error); }
        .toast.show { transform: translateX(0); }
        
        .navbar {
            background: var(--dark-navy);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0,255,136,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-green);
            cursor: pointer;
        }
        .logo span { color: var(--white); }
        .user-greeting {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--neon-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark-navy);
            font-weight: bold;
        }
        .logout-btn {
            background: rgba(255,68,68,0.2);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .logout-btn:hover { background: var(--error); color: var(--white); }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .welcome-section {
            background: linear-gradient(135deg, var(--dark-navy), var(--secondary-dark));
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,255,136,0.2);
        }
        .welcome-section h1 {
            color: var(--neon-green);
            margin-bottom: 0.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .stat-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--neon-green);
        }
        
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }
        .tab {
            background: none;
            border: none;
            color: var(--soft-gray);
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
        }
        .tab.active {
            color: var(--neon-green);
            border-bottom: 2px solid var(--neon-green);
        }
        
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .course-card {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(0,255,136,0.15);
            transition: var(--transition);
        }
        .course-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-green);
        }
        .course-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .course-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 0.75rem;
        }
        .badge-free { background: var(--warning); color: var(--dark-navy); }
        .badge-premium { background: var(--neon-green); color: var(--dark-navy); }
        .badge-enrolled { background: #00FF88; color: var(--dark-navy); }
        
        .course-title { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .course-description {
            color: var(--soft-gray);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        .course-progress { margin: 1rem 0; }
        .progress-bar-bg {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: var(--neon-green);
            height: 100%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.75rem;
            color: var(--soft-gray);
            margin-top: 0.25rem;
            text-align: center;
        }
        
        .btn-enroll, .btn-continue {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-top: 0.5rem;
        }
        .btn-enroll {
            background: var(--neon-green);
            color: var(--dark-navy);
        }
        .btn-enroll:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,136,0.3); }
        .btn-continue {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
        }
        .btn-continue:hover { background: var(--neon-green); color: var(--dark-navy); }
        
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--dark-navy);
            border-radius: 20px;
            grid-column: 1 / -1;
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .courses-grid { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>

<div id="loadingSpinner" class="loading-spinner"><div class="spinner"></div></div>
<div id="toast" class="toast"></div>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="location.href='/'">MEI DRIVE <span>AFRICA</span></div>
        <div class="user-greeting">
            <div class="user-avatar" id="userAvatar">👤</div>
            <span id="userName">Loading...</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="welcome-section">
        <h1>Welcome back, <span id="welcomeName">Learner</span>! 🎉</h1>
        <p>Continue your driving journey. Track progress and enroll in new courses.</p>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalCourses">0</div><div>Available Courses</div></div>
            <div class="stat-card"><div class="stat-number" id="enrolledCount">0</div><div>Enrolled Courses</div></div>
            <div class="stat-card"><div class="stat-number" id="completedCount">0</div><div>Completed</div></div>
            <div class="stat-card"><div class="stat-number" id="overallProgress">0%</div><div>Overall Progress</div></div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="all">📚 All Courses</button>
        <button class="tab" data-tab="enrolled">✅ My Courses</button>
    </div>

    <div id="coursesContainer" class="courses-grid">
        <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i><h3>Loading courses...</h3></div>
    </div>
</div>

<script>
    // Supabase config
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // COURSES DATA - Hardcoded to ensure display
    const COURSES = [
        { id: 1, name: 'Learner Hub - Complete Driver Training', description: 'NTSA-approved curriculum from basics to road readiness. Covers traffic rules, vehicle controls, defensive driving, and complete exam preparation.', price: 0, type: 'free', icon: '📚', file: 'learner-hub.html' },
        { id: 2, name: 'Boda Boda Professional Course', description: 'Professional motorcycle taxi training including safety, customer service, road regulations, and defensive riding techniques.', price: 0, type: 'free', icon: '🏍️', file: 'boda-course.html' },
        { id: 3, name: 'Defensive Driving Course', description: 'Master advanced driving techniques, hazard perception, emergency maneuvers, and accident avoidance strategies.', price: 1999, type: 'premium', icon: '🛡️', file: 'defensive-driving-course.html' },
        { id: 4, name: 'Professional Driver Course', description: 'Comprehensive training for PSV, logistics, and commercial drivers including customer care and regulations.', price: 4999, type: 'premium', icon: '🚛', file: 'professional-driver-course.html' },
        { id: 5, name: 'Electric Vehicle Course', description: 'Master EV technology, charging systems, battery maintenance, and safety procedures for electric vehicles.', price: 2999, type: 'premium', icon: '⚡', file: 'ev-course-dynamic.html' },
        { id: 6, name: 'School Transport Safety', description: 'Specialized certification for school bus drivers including child safety protocols, emergency procedures, and regulations.', price: 1999, type: 'premium', icon: '🚸', file: 'school-transport-course.html' },
        { id: 7, name: 'E-Safety Library', description: 'Digital safety for drivers - online records management, apps, cybersecurity awareness, and digital compliance.', price: 0, type: 'free', icon: '💻', file: 'e-safety-library.html' },
        { id: 8, name: 'Quiz Bank - Exam Preparation', description: '1000+ NTSA practice questions to prepare for your driving theory test with detailed explanations.', price: 0, type: 'free', icon: '📝', file: 'quiz-bank.html' }
    ];
    
    let currentUser = null;
    let userEnrollments = new Map();
    let currentTab = 'all';
    
    function showToast(msg, isErr = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${isErr ? 'error' : ''}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    function setLoading(loading) {
        document.getElementById('loadingSpinner').classList.toggle('active', loading);
    }
    
    // Auth check
    async function checkAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.href = '/login.html';
            return false;
        }
        currentUser = session.user;
        let name = currentUser.email.split('@')[0];
        document.getElementById('userName').textContent = name;
        document.getElementById('welcomeName').textContent = name;
        document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
        return true;
    }
    
    // Load enrollments
    async function loadEnrollments() {
        try {
            const { data } = await supabase
                .from('enrollments')
                .select('course_id, progress')
                .eq('user_id', currentUser.id);
            
            if (data) {
                data.forEach(e => {
                    userEnrollments.set(e.course_id, { enrolled: true, progress: e.progress || 0 });
                });
            }
            updateStats();
        } catch (err) {
            console.log('No enrollments table yet');
        }
    }
    
    // Enroll in course
    async function enrollInCourse(courseId, courseName) {
        if (!currentUser) {
            showToast('Please login first', true);
            return;
        }
        
        if (userEnrollments.has(courseId)) {
            showToast('Already enrolled!');
            return;
        }
        
        setLoading(true);
        try {
            const { error } = await supabase
                .from('enrollments')
                .insert([{
                    user_id: currentUser.id,
                    course_id: courseId,
                    status: 'active',
                    progress: 0,
                    enrolled_at: new Date()
                }]);
            
            if (error) throw error;
            
            userEnrollments.set(courseId, { enrolled: true, progress: 0 });
            updateStats();
            renderCourses();
            showToast(`✅ Enrolled in ${courseName}!`);
        } catch (err) {
            showToast('Enrollment failed', true);
        } finally {
            setLoading(false);
        }
    }
    
    // Open course
    function openCourse(course) {
        localStorage.setItem('currentCourse', JSON.stringify(course));
        window.location.href = `/${course.file}`;
    }
    
    // Update stats
    function updateStats() {
        document.getElementById('totalCourses').textContent = COURSES.length;
        document.getElementById('enrolledCount').textContent = userEnrollments.size;
        const completed = Array.from(userEnrollments.values()).filter(e => e.progress === 100).length;
        document.getElementById('completedCount').textContent = completed;
        const avgProgress = userEnrollments.size > 0 
            ? Math.round(Array.from(userEnrollments.values()).reduce((s, e) => s + e.progress, 0) / userEnrollments.size)
            : 0;
        document.getElementById('overallProgress').textContent = `${avgProgress}%`;
    }
    
    // Render courses
    function renderCourses() {
        const container = document.getElementById('coursesContainer');
        
        let filtered = currentTab === 'enrolled' 
            ? COURSES.filter(c => userEnrollments.has(c.id))
            : COURSES;
        
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-book-open"></i><h3>No enrolled courses yet</h3><p>Browse "All Courses" to get started!</p></div>`;
            return;
        }
        
        container.innerHTML = filtered.map(course => {
            const isEnrolled = userEnrollments.has(course.id);
            const progress = userEnrollments.get(course.id)?.progress || 0;
            const isFree = course.type === 'free' || course.price === 0;
            
            return `
                <div class="course-card">
                    <div class="course-icon">${course.icon}</div>
                    <div class="course-badge ${isEnrolled ? 'badge-enrolled' : (isFree ? 'badge-free' : 'badge-premium')}">
                        ${isEnrolled ? '✅ ENROLLED' : (isFree ? 'FREE' : 'PREMIUM')}
                    </div>
                    <h3 class="course-title">${course.name}</h3>
                    <p class="course-description">${course.description.substring(0, 120)}...</p>
                    ${isEnrolled ? `
                        <div class="course-progress">
                            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${progress}%"></div></div>
                            <div class="progress-text">${progress}% Complete</div>
                        </div>
                        <button class="btn-continue" onclick="openCourse(${JSON.stringify(course).replace(/"/g, '&quot;')})">
                            ${progress === 100 ? '📋 Review Course' : '▶️ Continue Learning'}
                        </button>
                    ` : `
                        <div style="margin:0.5rem 0; font-weight:bold; color:${isFree ? '#00FF88' : '#ff9800'}">${isFree ? 'FREE' : `KES ${course.price.toLocaleString()}`}</div>
                        <button class="btn-enroll" onclick="enrollInCourse(${course.id}, '${course.name}')">🎓 Enroll Now</button>
                    `}
                </div>
            `;
        }).join('');
    }
    
    // Initialize
    async function init() {
        if (!await checkAuth()) return;
        await loadEnrollments();
        renderCourses();
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                renderCourses();
            });
        });
    }
    
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = '/';
    });
    
    window.openCourse = openCourse;
    window.enrollInCourse = enrollInCourse;
    
    init();
</script>
</body>
</html>
