<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard | MEI DRIVE AFRICA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #FFFFFF;
            --soft-gray: #B7C4D6;
            --error: #ff4444;
            --success: #00FF88;
            --warning: #ff9800;
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
            overflow-x: hidden;
        }
        
        .loading-spinner {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; display: none;
            justify-content: center; align-items: center;
        }
        .loading-spinner.active { display: flex; }
        .spinner {
            width: 50px; height: 50px; border: 3px solid var(--dark-navy);
            border-top-color: var(--neon-green); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast {
            position: fixed; bottom: 30px; right: 30px; z-index: 10000;
            background: var(--dark-navy); padding: 14px 24px; border-radius: 12px;
            transform: translateX(400px); transition: transform 0.3s;
            border-left: 4px solid var(--neon-green);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            font-size: 0.9rem;
        }
        .toast.error { border-left-color: var(--error); }
        .toast.show { transform: translateX(0); }
        
        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(4, 27, 61, 0.96); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 136, 0.15);
            padding: 1rem 2rem;
        }
        .nav-container {
            max-width: 1200px; margin: auto; display: flex;
            justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.6rem; font-weight: 700; color: var(--neon-green); cursor: pointer; }
        .logo span { color: var(--white); }
        .nav-links { display: flex; align-items: center; gap: 1.5rem; }
        .nav-links a { color: var(--white); text-decoration: none; transition: var(--transition); font-weight: 500; }
        .nav-links a:hover { color: var(--neon-green); }
        .logout-btn {
            background: rgba(255,68,68,0.2); border: 1px solid var(--error);
            color: var(--error); padding: 8px 20px; border-radius: 30px;
            cursor: pointer; font-weight: 600; transition: var(--transition);
        }
        .logout-btn:hover { background: var(--error); color: var(--white); }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .user-name { color: var(--neon-green); font-weight: 600; }
        
        .hero {
            min-height: 30vh;
            background: linear-gradient(135deg, rgba(4,27,61,0.95), rgba(10,35,79,0.98));
            display: flex; align-items: center; text-align: center; padding-top: 80px;
        }
        .hero-content { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .hero h1 span { color: var(--neon-green); }
        .hero p { color: var(--soft-gray); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        .stats-row {
            display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: var(--dark-navy); border-radius: 20px; padding: 1.5rem 2rem;
            text-align: center; min-width: 160px; border: 1px solid rgba(0,255,136,0.2);
        }
        .stat-card i { font-size: 2rem; color: var(--neon-green); margin-bottom: 0.5rem; }
        .stat-number { font-size: 2rem; font-weight: 700; }
        .stat-label { color: var(--soft-gray); font-size: 0.8rem; }
        
        .section-title {
            text-align: center; font-size: 1.8rem; margin-bottom: 2rem;
        }
        .section-title span { color: var(--neon-green); }
        .section-title:after {
            content: ''; display: block; width: 60px; height: 3px;
            background: var(--neon-green); margin: 10px auto 0; border-radius: 2px;
        }
        
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .course-card {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(0,255,136,0.15);
            transition: var(--transition);
            position: relative;
        }
        .course-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-green);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .course-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .course-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 0.75rem;
        }
        .course-badge.free { background: var(--neon-green); color: var(--dark-navy); }
        .course-badge.premium { background: var(--warning); color: var(--dark-navy); }
        .enrolled-badge {
            position: absolute; top: 1rem; right: 1rem;
            background: var(--neon-green); color: var(--dark-navy);
            padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;
        }
        .course-card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .course-card p {
            color: var(--soft-gray); font-size: 0.85rem;
            line-height: 1.5; margin-bottom: 1rem;
        }
        .course-price {
            font-weight: bold; margin-bottom: 1rem;
        }
        .course-price.free { color: var(--neon-green); }
        .course-price.premium { color: var(--warning); }
        .progress-bar-small {
            background: rgba(255,255,255,0.1); border-radius: 10px;
            height: 4px; overflow: hidden; margin: 0.5rem 0;
        }
        .progress-fill-small {
            background: var(--neon-green); width: 0%; height: 100%;
            border-radius: 10px; transition: width 0.3s;
        }
        .btn-action {
            width: 100%; background: transparent; border: 1px solid var(--neon-green);
            color: var(--white); padding: 10px; border-radius: 30px;
            cursor: pointer; transition: var(--transition); font-weight: 600;
            margin-top: 0.5rem;
        }
        .btn-action:hover { background: var(--neon-green); color: var(--dark-navy); }
        .btn-action.enrolled { background: var(--neon-green); color: var(--dark-navy); }
        
        .skeleton-card {
            background: var(--dark-navy); border-radius: 20px; padding: 1.5rem;
            animation: pulse 1.5s infinite;
        }
        .skeleton-icon { width: 50px; height: 50px; background: var(--secondary-dark); border-radius: 12px; margin-bottom: 1rem; }
        .skeleton-title { width: 70%; height: 20px; background: var(--secondary-dark); border-radius: 4px; margin-bottom: 0.75rem; }
        .skeleton-text { width: 100%; height: 60px; background: var(--secondary-dark); border-radius: 4px; margin-bottom: 1rem; }
        .skeleton-price { width: 40%; height: 18px; background: var(--secondary-dark); border-radius: 4px; margin-bottom: 1rem; }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        
        .empty-state {
            text-align: center; padding: 60px; background: var(--dark-navy);
            border-radius: 20px; grid-column: 1/-1;
        }
        .empty-state i { font-size: 4rem; color: var(--warning); margin-bottom: 1rem; }
        
        .footer {
            background: var(--dark-navy); text-align: center;
            padding: 2rem; color: var(--soft-gray);
            border-top: 1px solid rgba(0,255,136,0.1); margin-top: 2rem;
        }
        
        @media (max-width: 768px) {
            .courses-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 1.5rem; }
            .stat-card { padding: 1rem; min-width: 120px; }
            .stat-number { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div id="loadingSpinner" class="loading-spinner"><div class="spinner"></div></div>
<div id="toast" class="toast"></div>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="location.href='/'">MEI DRIVE <span>AFRICA</span></div>
        <div class="nav-links">
            <a href="/dashboard.html" style="color: var(--neon-green);">Dashboard</a>
            <a href="#">My Courses</a>
            <a href="#">Support</a>
            <div id="userInfoNav" class="user-info">
                <span class="user-name" id="userNameDisplay"></span>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </div>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>Welcome back, <span id="heroUserName">Driver</span>!</h1>
        <p>Track your journey to becoming a certified driver with MEI DRIVE AFRICA</p>
    </div>
</section>

<div class="container">
    <div class="stats-row">
        <div class="stat-card"><i class="fas fa-book-open"></i><div class="stat-number" id="totalCourses">0</div><div class="stat-label">Total Courses</div></div>
        <div class="stat-card"><i class="fas fa-graduation-cap"></i><div class="stat-number" id="enrolledCount">0</div><div class="stat-label">Enrolled</div></div>
        <div class="stat-card"><i class="fas fa-chart-line"></i><div class="stat-number" id="avgProgress">0%</div><div class="stat-label">Avg Progress</div></div>
    </div>
    
    <h2 class="section-title">Our <span>Courses</span></h2>
    <div id="coursesContainer" class="courses-grid"></div>
</div>

<footer class="footer">
    <p>&copy; 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training | Instructor: ILR-7WA1P62</p>
</footer>

<script>
    // ============================================
    // SUPABASE - SINGLE CLIENT
    // ============================================
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ============================================
    // ALL 8 COURSES (Matching your image)
    // ============================================
    const ALL_COURSES = [
        { id: 1, name: "Learner Hub", description: "Complete NTSA-approved driver training for beginners. From basics to road readiness.", price: 0, type: "free", icon: "fa-car", color: "#00FF88", total_units: 21 },
        { id: 2, name: "PSV Training", description: "Specialized training for bus, matatu, and taxi drivers. Professional Service Vehicle certification.", price: 7500, type: "premium", icon: "fa-bus", color: "#6C63FF", total_units: 8 },
        { id: 3, name: "EV Vehicle Course", description: "Master electric vehicle driving techniques, charging infrastructure, and eco-driving.", price: 8000, type: "premium", icon: "fa-bolt", color: "#4ECDC4", total_units: 8 },
        { id: 4, name: "Boda Boda", description: "Professional motorcycle taxi training. Safety, defensive riding, and customer service.", price: 5500, type: "premium", icon: "fa-motorcycle", color: "#FF6B6B", total_units: 8 },
        { id: 5, name: "e-Safety Library", description: "Free road safety resources, educational materials, and awareness content for all road users.", price: 0, type: "free", icon: "fa-book", color: "#00FF88", total_units: 10 },
        { id: 6, name: "Quiz Bank", description: "NTSA practice questions and mock exams. Prepare for your driving test with 1000+ questions.", price: 3000, type: "premium", icon: "fa-clipboard-list", color: "#FFB347", total_units: 10 },
        { id: 7, name: "Defensive Driving", description: "Advanced accident prevention techniques, hazard perception, and emergency maneuvers.", price: 6000, type: "premium", icon: "fa-shield-alt", color: "#FFB347", total_units: 8 },
        { id: 8, name: "Refresher Course", description: "Advanced professional driver refresher training for PSV, private, commercial, and fleet drivers.", price: 4500, type: "premium", icon: "fa-sync-alt", color: "#6C63FF", total_units: 6 }
    ];
    
    // DOM Elements
    const toast = document.getElementById('toast');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const coursesContainer = document.getElementById('coursesContainer');
    
    let currentUser = null;
    let userEnrollments = new Map(); // course_id -> { enrolled, progress }
    
    function showToast(message, isError = false) {
        toast.textContent = message;
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
    }
    
    function setLoading(loading) {
        loading ? loadingSpinner.classList.add('active') : loadingSpinner.classList.remove('active');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    async function checkAuth() {
        setLoading(true);
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                showToast('Please login to continue', true);
                setTimeout(() => { window.location.href = '/login.html'; }, 1500);
                return false;
            }
            currentUser = session.user;
            let displayName = currentUser.email?.split('@')[0] || 'Driver';
            document.getElementById('userNameDisplay').textContent = displayName;
            document.getElementById('heroUserName').textContent = displayName;
            return true;
        } catch (err) {
            console.error('Auth error:', err);
            window.location.href = '/login.html';
            return false;
        } finally {
            setLoading(false);
        }
    }
    
    async function loadUserEnrollments() {
        if (!currentUser) return;
        
        try {
            const { data, error } = await supabase
                .from('enrollments')
                .select('course_id, progress')
                .eq('user_id', currentUser.id);
            
            if (error) {
                if (error.code !== '42P01') {
                    console.error('Enrollment fetch error:', error);
                }
                loadFromLocalStorage();
                return;
            }
            
            if (data && data.length > 0) {
                userEnrollments.clear();
                data.forEach(e => {
                    userEnrollments.set(e.course_id, {
                        enrolled: true,
                        progress: e.progress || 0
                    });
                });
                saveToLocalStorage();
            } else {
                loadFromLocalStorage();
            }
        } catch (err) {
            console.log('Enrollments table may not exist, using localStorage');
            loadFromLocalStorage();
        }
    }
    
    function loadFromLocalStorage() {
        const saved = localStorage.getItem(`enrollments_${currentUser?.id}`);
        if (saved) {
            try {
                const enrollments = JSON.parse(saved);
                userEnrollments.clear();
                Object.keys(enrollments).forEach(courseId => {
                    userEnrollments.set(parseInt(courseId), enrollments[courseId]);
                });
            } catch(e) {}
        }
    }
    
    function saveToLocalStorage() {
        const enrollmentsObj = {};
        userEnrollments.forEach((value, key) => {
            enrollmentsObj[key] = value;
        });
        localStorage.setItem(`enrollments_${currentUser?.id}`, JSON.stringify(enrollmentsObj));
    }
    
    async function enrollInCourse(courseId, courseTitle) {
        if (!currentUser) {
            showToast('Please login to enroll', true);
            return false;
        }
        
        setLoading(true);
        try {
            if (userEnrollments.has(courseId)) {
                showToast(`You are already enrolled in ${courseTitle}`, false);
                goToCourse(courseId);
                return true;
            }
            
            // Try to insert into Supabase
            const { error } = await supabase
                .from('enrollments')
                .insert([{
                    user_id: currentUser.id,
                    course_id: courseId,
                    status: 'active',
                    progress: 0,
                    enrolled_at: new Date().toISOString()
                }]);
            
            if (error && error.code !== '42P01') {
                console.warn('DB insert error:', error);
            }
            
            // Update local state
            userEnrollments.set(courseId, { enrolled: true, progress: 0 });
            saveToLocalStorage();
            
            showToast(`✅ Enrolled in ${courseTitle}!`, false);
            renderCourses();
            updateStats();
            
            // Redirect to course view
            setTimeout(() => { goToCourse(courseId); }, 1000);
            return true;
        } catch (err) {
            console.error('Enrollment error:', err);
            userEnrollments.set(courseId, { enrolled: true, progress: 0 });
            saveToLocalStorage();
            showToast(`✅ Enrolled in ${courseTitle}`, false);
            renderCourses();
            updateStats();
            setTimeout(() => { goToCourse(courseId); }, 1000);
            return true;
        } finally {
            setLoading(false);
        }
    }
    
    function goToCourse(courseId) {
        window.location.href = `/learn.html?id=${courseId}`;
    }
    
    function renderCourses() {
        coursesContainer.innerHTML = '';
        
        ALL_COURSES.forEach(course => {
            const enrollment = userEnrollments.get(course.id);
            const isEnrolled = !!enrollment;
            const progressPercent = isEnrolled ? (enrollment.progress || 0) : 0;
            const isFree = course.type === 'free' || course.price === 0;
            const price = course.price || 0;
            
            // Map icon names properly
            let iconClass = course.icon;
            if (course.id === 1) iconClass = "fa-car";
            if (course.id === 2) iconClass = "fa-bus";
            if (course.id === 3) iconClass = "fa-bolt";
            if (course.id === 4) iconClass = "fa-motorcycle";
            if (course.id === 5) iconClass = "fa-book";
            if (course.id === 6) iconClass = "fa-clipboard-list";
            if (course.id === 7) iconClass = "fa-shield-alt";
            if (course.id === 8) iconClass = "fa-sync-alt";
            
            const card = document.createElement('div');
            card.className = 'course-card';
            
            card.innerHTML = `
                ${isEnrolled ? '<div class="enrolled-badge"><i class="fas fa-check"></i> Enrolled</div>' : ''}
                <div class="course-icon"><i class="fas ${iconClass}"></i></div>
                <div class="course-badge ${isFree ? 'free' : 'premium'}">${isFree ? 'FREE' : 'PREMIUM'}</div>
                <h3>${escapeHtml(course.name)}</h3>
                <p>${escapeHtml(course.description)}</p>
                <div class="course-price ${isFree ? 'free' : 'premium'}">
                    ${isFree ? 'FREE' : `KES ${price.toLocaleString()}`}
                </div>
                ${isEnrolled ? `
                    <div class="progress-bar-small">
                        <div class="progress-fill-small" style="width: ${progressPercent}%;"></div>
                    </div>
                    <div style="font-size: 0.7rem; color: var(--soft-gray); text-align: center; margin-bottom: 0.5rem;">Progress: ${progressPercent}%</div>
                ` : ''}
                <button class="btn-action ${isEnrolled ? 'enrolled' : ''}" data-course-id="${course.id}">
                    ${isEnrolled ? '<i class="fas fa-play"></i> Continue Learning' : '<i class="fas fa-plus-circle"></i> Enroll Now'}
                </button>
            `;
            
            const button = card.querySelector('.btn-action');
            button.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (isEnrolled) {
                    goToCourse(course.id);
                } else {
                    await enrollInCourse(course.id, course.name);
                }
            });
            
            coursesContainer.appendChild(card);
        });
    }
    
    function updateStats() {
        document.getElementById('totalCourses').textContent = ALL_COURSES.length;
        
        let enrolledCount = 0;
        let totalProgress = 0;
        userEnrollments.forEach((value) => {
            if (value.enrolled) {
                enrolledCount++;
                totalProgress += value.progress || 0;
            }
        });
        
        document.getElementById('enrolledCount').textContent = enrolledCount;
        const avgProgressVal = enrolledCount > 0 ? Math.floor(totalProgress / enrolledCount) : 0;
        document.getElementById('avgProgress').textContent = `${avgProgressVal}%`;
    }
    
    async function handleLogout() {
        setLoading(true);
        try {
            await supabase.auth.signOut();
            showToast('Logged out successfully', false);
            setTimeout(() => { window.location.href = '/'; }, 1000);
        } catch (err) {
            window.location.href = '/';
        } finally {
            setLoading(false);
        }
    }
    
    // Event listeners
    document.getElementById('logoutBtn')?.addEventListener('click', handleLogout);
    
    async function init() {
        const authenticated = await checkAuth();
        if (!authenticated) return;
        await loadUserEnrollments();
        renderCourses();
        updateStats();
        
        // Listen for auth changes
        supabase.auth.onAuthStateChange(async (event) => {
            if (event === 'SIGNED_OUT') {
                window.location.href = '/';
            }
        });
    }
    
    init();
</script>
</body>
</html>
