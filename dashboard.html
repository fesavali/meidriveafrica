<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let enrolledCourseIds = new Set();
    let allCourses = [];
    let userProgress = {}; // Structured by unit_id to match your database columns
    
    function setLoading(loading) {
        const spinner = document.getElementById('loadingSpinner');
        if (spinner) {
            if (loading) {
                spinner.classList.add('active');
            } else {
                spinner.classList.remove('active');
            }
        }
    }
    
    async function checkAuth() {
        setLoading(true);
        try {
            const { data: { session }, error: sessionErr } = await supabase.auth.getSession();
            if (sessionErr || !session) {
                console.log("No valid session found, redirecting to login.");
                window.location.replace('/login.html');
                return false;
            }
            currentUser = session.user;
            
            const { data: profile } = await supabase
                .from('profiles')
                .select('full_name')
                .eq('id', currentUser.id)
                .maybeSingle();
            
            const displayName = profile?.full_name?.split(' ')[0] || currentUser.email.split('@')[0];
            
            const nameEl = document.getElementById('userName');
            const welcomeEl = document.getElementById('welcomeMsg');
            if (nameEl) nameEl.textContent = displayName;
            if (welcomeEl) welcomeEl.textContent = `Welcome back, ${displayName}!`;
            
            return true;
        } catch (err) {
            console.error('Auth check crashed:', err);
            window.location.replace('/login.html');
            return false;
        }
    }
    
    async function loadCourses() {
        try {
            const { data: courses, error } = await supabase
                .from('courses')
                .select('*')
                .order('id', { ascending: true });
            
            if (error) throw error;
            
            allCourses = courses || [];
            return allCourses;
        } catch (err) {
            console.error('Error loading core courses catalog:', err);
            const grid = document.getElementById('coursesGrid');
            if (grid) {
                grid.innerHTML = `
                    <div style="text-align:center; padding:40px; color:#ff4d4f;">
                        <i class="fas fa-exclamation-circle"></i> Error loading dashboard courses. 
                        <button onclick="location.reload()" style="margin-top:10px; padding:8px 16px; background:#00FF88; border:none; border-radius:8px; cursor:pointer;">Retry</button>
                    </div>`;
            }
            return [];
        }
    }
    
    async function loadUserData() {
        try {
            // 1. Fetch Student Course Enrollments
            const { data: enrollments, error: enrollErr } = await supabase
                .from('enrollments')
                .select('course_id')
                .eq('user_id', currentUser.id);
            
            if (enrollErr) throw enrollErr;
            
            if (enrollments) {
                const countEl = document.getElementById('enrolledCount');
                if (countEl) countEl.textContent = enrollments.length;
                enrolledCourseIds = new Set(enrollments.map(e => e.course_id));
            }
            
            // 2. Fetch User Progress (Cleaned up: references unit_id, score, and completed)
            const { data: progress, error: progErr } = await supabase
                .from('user_progress')
                .select('unit_id, completed, score')
                .eq('user_id', currentUser.id);
            
            if (progErr) throw progErr;
            
            userProgress = {}; 
            let totalCompletedUnits = 0;
            let totalScoresSum = 0;
            let scoresCount = 0;
            
            if (progress) {
                progress.forEach(p => {
                    // Map raw unit data by its unit identifier key
                    userProgress[p.unit_id] = { completed: p.completed, score: p.score || 0 };
                    if (p.completed) totalCompletedUnits++;
                    if (p.score) {
                        totalScoresSum += p.score;
                        scoresCount++;
                    }
                });
            }
            
            // Render basic card metrics indicators
            const completedUnitsEl = document.getElementById('completedUnits');
            if (completedUnitsEl) completedUnitsEl.textContent = totalCompletedUnits;
            
            const avgQuizScore = scoresCount > 0 ? Math.round(totalScoresSum / scoresCount) : 0;
            const quizScoreEl = document.getElementById('quizScore');
            if (quizScoreEl) quizScoreEl.textContent = `${avgQuizScore}%`;
            
            // 3. Fetch Course Units to securely calculate structural progress metrics
            let calculatedProgressSum = 0;
            let calculatedCoursesCount = 0;
            
            if (enrolledCourseIds.size > 0) {
                const { data: allUnits, error: unitsErr } = await supabase
                    .from('course_units')
                    .select('id, course_id');
                
                if (unitsErr) throw unitsErr;
                
                if (allUnits) {
                    for (const courseId of enrolledCourseIds) {
                        const courseUnits = allUnits.filter(u => u.course_id === courseId);
                        if (courseUnits.length > 0) {
                            let completedInCourse = 0;
                            courseUnits.forEach(u => {
                                if (userProgress[u.id]?.completed) {
                                    completedInCourse++;
                                }
                            });
                            
                            const coursePercent = Math.round((completedInCourse / courseUnits.length) * 100);
                            calculatedProgressSum += coursePercent;
                            calculatedCoursesCount++;
                        }
                    }
                }
            }
            
            const finalAvgProgress = calculatedCoursesCount > 0 ? Math.round(calculatedProgressSum / calculatedCoursesCount) : 0;
            const avgProgressEl = document.getElementById('avgProgress');
            if (avgProgressEl) avgProgressEl.textContent = `${finalAvgProgress}%`;
            
            // 4. Split layout lists to clear out duplicate name elements
            const uniqueCourses = [];
            const seenNames = new Set();
            for (const course of allCourses) {
                if (!seenNames.has(course.name)) {
                    seenNames.add(course.name);
                    uniqueCourses.push(course);
                }
            }
            
            const availableCourses = uniqueCourses.filter(c => !enrolledCourseIds.has(c.id));
            const enrolledCourses = uniqueCourses.filter(c => enrolledCourseIds.has(c.id));
            
            // Pass clean configurations over to visual builders
            renderAvailableCourses(availableCourses);
            renderEnrolledCourses(enrolledCourses);
            
        } catch (err) {
            console.error('Fatal crash inside user progress loading engine:', err);
            showToast('Failed to sync data components smoothly. Please refresh.', 'error');
        } finally {
            // GUARANTEED SAFE CLOSURE: The spinner will ALWAYS turn off here!
            setLoading(false);
        }
    }
    
    function renderAvailableCourses(courses) {
        const container = document.getElementById('coursesGrid');
        if (!container) return;
        
        if (!courses.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color: #aaa;">🎉 You are enrolled in all available courses!</div>';
            return;
        }
        
        container.innerHTML = '';
        courses.forEach(course => {
            const isFree = course.type === 'free' || course.price === 0;
            const card = document.createElement('div');
            card.className = 'course-card';
            card.innerHTML = `
                <span class="badge ${isFree ? 'free-badge' : 'premium-badge'}">${isFree ? 'FREE' : 'PREMIUM'}</span>
                <h3><i class="fas fa-car"></i> ${escapeHtml(course.name)}</h3>
                <p>${escapeHtml(course.description) || 'Professional driver training course approved by NTSA.'}</p>
                <div class="price ${isFree ? 'free' : 'premium'}">
                    ${isFree ? 'FREE' : `KES ${course.price?.toLocaleString() || 0}`}
                </div>
                <button class="btn-enroll" onclick="window.enrollInCourse(${course.id})">
                    <i class="fas fa-plus-circle"></i> Enroll Now
                </button>
            `;
            container.appendChild(card);
        });
    }
    
    async function renderEnrolledCourses(courses) {
        const container = document.getElementById('enrolledGrid');
        if (!container) return;
        
        if (!courses.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color: #aaa;">You haven\'t enrolled in any courses yet. Browse available courses above!</div>';
            return;
        }
        
        container.innerHTML = '';
        
        try {
            // Pull units in one efficient bulk fetch to avoid cascading visual layout reflow drops
            const { data: units } = await supabase.from('course_units').select('id, course_id');
            
            courses.forEach(course => {
                const courseUnits = units ? units.filter(u => u.course_id === course.id) : [];
                let completedCount = 0;
                
                courseUnits.forEach(u => {
                    if (userProgress[u.id]?.completed) completedCount++;
                });
                
                const totalUnits = courseUnits.length || 1;
                const percent = Math.round((completedCount / totalUnits) * 100);
                
                const card = document.createElement('div');
                card.className = 'course-card';
                card.innerHTML = `
                    <span class="badge enrolled"><i class="fas fa-check-circle"></i> ENROLLED</span>
                    <h3><i class="fas fa-car"></i> ${escapeHtml(course.name)}</h3>
                    <p>${escapeHtml(course.description) || 'Continue your learning journey.'}</p>
                    <div class="progress-bar-container" style="background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; margin: 10px 0;">
                        <div style="background: #00FF88; width: ${percent}%; height: 100%; border-radius: 10px; transition: width 0.3s;"></div>
                    </div>
                    <button class="btn-start" onclick="window.startCourse(${course.id})">
                        <i class="fas fa-play-circle"></i> Continue Learning
                    </button>
                `;
                container.appendChild(card);
            });
        } catch (err) {
            console.error("Failed to compile progress bars cleanly:", err);
        }
    }
    
    window.enrollInCourse = async function(courseId) {
        setLoading(true);
        try {
            const { data: existing } = await supabase
                .from('enrollments')
                .select('id')
                .eq('user_id', currentUser.id)
                .eq('course_id', courseId)
                .maybeSingle();
            
            if (existing) {
                showToast('You are already enrolled in this course!', 'error');
                return;
            }
            
            const { error } = await supabase
                .from('enrollments')
                .insert([{
                    user_id: currentUser.id,
                    course_id: courseId,
                    status: 'active',
                    enrolled_at: new Date().toISOString()
                }]);
            
            if (error) {
                showToast(error.message || 'Failed to enroll. Please try again.', 'error');
            } else {
                showToast('Successfully enrolled in course!', 'success');
                enrolledCourseIds.add(courseId);
                await loadUserData();
            }
        } catch (err) {
            console.error('Enrollment error details:', err);
            showToast('Failed to enroll. Please try again.', 'error');
        } finally {
            setLoading(false);
        }
    };
    
    window.startCourse = function(courseId) {
        window.location.href = `/course.html?id=${courseId}`;
    };
    
    async function handleLogout() {
        setLoading(true);
        try {
            await supabase.auth.signOut({ scope: 'local' });
        } catch (err) {
            console.error('Supabase identity removal failure bypass executed:', err);
        } finally {
            localStorage.clear();
            sessionStorage.clear();
            currentUser = null;
            enrolledCourseIds = new Set();
            setLoading(false);
            window.location.replace('/');
        }
    }
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, m => ({ 
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' 
        }[m]));
    }
    
    // Global delegated handling capturing element actions safely
    document.addEventListener('click', function(e) {
        const logoutBtn = e.target.closest('#logoutButton');
        if (logoutBtn) {
            e.preventDefault();
            handleLogout();
        }
    });
    
    // Balanced sequential life cycle loop matching your backend
    async function init() {
        try {
            const isAuthenticated = await checkAuth();
            if (!isAuthenticated) return;
            
            await loadCourses();    
            await loadUserData();   
        } catch (error) {
            console.error("Dashboard engine failed to start:", error);
            setLoading(false); // Failsafe fallback closure
        }
    }
    
    init();
</script>
