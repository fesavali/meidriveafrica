services:
  - type: web
    name: mei-drive-africa
    runtime: static
    buildCommand: echo 'Static site - no build needed'
    staticPublishPath: ./
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /admin-dashboard
        destination: /admin-dashboard.html
      - type: rewrite
        source: /reset-password
        destination: /reset-password.html
      - type: rewrite
        source: /update-password
        destination: /update-password.html
      - type: rewrite
        source: /course
        destination: /course.html
      - type: rewrite
        source: /unit
        destination: /unit.html
      - type: rewrite
        source: /quiz-bank
        destination: /quiz-bank.html
