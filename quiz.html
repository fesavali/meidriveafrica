<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bank - MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .logo span {
            color: #00ff88;
        }

        .back-btn {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .quiz-header h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .quiz-header h1 span {
            color: #00ff88;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0,255,136,0.1);
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            justify-content: center;
        }

        .filter-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #00ff88;
            color: #0a0a0a;
        }

        .quiz-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .quiz-question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .quiz-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            cursor: pointer;
        }

        .quiz-option:hover {
            background: rgba(255,255,255,0.08);
        }

        .check-btn {
            background: #00ff88;
            color: #0a0a0a;
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }

        .feedback.correct {
            background: rgba(0,255,136,0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            display: block;
        }

        .feedback.wrong {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #f44336;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,255,136,0.3);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .quiz-header h1 { font-size: 28px; }
            .stats { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MEI DRIVE <span>AFRICA</span></div>
        <a href="index.html" class="back-btn">← Back</a>
    </nav>

    <div class="container">
        <div class="quiz-header">
            <h1>📝 <span>Quiz Bank</span></h1>
            <p>Test your knowledge with real exam-style questions</p>
        </div>
        <div id="quizContainer">
            <div class="loading"><div class="spinner"></div>Loading questions...</div>
        </div>
    </div>

    <script>
        const SUPABASE_CONFIG = {
            url: 'https://qpqkmmkrzxlhcpccefjn.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s'
        };
        
        const supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
        
        let allQuestions = [];
        let categories = [];

        async function loadQuestions() {
            try {
                const { data, error } = await supabase
                    .from('quiz_questions')
                    .select('*');
                
                if (error) throw error;
                
                allQuestions = data || [];
                categories = ['All', ...new Set(allQuestions.map(q => q.category))];
                
                renderQuiz();
                
            } catch (error) {
                document.getElementById('quizContainer').innerHTML = '<div class="loading">Error loading questions. Please refresh.</div>';
            }
        }

        function renderQuiz(category = 'All') {
            const filtered = category === 'All' ? allQuestions : allQuestions.filter(q => q.category === category);
            
            const html = `
                <div class="stats">
                    <div class="stat-card"><div class="stat-number">${allQuestions.length}</div><div>Total Qs</div></div>
                    <div class="stat-card"><div class="stat-number">${categories.length - 1}</div><div>Categories</div></div>
                </div>
                <div class="category-filter">
                    ${categories.map(cat => `
                        <button class="filter-btn ${cat === category ? 'active' : ''}" onclick="renderQuiz('${cat}')">${cat}</button>
                    `).join('')}
                </div>
                ${filtered.map((q, idx) => `
                    <div class="quiz-item" id="quiz-${q.id}">
                        <div class="quiz-question">${idx + 1}. ${q.question}</div>
                        <div class="quiz-options">
                            ${['A', 'B', 'C', 'D'].map((letter, optIdx) => `
                                <label class="quiz-option">
                                    <input type="radio" name="q${q.id}" value="${optIdx + 1}"> ${letter}. ${q[`option_${(optIdx+1).toString()}`] || q[`option_${String.fromCharCode(97+optIdx)}`]}
                                </label>
                            `).join('')}
                        </div>
                        <button class="check-btn" onclick="checkAnswer(${q.id}, ${q.correct_answer})">Check Answer</button>
                        <div class="feedback" id="feedback-${q.id}"></div>
                    </div>
                `).join('')}
            `;
            
            document.getElementById('quizContainer').innerHTML = html;
        }

        function checkAnswer(id, correct) {
            const selected = document.querySelector(`input[name="q${id}"]:checked`);
            const feedback = document.getElementById(`feedback-${id}`);
            
            if (!selected) {
                feedback.textContent = "⚠️ Please select an answer";
                feedback.className = "feedback wrong";
                return;
            }
            
            if (parseInt(selected.value) === correct) {
                feedback.innerHTML = "✅ Correct! Great job!";
                feedback.className = "feedback correct";
            } else {
                const letters = ['A', 'B', 'C', 'D'];
                feedback.innerHTML = `❌ Incorrect. The correct answer is ${letters[correct - 1]}. Review and try again!`;
                feedback.className = "feedback wrong";
            }
        }

        loadQuestions();
    </script>
</body>
</html>
