<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Materials - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #fff;
            --soft-gray: #B7C4D6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
        }
        .navbar {
            background: var(--dark-navy);
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 100px 20px 40px;
        }
        .course-header {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .unit-card {
            background: var(--dark-navy);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(0,255,136,0.12);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s;
        }
        .unit-card:hover {
            border-color: var(--neon-green);
            transform: translateX(5px);
        }
        .unit-number {
            width: 45px;
            height: 45px;
            background: var(--secondary-dark);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--neon-green);
        }
        .btn-back {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--white);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--dark-navy);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        .error-box {
            background: rgba(255,68,68,0.1);
            border: 1px solid #ff4444;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            margin: 2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .container { padding: 80px 15px 30px; }
            .unit-card { padding: 0.8rem; }
            .unit-number { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>
    <nav class="navbar"><div style="max-width:1200px;margin:auto;"><div style="font-size:1.5rem;color:var(--neon-green);cursor:pointer;" onclick="location.href='/'">MEI DRIVE AFRICA</div></div></nav>
    <div class="container" id="container">
        <div class="loading"><div class="spinner"></div><p>Loading course materials...</p></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');
        
        // Fallback units if database fails
        const fallbackUnits = [
            { unit_number: 1, title: 'Introduction to Driving', duration: '2 hours' },
            { unit_number: 2, title: 'Fundamental Driving Rules', duration: '3 hours' },
            { unit_number: 3, title: 'Model Town', duration: '4 hours' },
            { unit_number: 4, title: 'Human Factors in Traffic', duration: '3 hours' },
            { unit_number: 5, title: 'Vehicle Constructions and Controls', duration: '5 hours' }
        ];
        
        const courseNames = {
            1: 'Learner Hub', 2: 'PSV Training', 3: 'School Bus/Van', 
            4: 'EV Vehicle Course', 5: 'Boda Boda', 6: 'Professional Driver',
            7: 'e-Safety Library', 8: 'Quiz Bank'
        };
        
        async function loadMaterials() {
            const container = document.getElementById('container');
            
            if (!courseId) {
                container.innerHTML = '<div class="error-box"><h2>No Course Selected</h2><button class="btn-back" onclick="location.href=\'/\'">Back to Home</button></div>';
                return;
            }
            
            try {
                // Try to fetch from Supabase
                const { data: units, error } = await supabase
                    .from('course_units')
                    .select('*')
                    .eq('course_id', parseInt(courseId))
                    .order('unit_number', { ascending: true });
                
                let displayUnits = units;
                
                // If no data from Supabase, use fallback for course 1
                if (error || !units || units.length === 0) {
                    console.log('Using fallback units');
                    if (courseId == 1) {
                        displayUnits = fallbackUnits;
                    } else {
                        displayUnits = [];
                    }
                }
                
                const courseName = courseNames[courseId] || 'Course';
                
                container.innerHTML = `
                    <button class="btn-back" onclick="location.href='/course.html?id=${courseId}'">
                        <i class="fas fa-arrow-left"></i> Back to Course
                    </button>
                    <div class="course-header">
                        <h1>${courseName}</h1>
                        <p>Course Materials - Select a unit to begin</p>
                    </div>
                    <div id="unitsList"></div>
                `;
                
                const unitsList = document.getElementById('unitsList');
                
                if (!displayUnits || displayUnits.length === 0) {
                    unitsList.innerHTML = `
                        <div class="error-box">
                            <h3>No Units Available</h3>
                            <p>Course materials are being prepared. Please check back soon.</p>
                            <button class="btn-back" onclick="location.href='/course.html?id=${courseId}'">Back to Course</button>
                        </div>
                    `;
                    return;
                }
                
                unitsList.innerHTML = displayUnits.map(unit => `
                    <div class="unit-card" onclick="viewUnit(${courseId}, ${unit.unit_number})">
                        <div class="unit-number">${unit.unit_number}</div>
                        <div style="flex:1">
                            <strong>${escapeHtml(unit.title)}</strong>
                            <div style="font-size:0.8rem; color:var(--soft-gray);">
                                <i class="fas fa-clock"></i> ${unit.duration || '1 hour'}
                            </div>
                        </div>
                        <i class="fas fa-chevron-right" style="color:var(--neon-green);"></i>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `
                    <div class="error-box">
                        <h2>⚠️ Connection Error</h2>
                        <p>Unable to load course materials. Please check your internet connection.</p>
                        <button class="btn-back" onclick="location.reload()">Retry</button>
                        <button class="btn-back" onclick="location.href='/'">Back to Home</button>
                    </div>
                `;
            }
        }
        
        function viewUnit(courseId, unitNumber) {
            window.location.href = `/unit-view.html?course_id=${courseId}&unit=${unitNumber}`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        loadMaterials();
    </script>
</body>
</html>
