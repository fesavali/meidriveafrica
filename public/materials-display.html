<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Materials - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #FFFFFF;
            --soft-gray: #B7C4D6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
        }
        .navbar {
            background: var(--dark-navy);
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 100px 20px 40px;
        }
        .course-header {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .unit-card {
            background: var(--dark-navy);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(0,255,136,0.12);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .unit-card:hover {
            border-color: var(--neon-green);
            transform: translateX(5px);
        }
        .unit-number {
            width: 45px;
            height: 45px;
            background: var(--secondary-dark);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--neon-green);
        }
        .btn-back {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--white);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--dark-navy);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="navbar"><div style="max-width:1200px;margin:auto;"><div style="font-size:1.5rem;color:var(--neon-green);">MEI DRIVE AFRICA</div></div></nav>
    <div class="container" id="container"><div class="loading"><div class="spinner"></div><p>Loading course materials...</p></div></div>
    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');
        
        const courseNames = {
            1: 'Learner Hub', 2: 'PSV Training', 3: 'School Bus/Van', 4: 'EV Vehicle Course',
            5: 'Boda Boda', 6: 'Professional Driver', 7: 'e-Safety Library', 8: 'Quiz Bank'
        };
        
        async function loadMaterials() {
            const container = document.getElementById('container');
            if (!courseId) { container.innerHTML = '<div class="loading">No course selected</div>'; return; }
            
            const { data: units, error } = await supabase
                .from('course_units')
                .select('*')
                .eq('course_id', courseId)
                .order('unit_number');
            
            const courseName = courseNames[courseId] || 'Course';
            
            container.innerHTML = `
                <button class="btn-back" onclick="location.href='/course.html?id=${courseId}'"><i class="fas fa-arrow-left"></i> Back to Course</button>
                <div class="course-header"><h1>${courseName}</h1><p>Course Materials</p></div>
                <div id="unitsList"></div>
            `;
            
            const unitsList = document.getElementById('unitsList');
            if (!units || units.length === 0) {
                unitsList.innerHTML = '<p style="text-align:center;padding:2rem;">No units available. Course content coming soon.</p>';
                return;
            }
            
            unitsList.innerHTML = units.map(unit => `
                <div class="unit-card" onclick="location.href='/unit-view.html?course_id=${courseId}&unit=${unit.unit_number}'">
                    <div class="unit-number">${unit.unit_number}</div>
                    <div><strong>${unit.title}</strong><br><small>${unit.duration || '1 hour'}</small></div>
                </div>
            `).join('');
        }
        
        loadMaterials();
    </script>
</body>
</html>
