<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard | MEI Drive Africa</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A234F 0%, #041B3D 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Navbar */
        .navbar {
            background: rgba(4, 27, 61, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00FF88;
            cursor: pointer;
        }

        .logo span {
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-email {
            color: #00FF88;
            font-size: 0.9rem;
        }

        .logout-btn {
            background: #ff4d4f;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #ff7875;
            transform: translateY(-2px);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Welcome Section */
        .welcome-card {
            background: rgba(4, 27, 61, 0.8);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 255, 136, 0.2);
            text-align: center;
        }

        .welcome-card h1 {
            color: #00FF88;
            margin-bottom: 0.5rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(4, 27, 61, 0.8);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #00FF88;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            font-size: 2.5rem;
            color: #00FF88;
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00FF88;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #B7C4D6;
            font-size: 0.9rem;
        }

        /* Section Title */
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #00FF88;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Enrollments Grid */
        .enrollments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .enrollment-card {
            background: rgba(4, 27, 61, 0.8);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid rgba(0, 255, 136, 0.15);
            transition: all 0.3s ease;
        }

        .enrollment-card:hover {
            border-color: #00FF88;
            transform: translateY(-3px);
        }

        .enrollment-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #00FF88;
        }

        .enrollment-description {
            font-size: 0.85rem;
            color: #B7C4D6;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }

        .enrollment-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .status-active {
            background: rgba(0, 200, 81, 0.2);
            color: #00C851;
            border: 1px solid #00C851;
        }

        .status-pending {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .status-completed {
            background: rgba(0, 200, 81, 0.2);
            color: #00C851;
            border: 1px solid #00C851;
        }

        .status-cancelled {
            background: rgba(255, 77, 79, 0.2);
            color: #ff4d4f;
            border: 1px solid #ff4d4f;
        }

        .enrollment-date {
            font-size: 0.7rem;
            color: #B7C4D6;
            margin-top: 0.75rem;
        }

        .progress-bar {
            margin-top: 0.75rem;
        }

        .progress-bar-bg {
            background: #0A234F;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: #00FF88;
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.7rem;
            margin-top: 0.25rem;
            color: #00FF88;
        }

        /* Loading States */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 136, 0.3);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(4, 27, 61, 0.6);
            border-radius: 16px;
            color: #B7C4D6;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state button {
            margin-top: 1rem;
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 77, 79, 0.1);
            border-radius: 16px;
            color: #ff7875;
            border: 1px solid #ff4d4f;
        }

        /* Buttons */
        .btn-primary {
            background: #00FF88;
            color: #041B3D;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0A234F;
            border-left: 4px solid #00FF88;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            border-left-color: #ff4d4f;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .enrollments-grid {
                grid-template-columns: 1fr;
            }
            
            .nav-container {
                flex-direction: column;
                text-align: center;
            }
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #B7C4D6;
            border-top: 1px solid rgba(0, 255, 136, 0.1);
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="window.location.href='/'">
            MEI DRIVE <span>AFRICA</span>
        </div>
        <div class="user-info">
            <i class="fas fa-user-circle" style="font-size: 1.5rem;"></i>
            <span class="user-email" id="userEmail">Loading...</span>
            <button class="logout-btn" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="welcome-card">
        <h1>Welcome Back!</h1>
        <p>Continue your driving journey with MEI DRIVE AFRICA</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <div class="stat-value" id="enrollmentsCount">0</div>
            <div class="stat-label">Courses Enrolled</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <div class="stat-value" id="progressCount">0</div>
            <div class="stat-label">Average Progress</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-certificate"></i>
            </div>
            <div class="stat-value" id="completedCount">0</div>
            <div class="stat-label">Completed Courses</div>
        </div>
    </div>

    <div class="section-title">
        <i class="fas fa-book-open"></i>
        <span>My Enrollments</span>
    </div>
    <div id="enrollmentsContainer">
        <div class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 1rem;">Loading your enrollments...</p>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2025 MEI DRIVE AFRICA | NTSA Approved Driver Training</p>
    <p style="margin-top: 0.5rem; font-size: 0.8rem;">NTSA Certified Instructor: ILR-7WA1P62</p>
</footer>

<script>
    // ============================================
    // SUPABASE CONFIGURATION - CORRECT WAY
    // ============================================
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    // Initialize Supabase correctly
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    console.log('Supabase client initialized');
    
    // ============================================
    // GLOBAL VARIABLES
    // ============================================
    let currentUser = null;
    
    // ============================================
    // TOAST NOTIFICATION
    // ============================================
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.remove(), 4000);
    }
    
    // ============================================
    // CHECK AUTHENTICATION
    // ============================================
    async function checkAuth() {
        try {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            if (error || !session) {
                console.log('No session found, redirecting to login');
                window.location.href = 'login.html';
                return null;
            }
            
            currentUser = session.user;
            
            // Update UI with user email
            const userEmailEl = document.getElementById('userEmail');
            if (userEmailEl) {
                userEmailEl.textContent = currentUser.email;
            }
            
            return currentUser;
            
        } catch (err) {
            console.error('Auth check error:', err);
            window.location.href = 'login.html';
            return null;
        }
    }
    
    // ============================================
    // LOAD ENROLLMENTS
    // ============================================
    async function loadEnrollments() {
        const container = document.getElementById('enrollmentsContainer');
        
        if (!container) return;
        
        try {
            // Fetch enrollments with course details
            const { data: enrollments, error } = await supabaseClient
                .from('enrollments')
                .select(`
                    *,
                    courses:course_id (
                        id,
                        name,
                        description,
                        type,
                        duration,
                        level
                    )
                `)
                .eq('user_id', currentUser.id)
                .order('enrolled_at', { ascending: false });
            
            if (error) {
                console.error('Error fetching enrollments:', error);
                throw error;
            }
            
            const enrollmentsList = enrollments || [];
            const enrollmentsCount = enrollmentsList.length;
            const completedCount = enrollmentsList.filter(e => e.status === 'completed').length;
            const avgProgress = enrollmentsList.length > 0 
                ? Math.round(enrollmentsList.reduce((sum, e) => sum + (e.progress || 0), 0) / enrollmentsList.length)
                : 0;
            
            // Update stats
            document.getElementById('enrollmentsCount').textContent = enrollmentsCount;
            document.getElementById('completedCount').textContent = completedCount;
            document.getElementById('progressCount').textContent = `${avgProgress}%`;
            
            // Display enrollments
            if (enrollmentsList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <p>You haven't enrolled in any courses yet.</p>
                        <button class="btn-primary" onclick="window.location.href='courses.html'">
                            Browse Courses
                        </button>
                    </div>
                `;
                return;
            }
            
            // Build enrollments grid
            let html = '<div class="enrollments-grid">';
            
            for (const enrollment of enrollmentsList) {
                const course = enrollment.courses;
                const statusClass = enrollment.status === 'active' ? 'status-active' : 
                                   (enrollment.status === 'completed' ? 'status-completed' : 
                                   (enrollment.status === 'cancelled' ? 'status-cancelled' : 'status-pending'));
                const statusIcon = enrollment.status === 'active' ? 'fa-play' : 
                                  (enrollment.status === 'completed' ? 'fa-check' : 'fa-clock');
                
                html += `
                    <div class="enrollment-card">
                        <div class="enrollment-title">${escapeHtml(course?.name || 'Course not found')}</div>
                        <div class="enrollment-description">
                            ${escapeHtml(course?.description?.substring(0, 120) || 'No description available')}
                            ${course?.description?.length > 120 ? '...' : ''}
                        </div>
                        <div class="enrollment-status ${statusClass}">
                            <i class="fas ${statusIcon}"></i> ${enrollment.status?.toUpperCase() || 'PENDING'}
                        </div>
                        <div class="enrollment-date">
                            <i class="fas fa-calendar-alt"></i> Enrolled: ${new Date(enrollment.enrolled_at).toLocaleDateString()}
                        </div>
                        ${enrollment.progress ? `
                            <div class="progress-bar">
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" style="width: ${enrollment.progress}%"></div>
                                </div>
                                <div class="progress-text">${enrollment.progress}% Complete</div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            html += '</div>';
            container.innerHTML = html;
            
        } catch (err) {
            console.error('Error loading enrollments:', err);
            container.innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                    <p>Failed to load your enrollments</p>
                    <button class="btn-primary" onclick="loadEnrollments()" style="margin-top: 1rem;">
                        <i class="fas fa-sync-alt"></i> Retry
                    </button>
                </div>
            `;
            showToast('Failed to load enrollments', 'error');
        }
    }
    
    // ============================================
    // ESCAPE HTML (XSS Protection)
    // ============================================
    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
    
    // ============================================
    // LOGOUT
    // ============================================
    async function handleLogout() {
        try {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        } catch (err) {
            console.error('Logout error:', err);
            showToast('Failed to logout', 'error');
        }
    }
    
    // ============================================
    // AUTH STATE LISTENER
    // ============================================
    supabaseClient.auth.onAuthStateChange((event, session) => {
        console.log('Auth event:', event);
        
        if (event === 'SIGNED_OUT') {
            window.location.href = 'login.html';
        }
        
        if (event === 'TOKEN_REFRESHED') {
            console.log('Session refreshed');
        }
    });
    
    // ============================================
    // INITIALIZATION
    // ============================================
    async function init() {
        const user = await checkAuth();
        if (user) {
            await loadEnrollments();
        }
    }
    
    // Start the app
    init();
    
    // Make functions global for onclick handlers
    window.handleLogout = handleLogout;
    window.loadEnrollments = loadEnrollments;
</script>
</body>
</html>
