<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Course Player | MEI DRIVE AFRICA</title>
    <meta name="theme-color" content="#0a192f">
    
    <link rel="icon" type="image/png" sizes="512x512" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAgAAAAIAAQMAAADOtka5AAAAA1BMVEUAAACnej3aAAAAAXRSTlMAQObYZgAAAAlwSFlzAAAOxAAADsQBlSsOGwAAAARnQU1BAACxjwv8YQUAAAB7SURBVHgB7dJBDQAACAMx6J/b6AxoCIaBbAUAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADg5gQ7/QABMpVFSAAAAABJRU5ErkJggg==">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="supabase.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a192f 0%, #0d2137 50%, #0a192f 100%); color: #ffffff; line-height: 1.6; min-height: 100vh; }
        :root { --primary: #00ff88; --primary-dark: #00cc66; --border: rgba(0,255,136,0.25); --text-muted: #a0b3d9; --bg-card: rgba(13,33,55,0.8); }
        
        .navbar { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,25,47,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 1000; padding: 0.8rem 2rem; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.3rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: #0a192f; }
        .logo span { color: var(--primary); }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links button { background: transparent; border: none; color: #a0b3d9; padding: 8px 14px; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        .nav-links button:hover { background: rgba(0,255,136,0.1); color: var(--primary); }
        .btn { padding: 12px 28px; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #0a192f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,255,136,0.3); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: rgba(0,255,136,0.1); }
        .btn-sm { padding: 8px 20px; font-size: 13px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        .progress-bar { background: #1e2a3a; border-radius: 10px; height: 6px; margin: 12px 0; }
        .progress-fill { background: var(--primary); height: 6px; border-radius: 10px; width: 0%; transition: width 0.3s; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #1e2a3a; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 60px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1100; }
        .toast { background: #0d2137; border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); margin-top: 3rem; }
        .user-badge { background: rgba(0,255,136,0.15); border-radius: 40px; padding: 6px 16px; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
        .mobile-menu { display: none; font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        .units-sidebar { background: rgba(13,33,55,0.8); backdrop-filter: blur(10px); border-radius: 20px; padding: 1.5rem; border: 1px solid var(--border); position: sticky; top: 90px; height: fit-content; }
        .unit-item { padding: 12px 16px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; transition: 0.2s; border-left: 3px solid transparent; }
        .unit-item:hover { background: rgba(0,255,136,0.08); }
        .unit-item.active { background: rgba(0,255,136,0.15); border-left-color: var(--primary); }
        .unit-number { font-size: 11px; color: var(--primary); font-weight: 600; }
        .unit-title { font-size: 14px; font-weight: 500; margin-top: 4px; }
        .unit-duration { font-size: 11px; opacity: 0.6; margin-top: 6px; }
        .main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 2rem; }
        .lesson-content { line-height: 1.8; padding: 1rem 0; }
        .lesson-content h1, .lesson-content h2, .lesson-content h3 { color: var(--primary); margin: 1rem 0 0.5rem; }
        .lesson-content ul, .lesson-content ol { margin-left: 1.5rem; }
        .lesson-content p { margin-bottom: 1rem; }
        .lesson-nav { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; flex-wrap: wrap; }
        .badge { display: inline-block; background: rgba(0,255,136,0.2); color: var(--primary); font-size: 0.7rem; padding: 4px 10px; border-radius: 50px; margin-left: 10px; }
        
        @media (max-width: 768px) { 
            .nav-links { display: none; width: 100%; flex-direction: column; padding: 1rem 0; } 
            .nav-links.show { display: flex; } 
            .mobile-menu { display: block; } 
            .main-grid { grid-template-columns: 1fr; }
            .units-sidebar { position: relative; top: 0; margin-bottom: 1rem; }
            .container { padding: 0 16px; }
        }
        
        button:disabled, .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #0d2137; border-radius: 28px; padding: 2rem; max-width: 450px; width: 90%; border: 1px solid var(--primary); }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; background: #0f1a2c; border: 1px solid var(--border); border-radius: 12px; color: white; }
    </style>
</head>
<body>
<div id="app">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <div class="logo-icon">M</div>
                MEI DRIVE <span>AFRICA</span>
            </div>
            <div class="mobile-menu" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></div>
            <div class="nav-links" id="navLinks">
                <button onclick="window.location.href='index.html'"><i class="fas fa-home"></i> Home</button>
                <button onclick="window.location.href='index.html?page=courses'"><i class="fas fa-book"></i> Courses</button>
                <div id="authButtons"></div>
            </div>
        </div>
    </nav>
    <main id="page-content"><div class="loading-spinner"></div></main>
    <footer>© 2026 MEI DRIVE AFRICA | Drive Safe, Arrive Alive</footer>
</div>
<div id="toast-container"></div>

<script>
    const MEI = window.MEIDrive;
    
    let currentUser = null;
    let currentCourse = null;
    let courseLessons = [];
    let currentLessonIndex = 0;
    let userEnrollments = {};
    let userProgress = 0;
    
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function toggleMobileMenu() { document.getElementById('navLinks')?.classList.toggle('show'); }
    
    async function loadCourseData(courseId) {
        try {
            currentCourse = await MEI.getCourseById(courseId);
            if (!currentCourse) throw new Error('Course not found');
            
            courseLessons = await MEI.getLessonsByCourseId(courseId);
            if (courseLessons.length === 0) {
                courseLessons = [{
                    id: 0,
                    title: 'Welcome to ' + currentCourse.name,
                    content: `<h2>Welcome to ${currentCourse.name}</h2><p>${currentCourse.description || 'Start your journey to becoming a certified driver.'}</p><h3>What you will learn:</h3><ul><li>Road safety fundamentals</li><li>Defensive driving techniques</li><li>Kenyan traffic rules</li></ul>`,
                    order: 1,
                    estimated_minutes: 15
                }];
            }
            
            await loadUserData();
            renderCoursePlayer();
        } catch (err) {
            document.getElementById('page-content').innerHTML = `
                <div class="container" style="padding-top:120px;">
                    <div class="card" style="background:rgba(13,33,55,0.8); border-radius:20px; padding:2rem; text-align:center;">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:#ff4757;"></i>
                        <h2>Course Not Found</h2>
                        <p>${escapeHtml(err.message)}</p>
                        <button class="btn btn-primary" onclick="window.location.href='index.html'">Back to Courses</button>
                    </div>
                </div>`;
        }
    }
    
    async function loadUserData() {
        currentUser = await MEI.getCurrentUser();
        updateAuthUI();
        
        if (currentUser && currentCourse) {
            const enrollments = await MEI.getUserEnrollments(currentUser.id);
            userEnrollments = {};
            enrollments.forEach(e => { userEnrollments[e.course_id] = true; });
            
            const progressData = await MEI.getUserProgress(currentUser.id, currentCourse.id);
            userProgress = progressData.progress || 0;
        }
    }
    
    function updateAuthUI() {
        const container = document.getElementById('authButtons');
        if (!container) return;
        if (currentUser) {
            container.innerHTML = `<div class="user-badge"><i class="fas fa-user-check"></i> ${escapeHtml(currentUser.email.split('@')[0])}</div><button onclick="logout()" class="btn-outline btn-sm">Logout</button>`;
        } else {
            container.innerHTML = `<button onclick="showAuthModal('login')" class="btn-outline btn-sm">Login</button><button onclick="showAuthModal('signup')" class="btn-primary btn-sm">Sign Up</button>`;
        }
    }
    
    async function logout() { 
        await MEI.signOut();
        window.location.href = 'index.html';
    }
    
    function showAuthModal(mode) {
        document.getElementById('page-content').innerHTML = `
            <div class="modal" style="display:flex;">
                <div class="modal-content">
                    <h2 style="text-align:center;">${mode === 'login' ? '🔐 Welcome Back' : '📝 Create Account'}</h2>
                    ${mode === 'signup' ? '<input type="text" id="signupName" placeholder="Full Name">' : ''}
                    <input type="email" id="authEmail" placeholder="Email address">
                    <input type="password" id="authPassword" placeholder="Password (min 6 characters)">
                    <button class="btn btn-primary" style="width:100%" onclick="handleAuth('${mode}')">${mode === 'login' ? 'Login' : 'Sign Up'}</button>
                    <p style="margin-top:1rem; text-align:center;">
                        ${mode === 'login' ? 'No account? ' : 'Already have an account? '}
                        <span style="color:var(--primary);cursor:pointer;" onclick="showAuthModal('${mode === 'login' ? 'signup' : 'login'}')">${mode === 'login' ? 'Sign Up' : 'Login'}</span>
                    </p>
                    <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="location.reload()">Cancel</button>
                </div>
            </div>`;
    }
    
    async function handleAuth(mode) {
        const email = document.getElementById('authEmail')?.value.trim();
        const password = document.getElementById('authPassword')?.value;
        const fullName = document.getElementById('signupName')?.value;
        
        if (!email || !password) { showToast('Please fill all fields', 'error'); return; }
        if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
        
        let result;
        if (mode === 'signup') {
            result = await MEI.signUp(email, password, fullName);
            if (result.success) {
                showToast('Account created! Please verify your email.', 'success');
                showAuthModal('login');
            } else {
                showToast(result.error, 'error');
            }
        } else {
            result = await MEI.signIn(email, password);
            if (result.success) {
                currentUser = result.user;
                await loadUserData();
                renderCoursePlayer();
                showToast('Logged in!', 'success');
            } else {
                showToast(result.error, 'error');
            }
        }
    }
    
    function isEnrolled() { return userEnrollments[currentCourse?.id] === true; }
    
    async function enrollCourse() {
        if (!currentUser) { showAuthModal('login'); return; }
        
        // For demo, free enrollment (in production, use M-Pesa)
        const result = await MEI.createEnrollment(currentUser.id, currentCourse.id, currentCourse.price);
        if (result.success) {
            userEnrollments[currentCourse.id] = true;
            showToast('✅ Enrolled successfully!', 'success');
            renderCoursePlayer();
        } else {
            showToast('Enrollment failed', 'error');
        }
    }
    
    async function markComplete(lessonIndex) {
        if (!currentUser) { showToast('Login to track progress', 'warning'); showAuthModal('login'); return; }
        
        const newProgress = Math.min(100, userProgress + Math.floor(100 / courseLessons.length));
        const result = await MEI.updateProgress(currentUser.id, currentCourse.id, newProgress);
        
        if (result.success) {
            userProgress = newProgress;
            showToast(`🎉 Progress: ${newProgress}%`, 'success');
            
            if (currentLessonIndex < courseLessons.length - 1) {
                currentLessonIndex++;
                renderCoursePlayer();
                window.scrollTo({ top: 100, behavior: 'smooth' });
            } else {
                renderCoursePlayer();
                showToast('🏆 Course completed!', 'success');
            }
        }
    }
    
    function formatLessonContent(content) {
        if (!content) return '<p>Content coming soon...</p>';
        let html = content;
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/^\* (.*$)/gm, '<li>$1</li>');
        html = html.replace(/<li>.*?<\/li>/gs, match => `<ul>${match}</ul>`);
        html = html.replace(/^(?!<[hl]|<ul|<li)(.*$)/gm, '<p>$1</p>');
        return html;
    }
    
    function renderCoursePlayer() {
        if (!currentCourse) return;
        
        if (!isEnrolled() && currentCourse.price > 0) {
            document.getElementById('page-content').innerHTML = `
                <div class="container" style="padding-top: 100px; max-width: 600px;">
                    <div class="card" style="background:rgba(13,33,55,0.8); border-radius:20px; padding:2rem; text-align:center;">
                        <i class="fas fa-lock" style="font-size: 3rem; color: var(--primary);"></i>
                        <h2 style="margin-top:1rem;">${escapeHtml(currentCourse.name)}</h2>
                        <p>${escapeHtml(currentCourse.description || 'Premium course content')}</p>
                        <div style="font-size: 2rem; color: var(--primary); margin: 1rem 0;">KES ${(currentCourse.price || 0).toLocaleString()}</div>
                        <button class="btn btn-primary" onclick="enrollCourse()"><i class="fas fa-shopping-cart"></i> Enroll Now</button>
                        <button class="btn btn-outline" style="margin-top:1rem;" onclick="window.location.href='index.html'">Back to Courses</button>
                    </div>
                </div>`;
            return;
        }
        
        if (!courseLessons.length) {
            document.getElementById('page-content').innerHTML = '<div class="loading-spinner"></div>';
            return;
        }
        
        const currentLesson = courseLessons[currentLessonIndex];
        const completedCount = Math.floor((userProgress / 100) * courseLessons.length);
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px;">
                <div class="main-grid">
                    <div class="units-sidebar">
                        <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                            <h3><i class="fas fa-book-open"></i> Course Units</h3>
                            <span style="color:var(--primary);">${completedCount}/${courseLessons.length}</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${userProgress}%"></div></div>
                        ${courseLessons.map((lesson, idx) => `
                            <div class="unit-item ${idx === currentLessonIndex ? 'active' : ''}" onclick="changeLesson(${idx})">
                                <div class="unit-number">UNIT ${lesson.order || idx + 1}</div>
                                <div class="unit-title">${escapeHtml(lesson.title)}</div>
                                <div class="unit-duration"><i class="far fa-clock"></i> ${lesson.estimated_minutes || 15} min</div>
                                ${idx < completedCount ? '<div><i class="fas fa-check-circle" style="color:var(--primary); font-size:11px;"></i> Completed</div>' : ''}
                            </div>
                        `).join('')}
                    </div>
                    <div class="card" style="background:rgba(13,33,55,0.8); border-radius:20px; padding:1.8rem;">
                        <div style="display:flex; justify-content:space-between; flex-wrap:wrap; margin-bottom:1rem;">
                            <h2>${escapeHtml(currentLesson.title)}</h2>
                            <span style="background:var(--primary); color:#0a192f; padding:4px 12px; border-radius:50px;">Lesson ${currentLessonIndex + 1}/${courseLessons.length}</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${userProgress}%"></div></div>
                        <div class="lesson-content">${formatLessonContent(currentLesson.content)}</div>
                        <div class="lesson-nav">
                            <button class="btn btn-outline" onclick="prevLesson()" ${currentLessonIndex === 0 ? 'disabled' : ''}><i class="fas fa-arrow-left"></i> Previous</button>
                            <button class="btn btn-primary" onclick="markComplete(${currentLessonIndex})"><i class="fas fa-check-double"></i> Mark Complete</button>
                            <button class="btn btn-outline" onclick="nextLesson()" ${currentLessonIndex === courseLessons.length - 1 ? 'disabled' : ''}>Next <i class="fas fa-arrow-right"></i></button>
                        </div>
                        <div style="margin-top: 1.5rem; text-align: center;">
                            <button class="btn btn-outline btn-sm" onclick="window.location.href='index.html'"><i class="fas fa-home"></i> Back to Home</button>
                        </div>
                    </div>
                </div>
            </div>`;
    }
    
    function changeLesson(index) { 
        if (index >= 0 && index < courseLessons.length) { 
            currentLessonIndex = index; 
            renderCoursePlayer(); 
            window.scrollTo({ top: 100, behavior: 'smooth' }); 
        } 
    }
    
    function prevLesson() { if (currentLessonIndex > 0) changeLesson(currentLessonIndex - 1); }
    function nextLesson() { if (currentLessonIndex < courseLessons.length - 1) changeLesson(currentLessonIndex + 1); }
    
    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');
        
        if (!courseId) {
            document.getElementById('page-content').innerHTML = `
                <div class="container" style="padding-top:120px;">
                    <div class="card" style="text-align:center; max-width:500px; margin:0 auto;">
                        <i class="fas fa-exclamation-circle" style="font-size:3rem; color:var(--primary);"></i>
                        <h2>No Course Selected</h2>
                        <button class="btn btn-primary" onclick="window.location.href='index.html'">View Courses</button>
                    </div>
                </div>`;
            return;
        }
        
        await loadCourseData(parseInt(courseId));
    }
    
    window.enrollCourse = enrollCourse;
    window.markComplete = markComplete;
    window.changeLesson = changeLesson;
    window.prevLesson = prevLesson;
    window.nextLesson = nextLesson;
    window.showAuthModal = showAuthModal;
    window.handleAuth = handleAuth;
    window.logout = logout;
    
    init();
</script>
</body>
</html>
