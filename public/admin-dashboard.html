<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard | MEI Drive Africa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#041B3D;
    color:#fff;
}

.sidebar{
    position:fixed;
    width:250px;
    height:100vh;
    background:#0A234F;
    padding:20px;
}

.sidebar h2{
    color:#00FF88;
}

.sidebar a{
    display:block;
    color:#B7C4D6;
    padding:10px;
    text-decoration:none;
    margin-top:10px;
    border-radius:8px;
}

.sidebar a:hover{
    background:#00FF88;
    color:#041B3D;
}

.main{
    margin-left:250px;
    padding:20px;
}

.card{
    background:#0A234F;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.stat{
    background:#041B3D;
    padding:20px;
    border-radius:12px;
    text-align:center;
    border:1px solid #00FF88;
}

button{
    background:#00FF88;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #333;
}

th{
    color:#00FF88;
}

.logout{
    margin-top:20px;
    background:red;
    color:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>🚗 MEI ADMIN</h2>

<a href="#" onclick="show('dashboard')">Dashboard</a>
<a href="#" onclick="show('courses')">Courses</a>
<a href="#" onclick="show('users')">Users</a>
<a href="#" onclick="show('enrollments')">Enrollments</a>

<button class="logout" onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Dashboard</h2>

<div class="grid">
<div class="stat">
<h3 id="coursesCount">0</h3>
<p>Courses</p>
</div>

<div class="stat">
<h3 id="usersCount">0</h3>
<p>Users</p>
</div>

<div class="stat">
<h3 id="enrollmentsCount">0</h3>
<p>Enrollments</p>
</div>
</div>

</div>

<!-- COURSES -->
<div id="courses" style="display:none">
<div class="card">
<h2>Courses</h2>
<button onclick="loadCourses()">Refresh</button>
<div id="coursesTable"></div>
</div>
</div>

<!-- USERS -->
<div id="users" style="display:none">
<div class="card">
<h2>Users</h2>
<div id="usersTable"></div>
</div>
</div>

<!-- ENROLLMENTS -->
<div id="enrollments" style="display:none">
<div class="card">
<h2>Enrollments</h2>
<div id="enrollmentsTable"></div>
</div>
</div>

</div>

<script>

const supabase = supabase.createClient(
"https://jeksrwrzzrczamxijvwl.supabase.co",
"YOUR_SUPABASE_ANON_KEY"
);

let user = null;

/* CHECK ADMIN */
async function checkAdmin(){

const { data:{ session } } = await supabase.auth.getSession();

if(!session){
window.location.href = "/admin-login.html";
return;
}

user = session.user;

/* check role */
const { data:profile } = await supabase
.from("profiles")
.select("role")
.eq("id", user.id)
.single();

if(profile?.role !== "admin"){
alert("Not admin");
await supabase.auth.signOut();
window.location.href = "/login.html";
}

}

/* LOAD STATS */
async function loadStats(){

const { count: courses } = await supabase.from("courses").select("*", { count:"exact", head:true });
const { count: users } = await supabase.from("profiles").select("*", { count:"exact", head:true });
const { count: enrollments } = await supabase.from("enrollments").select("*", { count:"exact", head:true });

document.getElementById("coursesCount").innerText = courses || 0;
document.getElementById("usersCount").innerText = users || 0;
document.getElementById("enrollmentsCount").innerText = enrollments || 0;

}

/* COURSES */
async function loadCourses(){

const { data } = await supabase.from("courses").select("*");

let html = `<table>
<tr><th>Name</th><th>Type</th><th>Price</th></tr>`;

data.forEach(c=>{
html += `
<tr>
<td>${c.name}</td>
<td>${c.type}</td>
<td>${c.price}</td>
</tr>`;
});

html += "</table>";

document.getElementById("coursesTable").innerHTML = html;

}

/* USERS */
async function loadUsers(){

const { data } = await supabase.from("profiles").select("*");

let html = `<table>
<tr><th>Name</th><th>Email</th><th>Role</th></tr>`;

data.forEach(u=>{
html += `
<tr>
<td>${u.full_name || ""}</td>
<td>${u.email}</td>
<td>${u.role}</td>
</tr>`;
});

html += "</table>";

document.getElementById("usersTable").innerHTML = html;

}

/* ENROLLMENTS */
async function loadEnrollments(){

const { data } = await supabase
.from("enrollments")
.select("*, profiles(full_name), courses(name)");

let html = `<table>
<tr><th>User</th><th>Course</th><th>Progress</th></tr>`;

data.forEach(e=>{
html += `
<tr>
<td>${e.profiles?.full_name}</td>
<td>${e.courses?.name}</td>
<td>${e.progress}%</td>
</tr>`;
});

html += "</table>";

document.getElementById("enrollmentsTable").innerHTML = html;

}

/* NAV */
function show(page){

document.querySelectorAll(".main > div")
.forEach(d => d.style.display = "none");

document.getElementById(page).style.display = "block";

if(page==="courses") loadCourses();
if(page==="users") loadUsers();
if(page==="enrollments") loadEnrollments();

}

/* LOGOUT */
async function logout(){
await supabase.auth.signOut();
window.location.href="/login.html";
}

/* INIT */
checkAdmin();
loadStats();

</script>

</body>
</html>
