<!--
  ============================================================
  MEI DRIVE AFRICA — ADMIN DASHBOARD
  Full course + quiz management with image uploads
  ============================================================
  USAGE:
  1) Place this file in your project root as admin.html
  2) Make sure supabase.js is in the same directory
  3) Only users with is_admin = true in user_profiles can access
  4) Quiz images are stored in the 'quiz-images/questions' bucket
  5) Course images are stored in the 'course-images' bucket
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | MEI DRIVE AFRICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js">
    </script>
    <script src="supabase.js">
    </script>
    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a192f;
            color: #fff;
            line-height: 1.5;
        }
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc66;
            --border: rgba(0, 255, 136, 0.25);
            --text-muted: #a0b3d9;
            --bg-card: #0d2137;
            --danger: #ff4757;
            --warning: #ffa502;
            --success: #00ff88;
        }

        /* ----- LAYOUT ----- */
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 260px;
            background: #0d2137;
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 24px 28px 60px;
        }

        /* ----- SIDEBAR ----- */
        .sidebar-header {
            padding: 22px 20px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header .logo {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .sidebar-header .logo i {
            -webkit-text-fill-color: var(--primary);
            font-size: 1.4rem;
        }
        .nav-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
            border-left: 3px solid transparent;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .nav-item:hover {
            background: rgba(0, 255, 136, 0.06);
            color: var(--primary);
        }
        .nav-item.active {
            background: rgba(0, 255, 136, 0.10);
            color: var(--primary);
            border-left-color: var(--primary);
        }
        .nav-item i {
            width: 22px;
            text-align: center;
            font-size: 1.1rem;
        }
        .nav-item .badge-nav {
            margin-left: auto;
            background: rgba(0, 255, 136, 0.15);
            color: var(--primary);
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 30px;
        }

        /* ----- TOP BAR ----- */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .topbar h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .topbar h1 span {
            color: var(--primary);
        }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .real-time-badge {
            background: rgba(0, 255, 136, 0.12);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 40px;
            padding: 5px 16px;
            font-size: 12px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .real-time-badge i {
            font-size: 12px;
        }
        .user-chip {
            background: rgba(0, 255, 136, 0.10);
            border-radius: 40px;
            padding: 6px 16px 6px 14px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }
        .user-chip i {
            color: var(--primary);
        }

        /* ----- CARDS ----- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px 24px;
            margin-bottom: 24px;
            transition: 0.2s;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }
        .card-header h2 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header h2 i {
            color: var(--primary);
        }

        /* ----- STATS GRID ----- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            transition: 0.2s;
        }
        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .stat-title {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary);
        }

        /* ----- TABLE ----- */
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
        }
        th,
        td {
            padding: 11px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        th {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td img.thumb {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        td .img-placeholder {
            width: 48px;
            height: 48px;
            background: #1a2f44;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 18px;
        }

        /* ----- BUTTONS ----- */
        .btn {
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.82rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #0a192f;
        }
        .btn-primary:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 16px rgba(0, 255, 136, 0.3);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover {
            background: #e03a4a;
        }
        .btn-warning {
            background: var(--warning);
            color: #0a192f;
        }
        .btn-warning:hover {
            background: #e09400;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.72rem;
        }
        .btn-xs {
            padding: 2px 10px;
            font-size: 0.65rem;
            border-radius: 6px;
        }

        /* ----- MODAL ----- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 100%;
            max-width: 640px;
            padding: 28px 32px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-content h2 {
            font-size: 1.3rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-content h2 i {
            color: var(--primary);
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close:hover {
            color: #fff;
            transform: rotate(90deg);
        }
        .modal-content label {
            display: block;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 14px;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .modal-content label.required::after {
            content: ' *';
            color: var(--danger);
        }
        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 10px 14px;
            background: #0f1a2c;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 0.92rem;
            transition: 0.2s;
        }
        .modal-content input:focus,
        .modal-content textarea:focus,
        .modal-content select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.10);
        }
        .modal-content textarea {
            min-height: 80px;
            resize: vertical;
        }
        .modal-content select option {
            background: #0d2137;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .file-input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 8px 0;
        }
        .file-input-wrapper input[type="file"] {
            flex: 1;
            padding: 8px;
            background: #0f1a2c;
            border: 1px dashed var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 0.82rem;
        }
        .file-input-wrapper input[type="file"]::-webkit-file-upload-button {
            background: rgba(0, 255, 136, 0.12);
            border: none;
            border-radius: 6px;
            padding: 6px 16px;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
        }
        .file-preview {
            margin-top: 8px;
            max-width: 120px;
            max-height: 80px;
            border-radius: 8px;
            border: 1px solid var(--border);
            object-fit: cover;
        }
        .current-image-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .current-image-label img {
            max-height: 40px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        /* ----- TOAST ----- */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            background: var(--bg-card);
            border-left: 4px solid var(--primary);
            padding: 12px 22px;
            border-radius: 12px;
            animation: slideUp 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            font-size: 0.9rem;
            max-width: 400px;
        }
        .toast.error {
            border-left-color: var(--danger);
        }
        .toast.warning {
            border-left-color: var(--warning);
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ----- LOADER ----- */
        .loader {
            width: 36px;
            height: 36px;
            border: 3px solid #1e2a3a;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ----- MISC ----- */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 2.8rem;
            opacity: 0.3;
            margin-bottom: 12px;
        }
        .badge-status {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-active {
            background: rgba(0, 255, 136, 0.15);
            color: var(--primary);
        }
        .badge-inactive {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .gap-8 {
            gap: 8px;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mt-16 {
            margin-top: 16px;
        }
        .text-muted {
            color: var(--text-muted);
        }
        .text-primary {
            color: var(--primary);
        }
        .fw-600 {
            font-weight: 600;
        }
        .truncate {
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
            vertical-align: middle;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 820px) {
            .sidebar {
                transform: translateX(-100%);
                width: 260px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 16px;
            }
            .topbar h1 {
                font-size: 1.2rem;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .modal-content {
                padding: 20px;
                max-width: 100%;
            }
            .mobile-toggle {
                display: flex !important;
            }
        }
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .topbar {
                flex-direction: column;
                align-items: stretch;
            }
            .topbar-right {
                justify-content: space-between;
            }
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1.4rem;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0a192f;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>

    <!-- ============================================================
    ADMIN CONTAINER
    ============================================================ -->
    <div class="admin-container">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo" onclick="window.location.href='index.html'">
                    <i class="fas fa-car"></i>
                    <span>MEI DRIVE</span>
                </div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;padding-left:4px;">Admin Panel</div>
            </div>
            <nav>
                <div class="nav-item active" data-tab="courses" onclick="switchTab('courses')">
                    <i class="fas fa-book-open"></i> Courses
                    <span class="badge-nav" id="courseCount">0</span>
                </div>
                <div class="nav-item" data-tab="units" onclick="switchTab('units')">
                    <i class="fas fa-list-ul"></i> Units / Lessons
                    <span class="badge-nav" id="unitCount">0</span>
                </div>
                <div class="nav-item" data-tab="quiz" onclick="switchTab('quiz')">
                    <i class="fas fa-question-circle"></i> Quiz Questions
                    <span class="badge-nav" id="quizCount">0</span>
                </div>
                <div class="nav-item" data-tab="stats" onclick="switchTab('stats')">
                    <i class="fas fa-chart-pie"></i> Statistics
                </div>
                <div class="nav-item" onclick="window.location.href='index.html'">
                    <i class="fas fa-arrow-left"></i> Back to Site
                </div>
                <div class="nav-item" onclick="logoutAdmin()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- TOP BAR -->
            <div class="topbar">
                <div style="display:flex;align-items:center;gap:14px;">
                    <button class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 id="pageTitle">📚 <span>Courses</span></h1>
                </div>
                <div class="topbar-right">
                    <span class="real-time-badge"><i class="fas fa-sync-alt fa-fw"></i> Live Sync</span>
                    <span class="user-chip" id="adminUserChip"><i class="fas fa-user-shield"></i> Admin</span>
                </div>
            </div>

            <!-- DYNAMIC CONTENT -->
            <div id="tabContent">
                <div class="loader"></div>
            </div>

        </main>
    </div>

    <!-- ============================================================
    TOAST CONTAINER
    ============================================================ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================================
    MODAL ROOT
    ============================================================ -->
    <div id="modalRoot"></div>

    <!-- ============================================================
    JAVASCRIPT — Full Admin Logic
    ============================================================ -->
    <script>
        // ----------------------------------------------
        // GLOBALS
        // ----------------------------------------------
        const MEI = window.MEIDrive;
        let currentUser = null;
        let currentTab = 'courses';
        let allCourses = [];
        let allUnits = [];
        let allQuiz = [];
        let allEnrollments = [];
        let allPayments = [];
        let allUsers = [];
        let unsubscribeCourses = null;
        let editingCourseId = null;
        let editingUnitId = null;
        let editingQuizId = null;

        // ----------------------------------------------
        // TOAST
        // ----------------------------------------------
        function showToast(msg, type = 'success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast' + (type === 'error' ? ' error' : type === 'warning' ? ' warning' : '');
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
            t.innerHTML = `${icon} ${msg}`;
            c.appendChild(t);
            setTimeout(() => t.remove(), 4500);
        }

        // ----------------------------------------------
        // SIDEBAR / NAV
        // ----------------------------------------------
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.nav-item[data-tab="${tab}"]`)?.classList.add('active');

            const titles = {
                courses: '📚 <span>Courses</span>',
                units: '📋 <span>Units / Lessons</span>',
                quiz: '❓ <span>Quiz Questions</span>',
                stats: '📊 <span>Statistics</span>'
            };
            document.getElementById('pageTitle').innerHTML = titles[tab] || '📚 <span>Courses</span>';

            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('open');

            renderTab(tab);
        }

        // ----------------------------------------------
        // LOAD DATA
        // ----------------------------------------------
        async function loadAllData() {
            try {
                const [courses, units, quiz, enrollments, payments, users] = await Promise.all([
                    MEI.getAllCourses(),
                    supabase.from('units').select('*').order('course_id, unit_number'),
                    MEI.getAllQuizQuestions(),
                    MEI.getAllEnrollments(),
                    MEI.getAllPayments(),
                    MEI.getAllUsers()
                ]);
                allCourses = courses;
                allUnits = units.data || [];
                allQuiz = quiz;
                allEnrollments = enrollments;
                allPayments = payments;
                allUsers = users;

                // Update badges
                document.getElementById('courseCount').textContent = allCourses.length;
                document.getElementById('unitCount').textContent = allUnits.length;
                document.getElementById('quizCount').textContent = allQuiz.length;

                return true;
            } catch (e) {
                console.error('Load data error:', e);
                return false;
            }
        }

        // ----------------------------------------------
        // RENDER TAB
        // ----------------------------------------------
        function renderTab(tab) {
            const container = document.getElementById('tabContent');
            if (tab === 'courses') renderCourses(container);
            else if (tab === 'units') renderUnits(container);
            else if (tab === 'quiz') renderQuiz(container);
            else if (tab === 'stats') renderStats(container);
        }

        // ============================================================
        // COURSES TAB
        // ============================================================
        function renderCourses(container) {
            container.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-book-open"></i> All Courses</h2>
                        <button class="btn btn-primary" onclick="showCourseModal()"><i class="fas fa-plus"></i> Add Course</button>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Image</th><th>Name</th><th>Price</th><th>Duration</th><th>Units</th><th>Actions</th></tr>
                            </thead>
                            <tbody>
                                ${allCourses.length === 0 ? `<tr><td colspan="7" class="empty-state"><i class="fas fa-inbox"></i> No courses yet</td></tr>` :
                                allCourses.map(c => `
                                    <tr>
                                        <td>${c.id}</td>
                                        <td>

        async function saveCourse(e) {
            e.preventDefault();
            const id = editingCourseId;
            const name = document.getElementById('cf_name').value.trim();
            const short_name = document.getElementById('cf_short').value.trim() || name;
            const description = document.getElementById('cf_desc').value.trim();
            const price = parseInt(document.getElementById('cf_price').value) || 0;
            const duration = document.getElementById('cf_duration').value.trim();
            const icon = document.getElementById('cf_icon').value.trim() || 'fa-car';
            const color = document.getElementById('cf_color').value.trim() || '#00ff88';
            const lessons_count = parseInt(document.getElementById('cf_lessons').value) || 0;
            const category = document.getElementById('cf_category').value.trim();
            const fileInput = document.getElementById('cf_image');
            const imageFile = fileInput?.files?.[0] || null;

            if (!name) { showToast('Course name is required', 'error'); return; }

            const data = { name, short_name, description, price, duration, icon, color, lessons_count, category };

            let result;
            if (id) {
                result = await MEI.updateCourse(id, data, imageFile);
            } else {
                result = await MEI.addCourse(data, imageFile);
            }

            if (result.success) {
                showToast(id ? '✅ Course updated!' : '✅ Course created!');
                closeModal('courseModal');
                await loadAllData();
                renderTab(currentTab);
            } else {
                showToast(result.error || 'Operation failed', 'error');
            }
        }

        async function deleteCourse(id) {
            if (!confirm('Delete this course? This will also remove its units and associated images.')) return;
            const result = await MEI.deleteCourse(id);
            if (result.success) {
                showToast('✅ Course deleted');
                await loadAllData();
                renderTab(currentTab);
            } else {
                showToast(result.error || 'Delete failed', 'error');
            }
        }

        async function saveUnit(e) {
            e.preventDefault();
            const id = editingUnitId;
            const course_id = parseInt(document.getElementById('uf_course').value);
            const unit_number = parseInt(document.getElementById('uf_number').value);
            const title = document.getElementById('uf_title').value.trim();
            const content = document.getElementById('uf_content').value.trim();
            const video_url = document.getElementById('uf_video').value.trim();

            if (!title) { showToast('Title is required', 'error'); return; }
            if (!course_id) { showToast('Please select a course', 'error'); return; }

            const data = { course_id, unit_number, title, content, video_url };

            let result;
            if (id) {
                result = await supabase.from('units').update(data).eq('id', id);
            } else {
                result = await supabase.from('units').insert(data);
            }

            if (!result.error) {
                showToast(id ? '✅ Unit updated!' : '✅ Unit created!');
                closeModal('unitModal');
                await loadAllData();
                renderTab(currentTab);
            } else {
                showToast(result.error.message, 'error');
            }
        }

            if (!confirm('Delete this unit?')) return;
            const { error } = await supabase.from('units').delete().eq('id', id);
            if (!error) {
                showToast('✅ Unit deleted');
                await loadAllData();
                renderTab(currentTab);

                showToast(error.message, 'error');

            { unit_number: 2, title: 'FUNDAMENTAL DRIVING RULES',
                content: 'The road is governed by rules and regulations that ensure order is maintained on the roads at all times. These rules and regulations are derived from international, regional and Kenyan law. As a road user, you should be knowledgeable of these rules as it is the initial step in ensuring that you and other road users are safe on the road.\n\n## The Traffic Act\n\nThe Traffic Act sets out the laws that govern the use of roads and the expected conduct of road users. It also includes some of the penalties and fines for road users who do not abide by these laws.\n\n## Highway Code\n\nThe Highway Code is a set of information, advice, guides and mandatory rules for all road users in Kenya. It provides guidelines for animal, pedestrians, cyclists and motorcyclists. The purpose of the Highway Code is to promote safety, responsible behaviour and courtesy at all times.' },

        async function bulkImportLearnerHub() {
            const courseId = 1; // LEARNER HUB course ID
            const confirmMsg =
                `This will import/update ${LEARNER_HUB_UNITS.length} units for course ID ${courseId}.\nExisting units with matching unit_number will be updated.\n\nProceed?`;
            if (!confirm(confirmMsg)) return;

            let success = 0,
                errors = 0;
            for (const u of LEARNER_HUB_UNITS) {
                const { error } = await supabase.from('units').upsert({
                    course_id: courseId,
                    unit_number: u.unit_number,
                    title: u.title,
                    content: u.content,
                    video_url: null
                }, { onConflict: 'course_id, unit_number' });

                if (error) {
                    console.error(`Failed unit ${u.unit_number}:`, error);
                    errors++;
                } else {
                    success++;
                }
            }

            showToast(`✅ Import complete: ${success} units added/updated, ${errors} errors`);
            await loadAllData();
            renderTab(currentTab);
        }

                                allQuiz.map(q => `
                                    <tr>
                                        <td>${q.id}</td>
                                        <td>
                                            ${q.image_url ? `<img src="${q.image_url}" class="thumb" alt="quiz image" />` :
                                            `<div class="img-placeholder"><i class="fas fa-image"></i></div>`}
                                        </td>
                                        <td><span class="badge-status badge-active">${escapeHtml(q.category || 'General')}</span></td>
                                        <td><span class="truncate" title="${escapeHtml(q.question)}">${escapeHtml(q.question.substring(0, 60))}${q.question.length > 60 ? '…' : ''}</span></td>
                                        <td>${String.fromCharCode(65 + (q.correct_option || 0))}</td>
                                        <td>
                                            <button class="btn btn-warning btn-xs" onclick="showQuizModal(${q.id})"><i class="fas fa-edit"></i></button>
                                            <button class="btn btn-danger btn-xs" onclick="deleteQuiz(${q.id})"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // ----------------------------------------------
        // QUIZ MODAL (Add / Edit) with Image Upload & Previews
        // ----------------------------------------------
        function showQuizModal(quizId = null) {
            editingQuizId = quizId;
            const isEdit = !!quizId;
            const q = isEdit ? allQuiz.find(x => x.id === quizId) : null;

            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.id = 'quizModal';
            modal.innerHTML = `
                <div class="modal-content">
                    <button class="modal-close" onclick="closeModal('quizModal')">&times;</button>
                    <h2><i class="fas ${isEdit ? 'fa-edit' : 'fa-plus-circle'}"></i> ${isEdit ? 'Edit' : 'Add'} Quiz Question</h2>
                    <form id="quizForm" onsubmit="saveQuiz(event)">
                        <label class="required">Category</label>
                        <input type="text" id="qf_category" value="${escapeHtml(q?.category || '')}" placeholder="e.g. Road Signs" required />

                        <label>Subcategory (optional)</label>
                        <input type="text" id="qf_subcategory" value="${escapeHtml(q?.subcategory || '')}" placeholder="e.g. Warning Signs" />

                        <label class="required">Question</label>
                        <textarea id="qf_question" rows="3" required>${escapeHtml(q?.question || '')}</textarea>

                        <label class="required">Option A</label>
                        <input type="text" id="qf_a" value="${escapeHtml(q?.option_a || '')}" required />

                        <label class="required">Option B</label>
                        <input type="text" id="qf_b" value="${escapeHtml(q?.option_b || '')}" required />

                        <label class="required">Option C</label>
                        <input type="text" id="qf_c" value="${escapeHtml(q?.option_c || '')}" required />

                        <label class="required">Option D</label>
                        <input type="text" id="qf_d" value="${escapeHtml(q?.option_d || '')}" required />

                        <label class="required">Correct Option</label>
                        <select id="qf_correct" required>
                            ${['A','B','C','D'].map((letter, idx) =>
                                `<option value="${idx}" ${q?.correct_option === idx ? 'selected' : ''}>${letter}</option>`
                            ).join('')}
                        </select>

                        <label>Explanation (optional)</label>
                        <textarea id="qf_explanation" rows="3">${escapeHtml(q?.explanation || '')}</textarea>

                        <label>Difficulty (1-5)</label>
                        <input type="number" id="qf_difficulty" value="${q?.difficulty || 1}" min="1" max="5" />

                        <label>Question Image</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="qf_image" accept="image/jpeg,image/png,image/webp,image/gif" />
                            <span style="font-size:0.75rem;color:var(--text-muted);">Max 5MB, JPEG/PNG/WEBP/GIF</span>
                        </div>
                        <!-- Current image preview -->
                        ${q?.image_url ? `
                            <div style="margin-top:6px;">
                                <span class="current-image-label">Current: <img src="${q.image_url}" alt="current" style="max-height:60px;border-radius:6px;border:1px solid var(--border);" /></span>
                            </div>
                        ` : ''}
                        <!-- New image preview (hidden until file selected) -->
                        <div id="newImagePreviewContainer" style="display:none;margin-top:6px;">
                            <span class="current-image-label">New: <img id="newImagePreview" src="#" alt="new preview" style="max-height:60px;border-radius:6px;border:1px solid var(--border);" /></span>
                            <button type="button" onclick="clearNewImagePreview()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:0.8rem;margin-left:8px;">✕</button>
                        </div>

                        <div class="modal-actions">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> ${isEdit ? 'Update' : 'Create'}</button>
                            <button type="button" class="btn btn-outline" onclick="closeModal('quizModal')">Cancel</button>
                        </div>
                    </form>
                </div>
            `;
            document.getElementById('modalRoot').appendChild(modal);

            // Attach preview handler for new image
            const fileInput = document.getElementById('qf_image');
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                const previewContainer = document.getElementById('newImagePreviewContainer');
                const previewImg = document.getElementById('newImagePreview');
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        previewImg.src = ev.target.result;
                        previewContainer.style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                } else {
                    previewContainer.style.display = 'none';
                    previewImg.src = '#';
                }
            });
        }

        // Helper to clear the new image preview
        function clearNewImagePreview() {
            const fileInput = document.getElementById('qf_image');
            if (fileInput) fileInput.value = '';
            const container = document.getElementById('newImagePreviewContainer');
            const img = document.getElementById('newImagePreview');
            if (container) container.style.display = 'none';
            if (img) img.src = '#';
        }

        // ----------------------------------------------
        // SAVE QUIZ (with dedicated quiz image upload)
        // ----------------------------------------------
        async function saveQuiz(e) {
            e.preventDefault();
            const id = editingQuizId;
            const category = document.getElementById('qf_category').value.trim();
            const subcategory = document.getElementById('qf_subcategory').value.trim();
            const question = document.getElementById('qf_question').value.trim();
            const option_a = document.getElementById('qf_a').value.trim();
            const option_b = document.getElementById('qf_b').value.trim();
            const option_c = document.getElementById('qf_c').value.trim();
            const option_d = document.getElementById('qf_d').value.trim();
            const correct_option = parseInt(document.getElementById('qf_correct').value);
            const explanation = document.getElementById('qf_explanation').value.trim();
            const difficulty = parseInt(document.getElementById('qf_difficulty').value) || 1;
            const fileInput = document.getElementById('qf_image');
            const imageFile = fileInput?.files?.[0] || null;

            if (!category || !question || !option_a || !option_b || !option_c || !option_d) {
                showToast('Please fill all required fields', 'error');
                return;
            }

            const data = { category, subcategory, question, option_a, option_b, option_c, option_d, correct_option,
                explanation, difficulty };

            // If there's a new image, upload it to the quiz bucket
            let imageUrl = null;
            let imagePath = null;
            if (imageFile) {
                try {
                    const uploaded = await MEI.uploadQuizImage(imageFile);
                    if (uploaded?.url) {
                        imageUrl = uploaded.url;
                        imagePath = uploaded.path;
                        data.image_url = imageUrl;
                        data.image_path = imagePath;
                    } else {
                        showToast('Image upload failed – no URL returned', 'warning');
                        return;
                    }
                } catch (err) {
                    showToast('Image upload error: ' + err.message, 'error');
                    return;
                }
            }

            // If no new image, but editing and existing image exists, keep it
            if (!imageFile && id) {
                const existing = allQuiz.find(x => x.id === id);
                if (existing?.image_url) {
                    data.image_url = existing.image_url;
                    data.image_path = existing.image_path;
                }
            }

            let result;
            try {
                if (id) {
                    result = await supabase.from('quiz_questions').update(data).eq('id', id);
                } else {
                    result = await supabase.from('quiz_questions').insert(data);
                }

                if (result.error) throw result.error;

                showToast(id ? '✅ Quiz updated!' : '✅ Quiz created!');
                closeModal('quizModal');
                await loadAllData();
                renderTab(currentTab);
            } catch (dbError) {
                // If we uploaded an image but DB insert failed, try to delete the orphaned image
                if (imagePath) {
                    await MEI.deleteQuizImage(imagePath).catch(() => {});
                }
                showToast('Database error: ' + dbError.message, 'error');
                console.error('DB error:', dbError);
            }
        }

        async function deleteQuiz(id) {
            if (!confirm('Delete this quiz question?')) return;
            const q = allQuiz.find(x => x.id === id);
            const { error } = await supabase.from('quiz_questions').delete().eq('id', id);
            if (!error) {
                if (q?.image_path) {
                    try {
                        await MEI.deleteQuizImage(q.image_path);
                    } catch (e) { /* ignore */ }
                }
                showToast('✅ Quiz deleted');
                await loadAllData();
                renderTab(currentTab);
            } else {
                showToast(error.message, 'error');
            }
        }

        // ============================================================
        // STATS TAB
        // ============================================================
        function renderStats(container) {
            const totalRevenue = allPayments.reduce((sum, p) => sum + (p.amount || 0), 0);
            const totalEnrollments = allEnrollments.length;
            const totalUsers = allUsers.length;
            const totalCourses = allCourses.length;
            const totalUnits = allUnits.length;
            const totalQuiz = allQuiz.length;

            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-title">Total Users</div><div class="stat-value">${totalUsers}</div></div>
                    <div class="stat-card"><div class="stat-title">Courses</div><div class="stat-value">${totalCourses}</div></div>
                    <div class="stat-card"><div class="stat-title">Units / Lessons</div><div class="stat-value">${totalUnits}</div></div>
                    <div class="stat-card"><div class="stat-title">Quiz Questions</div><div class="stat-value">${totalQuiz}</div></div>
                    <div class="stat-card"><div class="stat-title">Enrollments</div><div class="stat-value">${totalEnrollments}</div></div>
                    <div class="stat-card"><div class="stat-title">Total Revenue</div><div class="stat-value">KES ${totalRevenue.toLocaleString()}</div></div>
                </div>
                <div class="card">
                    <h2><i class="fas fa-database"></i> System Status</h2>
                    <p>✅ Real-time sync active — changes appear instantly</p>
                    <p>✅ Supabase Single Source of Truth</p>
                    <p>✅ ${allPayments.length} payments processed</p>
                    <p>✅ ${allEnrollments.length} active enrollments</p>
                </div>
                <div class="card">
                    <h2><i class="fas fa-image"></i> Storage Buckets</h2>
                    <p><code>course-images</code> — used for course images</p>
                    <p><code>quiz-images/questions</code> — used for quiz images</p>
                    <p style="margin-top:4px;font-size:0.85rem;color:var(--text-muted);">
                        Images are stored in Supabase Storage and served via public URL.
                        Admin can upload/update images when creating or editing courses and quiz questions.
                    </p>
                </div>
            `;
        }

        // ============================================================
        // UTILITY
        // ============================================================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function closeModal(id) {
            document.getElementById(id)?.remove();
        }

        // ============================================================
        // AUTH
        // ============================================================
        async function logoutAdmin() {
            await MEI.signOut();
            window.location.href = 'index.html';
        }

        // ============================================================
        // INIT
        // ============================================================
        async function initAdmin() {
            // Check user
            const user = await MEI.getCurrentUser();
            if (!user) {
                document.getElementById('tabContent').innerHTML = `
                    <div class="card" style="text-align:center;padding:60px 20px;">
                        <i class="fas fa-lock" style="font-size:3rem;color:var(--primary);"></i>
                        <h2 style="margin:20px 0 10px;">Admin Access Required</h2>
                        <p class="text-muted">Please sign in with an admin account</p>
                        <button class="btn btn-primary" onclick="window.location.href='index.html'">Back to Site</button>
                    </div>
                `;
                return;
            }
            if (!user.is_admin) {
                document.getElementById('tabContent').innerHTML = `
                    <div class="card" style="text-align:center;padding:60px 20px;">
                        <i class="fas fa-ban" style="font-size:3rem;color:var(--danger);"></i>
                        <h2 style="margin:20px 0 10px;">Access Denied</h2>
                        <p class="text-muted">You do not have admin privileges.</p>
                        <button class="btn btn-primary" onclick="window.location.href='index.html'">Back to Site</button>
                    </div>
                `;
                return;
            }

            currentUser = user;
            document.getElementById('adminUserChip').innerHTML = `<i class="fas fa-user-shield"></i> ${escapeHtml(user.full_name || 'Admin')}`;

            await loadAllData();

            // Subscribe to course changes for real-time updates
            if (unsubscribeCourses) unsubscribeCourses();
            unsubscribeCourses = MEI.subscribeToCourses(async (updated) => {
                allCourses = updated;
                document.getElementById('courseCount').textContent = allCourses.length;
                // Also reload units & quiz in background
                const { data: units } = await supabase.from('units').select('*').order('course_id, unit_number');
                allUnits = units || [];
                document.getElementById('unitCount').textContent = allUnits.length;
                const quiz = await MEI.getAllQuizQuestions();
                allQuiz = quiz;
                document.getElementById('quizCount').textContent = allQuiz.length;
                if (currentTab === 'courses' || currentTab === 'units' || currentTab === 'quiz') {
                    renderTab(currentTab);
                }
            });

            renderTab('courses');
        }

        // ----------------------------------------------
        // START
        // ----------------------------------------------
        document.addEventListener('DOMContentLoaded', initAdmin);

        // Expose to window
        window.switchTab = switchTab;
        window.toggleSidebar = toggleSidebar;
        window.showCourseModal = showCourseModal;
        window.saveCourse = saveCourse;
        window.deleteCourse = deleteCourse;
        window.showUnitModal = showUnitModal;
        window.saveUnit = saveUnit;
        window.deleteUnit = deleteUnit;
        window.showQuizModal = showQuizModal;
        window.saveQuiz = saveQuiz;
        window.deleteQuiz = deleteQuiz;
        window.clearNewImagePreview = clearNewImagePreview;
        window.bulkImportLearnerHub = bulkImportLearnerHub;
        window.closeModal = closeModal;
        window.logoutAdmin = logoutAdmin;
        window.showToast = showToast;
        window.escapeHtml = escapeHtml;
    </script>

</body>
</html>
