<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MEI DRIVE AFRICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a192f; color: #ffffff; line-height: 1.5; }
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc66;
            --gradient-green: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            --dark-card: #0d2137;
            --border: rgba(0, 255, 136, 0.25);
            --text-muted: #a0b3d9;
        }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: #0d2137;
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 20px;
        }
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: var(--gradient-green);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }
        .nav-item i { width: 24px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #0d2137;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .stat-title { color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--primary); }
        .card {
            background: #0d2137;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h2 { font-size: 1.3rem; color: var(--primary); }
        .data-table { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--primary); font-weight: 600; }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-primary { background: var(--gradient-green); color: #0a192f; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-warning { background: #ffa502; color: #0a192f; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-success { background: #00cc66; color: white; }
        .btn-info { background: #3498db; color: white; }
        .btn-sm { padding: 4px 12px; font-size: 0.75rem; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0d2137;
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content textarea, .modal-content select {
            background: #0f1a2c;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            color: white;
            width: 100%;
            margin: 8px 0;
        }
        .modal-content label { font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; display: block; }
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2100;
        }
        .toast {
            background: #0d2137;
            border-left: 4px solid var(--primary);
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 8px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e2a3a;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .chart-container { max-width: 100%; height: 300px; margin: 20px 0; }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-success { background: #00cc6633; color: #00ff88; border: 1px solid #00ff88; }
        .badge-warning { background: #ffa50233; color: #ffa502; border: 1px solid #ffa502; }
        .badge-danger { background: #ff475733; color: #ff4757; border: 1px solid #ff4757; }
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            background: #0f1a2c;
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
        }
        .price-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .price-input-group input {
            width: 120px;
            margin: 0;
        }
        .inline-edit {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar .nav-text { display: none; }
            .main-content { margin-left: 70px; }
            .stats-grid { grid-template-columns: 1fr; }
            .price-input-group { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo" onclick="window.location.href='index.html'">
                <i class="fas fa-car"></i>
                <span class="nav-text">MEI DRIVE</span>
            </div>
        </div>
        <nav>
            <div class="nav-item" onclick="setTab('dashboard')"><i class="fas fa-chart-line"></i><span class="nav-text">Dashboard</span></div>
            <div class="nav-item" onclick="setTab('courses')"><i class="fas fa-book"></i><span class="nav-text">Courses</span></div>
            <div class="nav-item" onclick="setTab('payments')"><i class="fas fa-credit-card"></i><span class="nav-text">Payments</span></div>
            <div class="nav-item" onclick="setTab('users')"><i class="fas fa-users"></i><span class="nav-text">Users</span></div>
            <div class="nav-item" onclick="setTab('enrollments')"><i class="fas fa-graduation-cap"></i><span class="nav-text">Enrollments</span></div>
            <div class="nav-item" onclick="setTab('quiz')"><i class="fas fa-question-circle"></i><span class="nav-text">Quiz</span></div>
            <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="nav-text">Logout</span></div>
        </nav>
    </div>
    <div class="main-content">
        <div id="adminContent"><div class="loading-spinner"></div></div>
    </div>
</div>
<div id="toast-container" class="toast-container"></div>

<script>
    const SUPABASE_URL = 'https://qpqkmmkrzxlhcpccefjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s';
    
    let supabase = null;
    let currentUser = null;
    let currentTab = 'dashboard';
    
    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${msg} <button onclick="this.parentElement.remove()" style="background:none; border:none; color:#00ff88; cursor:pointer; margin-left:10px;">×</button>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    async function init() {
        if (!window.supabase) {
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (!window.supabase) {
                document.getElementById('adminContent').innerHTML = '<div class="card"><h2>⚠️ Connection Error</h2><p>Unable to load Supabase. Please refresh.</p></div>';
                return;
            }
        }
        
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            showLoginModal();
            return;
        }
        
        currentUser = session.user;
        
        const { data: profile } = await supabase
            .from('user_profiles')
            .select('is_admin')
            .eq('id', currentUser.id)
            .single();
        
        if (!profile?.is_admin) {
            document.getElementById('adminContent').innerHTML = `
                <div class="card">
                    <h2>⛔ Access Denied</h2>
                    <p>You don't have admin privileges.</p>
                    <button class="btn btn-primary" onclick="window.location.href='index.html'">Back to Home</button>
                </div>
            `;
            return;
        }
        
        renderAdminDashboard();
    }
    
    async function renderAdminDashboard() {
        const [usersRes, coursesRes, enrollmentsRes, paymentsRes, quizRes] = await Promise.all([
            supabase.from('user_profiles').select('id', { count: 'exact', head: true }),
            supabase.from('courses').select('id', { count: 'exact', head: true }),
            supabase.from('enrollments').select('id', { count: 'exact', head: true }),
            supabase.from('payments').select('amount', { count: 'exact', head: true }),
            supabase.from('quiz_questions').select('id', { count: 'exact', head: true })
        ]);
        
        const stats = {
            users: usersRes.count || 0,
            courses: coursesRes.count || 0,
            enrollments: enrollmentsRes.count || 0,
            payments: paymentsRes.count || 0,
            quiz: quizRes.count || 0
        };
        
        const statsHtml = `<div class="stats-grid">
            <div class="stat-card"><div class="stat-title">Total Users</div><div class="stat-value">${stats.users}</div></div>
            <div class="stat-card"><div class="stat-title">Courses</div><div class="stat-value">${stats.courses}</div></div>
            <div class="stat-card"><div class="stat-title">Enrollments</div><div class="stat-value">${stats.enrollments}</div></div>
            <div class="stat-card"><div class="stat-title">Payments</div><div class="stat-value">${stats.payments}</div></div>
            <div class="stat-card"><div class="stat-title">Quiz Questions</div><div class="stat-value">${stats.quiz}</div></div>
        </div>`;
        
        let contentHtml = '';
        if (currentTab === 'dashboard') contentHtml = await renderDashboardContent();
        else if (currentTab === 'courses') contentHtml = await renderCoursesContent();
        else if (currentTab === 'payments') contentHtml = await renderPaymentsContent();
        else if (currentTab === 'users') contentHtml = await renderUsersContent();
        else if (currentTab === 'enrollments') contentHtml = await renderEnrollmentsContent();
        else if (currentTab === 'quiz') contentHtml = await renderQuizContent();
        
        document.getElementById('adminContent').innerHTML = statsHtml + contentHtml;
        highlightActiveNav();
    }
    
    async function renderDashboardContent() {
        const { data: recentPayments } = await supabase.from('payments').select('*, user_profiles(email), courses(name)').order('created_at', { ascending: false }).limit(10);
        const { data: recentEnrollments } = await supabase.from('enrollments').select('*, user_profiles(email), courses(name)').order('enrolled_at', { ascending: false }).limit(10);
        
        return `
            <div class="card">
                <h2>💰 Recent Payments</h2>
                <div class="data-table">
                    <table>
                        <thead><tr><th>User</th><th>Course</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody>${recentPayments?.map(p => `<tr>
                            <td>${escapeHtml(p.user_profiles?.email || 'N/A')}</td>
                            <td>${escapeHtml(p.courses?.name || 'N/A')}</td>
                            <td>KES ${p.amount?.toLocaleString() || 0}</td>
                            <td><span class="badge ${p.status === 'completed' ? 'badge-success' : 'badge-warning'}">${p.status || 'pending'}</span></td>
                            <td>${new Date(p.created_at).toLocaleDateString()}</td>
                        </tr>`).join('') || '<tr><td colspan="5">No payments yet</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <h2>📋 Recent Enrollments</h2>
                <div class="data-table">
                    <table>
                        <thead><tr><th>User</th><th>Course</th><th>Amount</th><th>Date</th></tr></thead>
                        <tbody>${recentEnrollments?.map(e => `<tr>
                            <td>${escapeHtml(e.user_profiles?.email || 'N/A')}</td>
                            <td>${escapeHtml(e.courses?.name || 'N/A')}</td>
                            <td>KES ${e.amount_paid?.toLocaleString() || 0}</td>
                            <td>${new Date(e.enrolled_at).toLocaleDateString()}</td>
                        </tr>`).join('') || '<tr><td colspan="4">No enrollments yet</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    // ============================================
    // COURSES MANAGEMENT - Add/Edit/Delete/Update Price
    // ============================================
    async function renderCoursesContent() {
        const { data: courses } = await supabase.from('courses').select('*').order('id');
        
        return `
            <div class="card">
                <div class="card-header">
                    <h2>📚 Course Management</h2>
                    <button class="btn btn-primary" onclick="showAddCourseModal()">+ Add New Course</button>
                </div>
                <div class="data-table">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Price (KES)</th>
                                <th>Duration</th>
                                <th>Icon</th>
                                <th>Modules</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${courses?.map(c => `
                                <tr>
                                    <td>${c.id}</td>
                                    <td><strong>${escapeHtml(c.name)}</strong></td>
                                    <td><small>${escapeHtml(c.description?.substring(0, 60))}${c.description?.length > 60 ? '...' : ''}</small></td>
                                    <td>
                                        <div class="price-input-group">
                                            <span id="priceDisplay_${c.id}">KES ${c.price.toLocaleString()}</span>
                                            <input type="number" id="priceInput_${c.id}" value="${c.price}" style="display:none; width:100px;" min="0" step="100">
                                            <button class="btn btn-warning btn-sm" id="editPriceBtn_${c.id}" onclick="togglePriceEdit(${c.id})">Edit</button>
                                            <button class="btn btn-success btn-sm" id="savePriceBtn_${c.id}" onclick="updateCoursePrice(${c.id})" style="display:none;">Save</button>
                                            <button class="btn btn-outline btn-sm" id="cancelPriceBtn_${c.id}" onclick="cancelPriceEdit(${c.id})" style="display:none;">Cancel</button>
                                        </div>
                                    </td>
                                    <td>${escapeHtml(c.duration || 'N/A')}</td>
                                    <td><i class="fas ${c.icon}"></i></td>
                                    <td>${c.lessons_count || 0}</td>
                                    <td>
                                        <button class="btn btn-warning btn-sm" onclick="editCourse(${c.id})">Edit</button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteCourse(${c.id})">Delete</button>
                                    </td>
                                </tr>
                            `).join('') || '<tr><td colspan="8">No courses found</td></tr>'}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    // Price Edit Functions
    window.togglePriceEdit = (courseId) => {
        const priceSpan = document.getElementById(`priceDisplay_${courseId}`);
        const priceInput = document.getElementById(`priceInput_${courseId}`);
        const editBtn = document.getElementById(`editPriceBtn_${courseId}`);
        const saveBtn = document.getElementById(`savePriceBtn_${courseId}`);
        const cancelBtn = document.getElementById(`cancelPriceBtn_${courseId}`);
        
        if (priceSpan && priceInput) {
            priceSpan.style.display = 'none';
            priceInput.style.display = 'inline-block';
            editBtn.style.display = 'none';
            saveBtn.style.display = 'inline-block';
            cancelBtn.style.display = 'inline-block';
        }
    };
    
    window.cancelPriceEdit = (courseId) => {
        const priceSpan = document.getElementById(`priceDisplay_${courseId}`);
        const priceInput = document.getElementById(`priceInput_${courseId}`);
        const editBtn = document.getElementById(`editPriceBtn_${courseId}`);
        const saveBtn = document.getElementById(`savePriceBtn_${courseId}`);
        const cancelBtn = document.getElementById(`cancelPriceBtn_${courseId}`);
        
        if (priceSpan && priceInput) {
            // Reset input to original value
            const originalPrice = priceSpan.innerText.replace('KES ', '').replace(/,/g, '');
            priceInput.value = originalPrice;
            
            priceSpan.style.display = 'inline-block';
            priceInput.style.display = 'none';
            editBtn.style.display = 'inline-block';
            saveBtn.style.display = 'none';
            cancelBtn.style.display = 'none';
        }
    };
    
    window.updateCoursePrice = async (courseId) => {
        const priceInput = document.getElementById(`priceInput_${courseId}`);
        const newPrice = parseInt(priceInput.value);
        
        if (isNaN(newPrice) || newPrice < 0) {
            showToast('Please enter a valid price', 'error');
            return;
        }
        
        const { error } = await supabase
            .from('courses')
            .update({ price: newPrice })
            .eq('id', courseId);
        
        if (error) {
            showToast('Error updating price: ' + error.message, 'error');
            return;
        }
        
        showToast('✅ Price updated successfully!', 'success');
        renderAdminDashboard();
    };
    
    // Add Course Modal
    window.showAddCourseModal = () => {
        const modalHtml = `
            <div class="modal active" id="editModal">
                <div class="modal-content">
                    <h2>➕ Add New Course</h2>
                    <label>Course Name</label>
                    <input type="text" id="courseName" placeholder="e.g., Advanced Defensive Driving">
                    <label>Description</label>
                    <textarea id="courseDesc" rows="3" placeholder="Course description..."></textarea>
                    <label>Price (KES)</label>
                    <input type="number" id="coursePrice" placeholder="2999" min="0" step="100">
                    <label>Duration</label>
                    <input type="text" id="courseDuration" placeholder="e.g., 6 weeks">
                    <label>Icon (Font Awesome class)</label>
                    <input type="text" id="courseIcon" placeholder="fa-car" value="fa-car">
                    <label>Number of Modules/Lessons</label>
                    <input type="number" id="courseLessons" placeholder="10" min="1">
                    <label>Color (Hex)</label>
                    <input type="text" id="courseColor" placeholder="#00ff88" value="#00ff88">
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="btn btn-primary" onclick="saveNewCourse()">Save Course</button>
                        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    
    window.saveNewCourse = async () => {
        const name = document.getElementById('courseName').value;
        const description = document.getElementById('courseDesc').value;
        const price = parseInt(document.getElementById('coursePrice').value) || 0;
        const duration = document.getElementById('courseDuration').value;
        const icon = document.getElementById('courseIcon').value || 'fa-car';
        const lessons_count = parseInt(document.getElementById('courseLessons').value) || 0;
        const color = document.getElementById('courseColor').value || '#00ff88';
        
        if (!name) {
            showToast('Course name is required', 'error');
            return;
        }
        
        // Get max ID for new course
        const { data: courses } = await supabase.from('courses').select('id').order('id', { ascending: false }).limit(1);
        const newId = (courses && courses.length > 0) ? courses[0].id + 1 : 9;
        
        const { error } = await supabase.from('courses').insert({
            id: newId,
            name: name,
            description: description,
            price: price,
            duration: duration,
            icon: icon,
            lessons_count: lessons_count,
            color: color,
            created_at: new Date().toISOString()
        });
        
        if (error) {
            showToast('Error adding course: ' + error.message, 'error');
            return;
        }
        
        closeModal();
        showToast('✅ Course added successfully!');
        renderAdminDashboard();
    };
    
    // Edit Course (Full Edit)
    window.editCourse = async (id) => {
        const { data: course } = await supabase.from('courses').select('*').eq('id', id).single();
        
        const modalHtml = `
            <div class="modal active" id="editModal">
                <div class="modal-content">
                    <h2>✏️ Edit Course: ${escapeHtml(course.name)}</h2>
                    <label>Course Name</label>
                    <input type="text" id="courseName" value="${escapeHtml(course.name || '')}">
                    <label>Description</label>
                    <textarea id="courseDesc" rows="3">${escapeHtml(course.description || '')}</textarea>
                    <label>Price (KES)</label>
                    <input type="number" id="coursePrice" value="${course.price || 0}" min="0" step="100">
                    <label>Duration</label>
                    <input type="text" id="courseDuration" value="${escapeHtml(course.duration || '')}">
                    <label>Icon (Font Awesome class)</label>
                    <input type="text" id="courseIcon" value="${escapeHtml(course.icon || 'fa-car')}">
                    <label>Number of Modules/Lessons</label>
                    <input type="number" id="courseLessons" value="${course.lessons_count || 0}" min="0">
                    <label>Color (Hex)</label>
                    <input type="text" id="courseColor" value="${escapeHtml(course.color || '#00ff88')}">
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button class="btn btn-primary" onclick="saveEditedCourse(${id})">Save Changes</button>
                        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    
    window.saveEditedCourse = async (id) => {
        const name = document.getElementById('courseName').value;
        const description = document.getElementById('courseDesc').value;
        const price = parseInt(document.getElementById('coursePrice').value) || 0;
        const duration = document.getElementById('courseDuration').value;
        const icon = document.getElementById('courseIcon').value || 'fa-car';
        const lessons_count = parseInt(document.getElementById('courseLessons').value) || 0;
        const color = document.getElementById('courseColor').value || '#00ff88';
        
        const { error } = await supabase
            .from('courses')
            .update({
                name: name,
                description: description,
                price: price,
                duration: duration,
                icon: icon,
                lessons_count: lessons_count,
                color: color,
                updated_at: new Date().toISOString()
            })
            .eq('id', id);
        
        if (error) {
            showToast('Error updating course: ' + error.message, 'error');
            return;
        }
        
        closeModal();
        showToast('✅ Course updated successfully!');
        renderAdminDashboard();
    };
    
    window.deleteCourse = async (id) => {
        if (confirm('⚠️ Are you sure you want to delete this course? This action cannot be undone.')) {
            const { error } = await supabase.from('courses').delete().eq('id', id);
            if (error) {
                showToast('Error deleting course: ' + error.message, 'error');
                return;
            }
            showToast('✅ Course deleted successfully!');
            renderAdminDashboard();
        }
    };
    
    // ============================================
    // PAYMENTS MANAGEMENT
    // ============================================
    async function renderPaymentsContent() {
        const { data: payments } = await supabase.from('payments').select('*, user_profiles(email), courses(name)').order('created_at', { ascending: false });
        const totalRevenue = payments?.reduce((sum, p) => sum + (p.amount || 0), 0) || 0;
        
        return `
            <div class="card">
                <div class="card-header">
                    <h2>💰 Payment Transactions</h2>
                    <div class="stat-card" style="padding: 10px 20px;"><span class="stat-title">Total Revenue:</span> <span class="stat-value" style="font-size: 1.5rem;">KES ${totalRevenue.toLocaleString()}</span></div>
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>User</th><th>Course</th><th>Amount</th><th>Status</th><th>Transaction ID</th><th>Date</th></tr></thead>
                        <tbody>${payments?.map(p => `<tr>
                            <td>${escapeHtml(p.user_profiles?.email || 'N/A')}</td>
                            <td>${escapeHtml(p.courses?.name || 'N/A')}</td>
                            <td>KES ${p.amount?.toLocaleString() || 0}</td>
                            <td><span class="badge ${p.status === 'completed' ? 'badge-success' : 'badge-warning'}">${p.status || 'pending'}</span></td>
                            <td><small>${escapeHtml(p.transaction_id || '-')}</small></td>
                            <td>${new Date(p.created_at).toLocaleDateString()}</td>
                        </tr>`).join('') || '<tr><td colspan="6">No payments found</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    // ============================================
    // USERS MANAGEMENT
    // ============================================
    async function renderUsersContent() {
        const { data: users } = await supabase.from('user_profiles').select('*').order('created_at', { ascending: false });
        
        return `
            <div class="card">
                <h2>👥 User Management</h2>
                <div class="data-table">
                    <table>
                        <thead><tr><th>Email</th><th>Full Name</th><th>Admin</th><th>Joined</th><th>Actions</th></tr></thead>
                        <tbody>${users?.map(u => `<tr>
                            <td>${escapeHtml(u.email || 'N/A')}</td>
                            <td>${escapeHtml(u.full_name || '-')}</td>
                            <td>${u.is_admin ? '<span class="badge badge-success">Admin</span>' : '<span class="badge">User</span>'}</td>
                            <td>${new Date(u.created_at).toLocaleDateString()}</td>
                            <td><button class="btn btn-warning btn-sm" onclick="toggleAdmin('${u.id}', ${!u.is_admin})">${u.is_admin ? 'Remove Admin' : 'Make Admin'}</button></td>
                        </tr>`).join('') || '<tr><td colspan="5">No users found</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    // ============================================
    // ENROLLMENTS MANAGEMENT
    // ============================================
    async function renderEnrollmentsContent() {
        const { data: enrollments } = await supabase.from('enrollments').select('*, user_profiles(email), courses(name)').order('enrolled_at', { ascending: false });
        
        return `
            <div class="card">
                <h2>📋 Enrollment Records</h2>
                <div class="data-table">
                    <table>
                        <thead><tr><th>User</th><th>Course</th><th>Amount Paid</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody>${enrollments?.map(e => `<tr>
                            <td>${escapeHtml(e.user_profiles?.email || 'N/A')}</td>
                            <td>${escapeHtml(e.courses?.name || 'N/A')}</td>
                            <td>KES ${e.amount_paid?.toLocaleString() || 0}</td>
                            <td><span class="badge badge-success">${e.status || 'active'}</span></td>
                            <td>${new Date(e.enrolled_at).toLocaleDateString()}</td>
                        </tr>`).join('') || '<tr><td colspan="5">No enrollments found</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    // ============================================
    // QUIZ MANAGEMENT
    // ============================================
    async function renderQuizContent() {
        const { data: questions } = await supabase.from('quiz_questions').select('*').limit(20);
        
        return `
            <div class="card">
                <div class="card-header">
                    <h2>❓ Quiz Questions</h2>
                    <button class="btn btn-primary" onclick="showAddQuestionModal()">+ Add Question</button>
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>ID</th><th>Category</th><th>Question</th><th>Correct Answer</th><th>Actions</th></tr></thead>
                        <tbody>${questions?.map(q => `<tr>
                            <td>${q.id}</td>
                            <td>${escapeHtml(q.category)}</span></td>
                            <td><small>${escapeHtml(q.question?.substring(0, 60))}...</small></td>
                            <td>${q.correct_answer || ['A', 'B', 'C', 'D'][q.correct_option]}</span></td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="editQuestion(${q.id})">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteQuestion(${q.id})">Delete</button>
                            </td>
                        </tr>`).join('') || '<tr><td colspan="5">No questions found</td></tr>'}</tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    window.showAddQuestionModal = () => {
        const modalHtml = `
            <div class="modal active" id="editModal">
                <div class="modal-content">
                    <h2>➕ Add Quiz Question</h2>
                    <label>Category</label>
                    <select id="qCategory"><option value="Road Signs">Road Signs</option><option value="Highway Code">Highway Code</option><option value="Defensive Driving">Defensive Driving</option><option value="Traffic Rules">Traffic Rules</option><option value="Emergency">Emergency</option><option value="Motorcycle">Motorcycle</option><option value="PSV">PSV</option></select>
                    <label>Question</label>
                    <textarea id="qQuestion" rows="2" placeholder="Enter question..."></textarea>
                    <label>Option A</label><input type="text" id="qOptA" placeholder="Option A">
                    <label>Option B</label><input type="text" id="qOptB" placeholder="Option B">
                    <label>Option C</label><input type="text" id="qOptC" placeholder="Option C">
                    <label>Option D</label><input type="text" id="qOptD" placeholder="Option D">
                    <label>Correct Answer</label><select id="qCorrect"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select>
                    <label>Explanation</label><textarea id="qExplanation" rows="2" placeholder="Explanation..."></textarea>
                    <div style="display: flex; gap: 10px; margin-top: 20px;"><button class="btn btn-primary" onclick="saveNewQuestion()">Save</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    
    window.saveNewQuestion = async () => {
        const { error } = await supabase.from('quiz_questions').insert({
            category: document.getElementById('qCategory').value,
            question: document.getElementById('qQuestion').value,
            option_a: document.getElementById('qOptA').value,
            option_b: document.getElementById('qOptB').value,
            option_c: document.getElementById('qOptC').value,
            option_d: document.getElementById('qOptD').value,
            correct_option: parseInt(document.getElementById('qCorrect').value),
            explanation: document.getElementById('qExplanation').value,
            is_active: true
        });
        if (error) { showToast('Error: ' + error.message, 'error'); return; }
        closeModal();
        showToast('✅ Question added!');
        renderAdminDashboard();
    };
    
    window.editQuestion = async (id) => {
        const { data: q } = await supabase.from('quiz_questions').select('*').eq('id', id).single();
        const modalHtml = `
            <div class="modal active" id="editModal">
                <div class="modal-content">
                    <h2>✏️ Edit Question</h2>
                    <label>Category</label>
                    <select id="qCategory"><option value="Road Signs" ${q.category === 'Road Signs' ? 'selected' : ''}>Road Signs</option><option value="Highway Code" ${q.category === 'Highway Code' ? 'selected' : ''}>Highway Code</option><option value="Defensive Driving" ${q.category === 'Defensive Driving' ? 'selected' : ''}>Defensive Driving</option><option value="Traffic Rules" ${q.category === 'Traffic Rules' ? 'selected' : ''}>Traffic Rules</option><option value="Emergency" ${q.category === 'Emergency' ? 'selected' : ''}>Emergency</option><option value="Motorcycle" ${q.category === 'Motorcycle' ? 'selected' : ''}>Motorcycle</option><option value="PSV" ${q.category === 'PSV' ? 'selected' : ''}>PSV</option></select>
                    <label>Question</label><textarea id="qQuestion" rows="2">${escapeHtml(q.question)}</textarea>
                    <label>Option A</label><input type="text" id="qOptA" value="${escapeHtml(q.option_a)}">
                    <label>Option B</label><input type="text" id="qOptB" value="${escapeHtml(q.option_b)}">
                    <label>Option C</label><input type="text" id="qOptC" value="${escapeHtml(q.option_c)}">
                    <label>Option D</label><input type="text" id="qOptD" value="${escapeHtml(q.option_d)}">
                    <label>Correct Answer</label><select id="qCorrect"><option value="0" ${q.correct_option === 0 ? 'selected' : ''}>A</option><option value="1" ${q.correct_option === 1 ? 'selected' : ''}>B</option><option value="2" ${q.correct_option === 2 ? 'selected' : ''}>C</option><option value="3" ${q.correct_option === 3 ? 'selected' : ''}>D</option></select>
                    <label>Explanation</label><textarea id="qExplanation" rows="2">${escapeHtml(q.explanation)}</textarea>
                    <div style="display: flex; gap: 10px; margin-top: 20px;"><button class="btn btn-primary" onclick="saveEditedQuestion(${id})">Save</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    
    window.saveEditedQuestion = async (id) => {
        const { error } = await supabase.from('quiz_questions').update({
            category: document.getElementById('qCategory').value,
            question: document.getElementById('qQuestion').value,
            option_a: document.getElementById('qOptA').value,
            option_b: document.getElementById('qOptB').value,
            option_c: document.getElementById('qOptC').value,
            option_d: document.getElementById('qOptD').value,
            correct_option: parseInt(document.getElementById('qCorrect').value),
            explanation: document.getElementById('qExplanation').value
        }).eq('id', id);
        if (error) { showToast('Error: ' + error.message, 'error'); return; }
        closeModal();
        showToast('✅ Question updated!');
        renderAdminDashboard();
    };
    
    window.deleteQuestion = async (id) => {
        if (confirm('Delete this question?')) {
            const { error } = await supabase.from('quiz_questions').delete().eq('id', id);
            if (error) { showToast('Error: ' + error.message, 'error'); return; }
            showToast('✅ Question deleted');
            renderAdminDashboard();
        }
    };
    
    // ============================================
    // UTILITIES
    // ============================================
    window.toggleAdmin = async (userId, makeAdmin) => {
        const { error } = await supabase.from('user_profiles').update({ is_admin: makeAdmin }).eq('id', userId);
        if (error) { showToast('Error: ' + error.message, 'error'); return; }
        showToast(`✅ User ${makeAdmin ? 'is now admin' : 'admin rights removed'}`);
        renderAdminDashboard();
    };
    
    window.setTab = (tab) => { currentTab = tab; renderAdminDashboard(); };
    window.closeModal = () => { document.getElementById('editModal')?.remove(); };
    
    function highlightActiveNav() {
        document.querySelectorAll('.nav-item').forEach((item) => {
            const text = item.querySelector('.nav-text')?.innerText?.toLowerCase() || '';
            if ((currentTab === 'dashboard' && text === 'dashboard') || text === currentTab) { item.classList.add('active'); } 
            else { item.classList.remove('active'); }
        });
    }
    
    function showLoginModal() {
        const modalHtml = `<div class="modal active" id="loginModal"><div class="modal-content"><h2>Admin Login Required</h2><p>Please sign in with your admin account</p><input type="email" id="adminEmail" placeholder="Email"><input type="password" id="adminPassword" placeholder="Password"><button class="btn btn-primary" onclick="adminLogin()">Login</button><button class="btn btn-outline" onclick="window.location.href='index.html'">Back to Site</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    
    window.adminLogin = async () => { const email = document.getElementById('adminEmail').value; const password = document.getElementById('adminPassword').value; const { error } = await supabase.auth.signInWithPassword({ email, password }); if (error) { showToast(error.message, 'error'); return; } window.location.reload(); };
    window.logout = async () => { await supabase.auth.signOut(); window.location.href = 'index.html'; };
    
    init();
</script>
</body>
</html>
