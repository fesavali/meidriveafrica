<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #041B3D, #0A234F);
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo { font-size: 48px; text-align: center; margin-bottom: 20px; }
        h2 { color: #041B3D; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        .input-group input:focus { outline: none; border-color: #00FF88; }
        
        button {
            width: 100%;
            padding: 14px;
            background: #00FF88;
            color: #041B3D;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .error {
            color: #e74c3c;
            background: #fde8e8;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .success {
            color: #27ae60;
            background: #e8f8f0;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .register-link { text-align: center; margin-top: 20px; color: #666; }
        .register-link a { color: #00FF88; text-decoration: none; font-weight: bold; }
        .back-home { text-align: center; margin-top: 15px; display: block; color: #666; text-decoration: none; }
        .back-home:hover { color: #00FF88; }
        
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #041B3D;
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">🚗</div>
    <h2>MEI DRIVE AFRICA</h2>
    <p class="subtitle">Welcome back! Login to your account</p>
    
    <div id="errorBox" class="error"></div>
    <div id="successBox" class="success"></div>
    
    <form id="loginForm">
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" id="loginBtn">Login</button>
    </form>
    
    <div class="register-link">
        Don't have an account? <a href="/register.html">Create Account</a>
    </div>
    <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
</div>

<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    
    function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = 'block';
        successBox.style.display = 'none';
        setTimeout(() => errorBox.style.display = 'none', 5000);
    }
    
    function showSuccess(message) {
        successBox.textContent = message;
        successBox.style.display = 'block';
        errorBox.style.display = 'none';
    }
    
    function setLoading(state) {
        loginBtn.disabled = state;
        loginBtn.innerHTML = state ? '<span class="loader"></span>Logging in...' : 'Login';
    }
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        
        if (!email || !password) {
            return showError('Please enter both email and password');
        }
        
        setLoading(true);
        
        try {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                setLoading(false);
                if (error.message === 'Invalid login credentials') {
                    return showError('Invalid email or password');
                }
                return showError(error.message);
            }
            
            if (data.session) {
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1000);
            }
            
        } catch (err) {
            setLoading(false);
            showError('Network error. Please try again.');
        }
    });
    
    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            form.dispatchEvent(new Event('submit'));
        }
    });
    
    async function checkExistingSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            window.location.href = '/dashboard.html';
        }
    }
    
    checkExistingSession();
</script>
</body>
</html>
