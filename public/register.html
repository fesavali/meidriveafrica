<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MEI Drive Africa</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A234F 0%, #041B3D 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(4, 27, 61, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        
        h1 {
            color: #00FF88;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #B7C4D6;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: white;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(10, 35, 79, 0.8);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #00FF88;
            background: rgba(10, 35, 79, 1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #00FF88;
            color: #041B3D;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }
        
        .message.success {
            background: rgba(0, 200, 81, 0.2);
            border: 1px solid #00C851;
            color: #00C851;
            display: block;
        }
        
        .message.error {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
            display: block;
        }
        
        .message.info {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00FF88;
            color: #00FF88;
            display: block;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #B7C4D6;
        }
        
        .login-link a {
            color: #00FF88;
            text-decoration: none;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .ntsa-badge {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #00FF88;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 MEI DRIVE AFRICA</h1>
        <div class="subtitle">Create Your Account to Start Learning</div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name <span style="color: #ff4444;">*</span></label>
                <input type="text" id="fullName" required placeholder="John Doe">
            </div>
            
            <div class="form-group">
                <label>Email Address <span style="color: #ff4444;">*</span></label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="0712345678">
            </div>
            
            <div class="form-group">
                <label>Password <span style="color: #ff4444;">*</span></label>
                <input type="password" id="password" required placeholder="Min 6 characters">
            </div>
            
            <div class="form-group">
                <label>Confirm Password <span style="color: #ff4444;">*</span></label>
                <input type="password" id="confirmPassword" required placeholder="Type password again">
            </div>
            
            <button type="submit" id="registerBtn">Create Account</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
        
        <div class="ntsa-badge">
            🎓 NTSA Certified: ILR-7WA1P62
        </div>
        
        <div id="message" class="message"></div>
    </div>
    
    <script>
        // ============================================
        // SUPABASE CONFIGURATION - FIXED INITIALIZATION
        // ============================================
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        
        // Initialize Supabase Client correctly
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        console.log('Supabase Client initialized successfully');
        
        // DOM Elements
        const form = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const messageDiv = document.getElementById('message');
        
        // Function to show message
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        // Registration handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate all fields
            if (!fullName) {
                showMessage('Please enter your full name', 'error');
                document.getElementById('fullName').focus();
                return;
            }
            
            if (!email) {
                showMessage('Please enter your email address', 'error');
                document.getElementById('email').focus();
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                document.getElementById('email').focus();
                return;
            }
            
            if (!password) {
                showMessage('Please enter a password', 'error');
                document.getElementById('password').focus();
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                document.getElementById('password').focus();
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                document.getElementById('confirmPassword').focus();
                return;
            }
            
            // Disable button and show loading
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating Account...';
            
            console.log('Attempting to register:', email);
            showMessage('Creating your account...', 'info');
            
            try {
                // Sign up with Supabase using supabaseClient
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            phone: phone || null
                        }
                    }
                });
                
                if (error) {
                    console.error('Registration error:', error);
                    
                    if (error.message.includes('User already registered')) {
                        showMessage('This email is already registered. Please login instead.', 'error');
                    } else if (error.message.includes('Password should be at least 6 characters')) {
                        showMessage('Password must be at least 6 characters', 'error');
                    } else {
                        showMessage(error.message, 'error');
                    }
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                    return;
                }
                
                if (data.user) {
                    console.log('Registration successful:', data.user);
                    
                    // Check if user is automatically logged in
                    if (data.session) {
                        // User is already logged in
                        showMessage('Account created successfully! Redirecting to dashboard...', 'success');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 2000);
                    } else {
                        // Email confirmation required
                        showMessage('Account created successfully! Please check your email for verification.', 'success');
                        
                        // Clear form
                        form.reset();
                        
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 3000);
                    }
                } else {
                    showMessage('Registration failed. Please try again.', 'error');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                }
                
            } catch (err) {
                console.error('Unexpected error:', err);
                showMessage('Network error. Please check your connection.', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });
        
        // Password validation
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        
        passwordInput.addEventListener('input', () => {
            if (passwordInput.value.length >= 6) {
                passwordInput.style.borderColor = '#00C851';
            } else if (passwordInput.value.length > 0) {
                passwordInput.style.borderColor = '#ff4444';
            } else {
                passwordInput.style.borderColor = 'rgba(255,255,255,0.2)';
            }
        });
        
        confirmPasswordInput.addEventListener('input', () => {
            if (confirmPasswordInput.value === passwordInput.value && confirmPasswordInput.value.length > 0) {
                confirmPasswordInput.style.borderColor = '#00C851';
            } else if (confirmPasswordInput.value.length > 0) {
                confirmPasswordInput.style.borderColor = '#ff4444';
            } else {
                confirmPasswordInput.style.borderColor = 'rgba(255,255,255,0.2)';
            }
        });
        
        // Email validation
        const emailInput = document.getElementById('email');
        emailInput.addEventListener('input', () => {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (emailRegex.test(emailInput.value)) {
                emailInput.style.borderColor = '#00C851';
            } else if (emailInput.value.length > 0) {
                emailInput.style.borderColor = '#ff4444';
            } else {
                emailInput.style.borderColor = 'rgba(255,255,255,0.2)';
            }
        });
        
        // Test connection on load
        async function testConnection() {
            try {
                const { data, error } = await supabaseClient
                    .from('courses')
                    .select('count', { count: 'exact', head: true });
                    
                if (error) {
                    console.error('Connection test failed:', error);
                } else {
                    console.log('✅ Supabase connection successful!');
                }
            } catch (err) {
                console.error('Connection test exception:', err);
            }
        }
        
        testConnection();
    </script>
</body>
</html>
