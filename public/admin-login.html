<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MEI DRIVE AFRICA</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --primary:#041B3D;
            --secondary:#0A234F;
            --accent:#00FF88;
            --white:#ffffff;
            --gray:#B7C4D6;
            --danger:#ff4444;
        }

        body{
            font-family:'Segoe UI',sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            background:
                linear-gradient(rgba(4,27,61,.9), rgba(10,35,79,.92)),
                url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600&auto=format&fit=crop')
                center/cover;
        }

        .login-box{
            width:100%;
            max-width:420px;
            background:rgba(4,27,61,.96);
            border:1px solid rgba(0,255,136,.15);
            border-radius:24px;
            padding:40px 30px;
            box-shadow:0 10px 40px rgba(0,0,0,.35);
            backdrop-filter:blur(8px);
        }

        .logo{
            font-size:54px;
            text-align:center;
            margin-bottom:10px;
        }

        h1{
            color:var(--accent);
            text-align:center;
            margin-bottom:10px;
        }

        .badge{
            display:inline-block;
            background:var(--accent);
            color:var(--primary);
            padding:6px 16px;
            border-radius:30px;
            font-size:.75rem;
            font-weight:700;
            margin:0 auto 30px;
        }

        .badge-wrap{
            text-align:center;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:var(--white);
            font-size:.92rem;
            font-weight:600;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border-radius:14px;
            border:2px solid rgba(0,255,136,.15);
            background:#08172e;
            color:white;
            font-size:15px;
            transition:.3s;
        }

        .input-group input:focus{
            outline:none;
            border-color:var(--accent);
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:14px;
            background:var(--accent);
            color:var(--primary);
            font-weight:700;
            font-size:1rem;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 30px rgba(0,255,136,.3);
        }

        .btn:disabled{
            opacity:.6;
            cursor:not-allowed;
        }

        .message{
            display:none;
            margin-bottom:20px;
            padding:12px;
            border-radius:12px;
            font-size:.9rem;
        }

        .error{
            background:rgba(255,68,68,.12);
            color:#ffb3b3;
            border:1px solid rgba(255,68,68,.3);
        }

        .success{
            background:rgba(0,255,136,.12);
            color:#9dffd1;
            border:1px solid rgba(0,255,136,.3);
        }

        .back{
            display:block;
            text-align:center;
            margin-top:20px;
            color:var(--gray);
            text-decoration:none;
        }

        .back:hover{
            color:var(--accent);
        }

    </style>
</head>

<body>

<div class="login-box">

    <div class="logo">🚗</div>

    <h1>MEI DRIVE AFRICA</h1>

    <div class="badge-wrap">
        <div class="badge">
            ADMINISTRATOR PANEL
        </div>
    </div>

    <div id="errorBox" class="message error"></div>
    <div id="successBox" class="message success"></div>

    <form id="loginForm">

        <div class="input-group">
            <label>Admin Email</label>

            <input
                type="email"
                id="email"
                placeholder="admin@meidriveafrica.com"
                required
            >
        </div>

        <div class="input-group">
            <label>Password</label>

            <input
                type="password"
                id="password"
                placeholder="Enter password"
                required
            >
        </div>

        <button
            type="submit"
            class="btn"
            id="loginBtn"
        >
            Login as Admin
        </button>

    </form>

    <a href="/" class="back">
        ← Back Home
    </a>

</div>

<script>

    // SUPABASE
    const SUPABASE_URL =
        'https://jeksrwrzzrczamxijvwl.supabase.co';

    const SUPABASE_ANON_KEY =
        'YOUR_SUPABASE_ANON_KEY';

    const { createClient } = window.supabase;

    const supabase =
        createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

    // ELEMENTS
    const form =
        document.getElementById('loginForm');

    const emailInput =
        document.getElementById('email');

    const passwordInput =
        document.getElementById('password');

    const loginBtn =
        document.getElementById('loginBtn');

    const errorBox =
        document.getElementById('errorBox');

    const successBox =
        document.getElementById('successBox');

    // HELPERS
    function showError(message){
        errorBox.style.display = 'block';
        successBox.style.display = 'none';
        errorBox.textContent = message;
    }

    function showSuccess(message){
        successBox.style.display = 'block';
        errorBox.style.display = 'none';
        successBox.textContent = message;
    }

    function setLoading(state){
        loginBtn.disabled = state;
        loginBtn.textContent =
            state
            ? 'Logging in...'
            : 'Login as Admin';
    }

    // CHECK EXISTING SESSION
    async function checkSession(){

        const {
            data:{ session }
        } = await supabase.auth.getSession();

        if(!session) return;

        const { data:profile } =
            await supabase
                .from('profiles')
                .select('role')
                .eq('id', session.user.id)
                .single();

        if(profile?.role === 'admin'){
            window.location.href =
                '/admin-dashboard.html';
        }
    }

    checkSession();

    // LOGIN
    form.addEventListener('submit', async (e) => {

        e.preventDefault();

        const email =
            emailInput.value.trim();

        const password =
            passwordInput.value;

        if(!email || !password){
            return showError(
                'Please enter email and password'
            );
        }

        try{

            setLoading(true);

            // LOGIN
            const { data, error } =
                await supabase.auth.signInWithPassword({
                    email,
                    password
                });

            if(error){

                setLoading(false);

                return showError(
                    error.message
                );
            }

            // VERIFY ADMIN
            const { data:profile, error:profileError } =
                await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

            if(profileError){

                await supabase.auth.signOut();

                setLoading(false);

                return showError(
                    'Failed to verify admin account'
                );
            }

            // CHECK ROLE
            if(profile?.role !== 'admin'){

                await supabase.auth.signOut();

                setLoading(false);

                return showError(
                    'Access denied'
                );
            }

            showSuccess(
                'Login successful. Redirecting...'
            );

            setTimeout(() => {

                window.location.href =
                    '/admin-dashboard.html';

            }, 1200);

        }catch(err){

            console.error(err);

            showError(
                'Something went wrong'
            );

        }finally{

            setLoading(false);

        }

    });

</script>

</body>
</html>
