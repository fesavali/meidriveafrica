<!DOCTYPE html>
<html>
<head>
    <title>Admin Quick Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #0A234F; color: white; }
        .success { color: #00FF88; }
        .error { color: #ff4444; }
        pre { background: #041B3D; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Admin Login Diagnostic</h1>
    <div id="result">Running diagnostics...</div>

    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const resultDiv = document.getElementById('result');
        
        async function runDiagnostics() {
            let html = '';
            
            // Test 1: Try to login
            html += '<h3>1. Attempting Login...</h3>';
            const { data, error } = await supabase.auth.signInWithPassword({
                email: 'admin@meidriveafrica.com',
                password: 'Admin@2026'
            });
            
            if (error) {
                html += `<div class="error">❌ Login Failed: ${error.message}</div>`;
                html += `<div class="error">This means the user does not exist or password is wrong.</div>`;
                resultDiv.innerHTML = html;
                return;
            }
            
            html += `<div class="success">✅ Login successful! User: ${data.user.email}</div>`;
            
            // Test 2: Check profile
            html += '<h3>2. Checking Profile...</h3>';
            const { data: profile, error: profileError } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', data.user.id)
                .single();
            
            if (profileError) {
                html += `<div class="error">❌ Profile not found: ${profileError.message}</div>`;
                html += '<div>Creating profile...</div>';
                
                const { error: insertError } = await supabase
                    .from('profiles')
                    .insert({
                        id: data.user.id,
                        email: 'admin@meidriveafrica.com',
                        full_name: 'Super Admin',
                        role: 'admin'
                    });
                
                if (insertError) {
                    html += `<div class="error">❌ Failed to create profile: ${insertError.message}</div>`;
                } else {
                    html += `<div class="success">✅ Profile created with admin role!</div>`;
                }
            } else {
                html += `<div class="success">✅ Profile found! Role: ${profile.role}</div>`;
                
                if (profile.role !== 'admin') {
                    html += '<div>Updating role to admin...</div>';
                    const { error: updateError } = await supabase
                        .from('profiles')
                        .update({ role: 'admin' })
                        .eq('id', data.user.id);
                    
                    if (updateError) {
                        html += `<div class="error">❌ Failed to update role: ${updateError.message}</div>`;
                    } else {
                        html += `<div class="success">✅ Role updated to admin!</div>`;
                    }
                }
            }
            
            // Test 3: Store session
            localStorage.setItem('adminToken', data.session.access_token);
            localStorage.setItem('adminEmail', data.user.email);
            
            html += '<h3>3. Ready to Redirect</h3>';
            html += `<div class="success">✅ You can now access the admin dashboard.</div>`;
            html += `<div><a href="/admin-dashboard.html" style="color: #00FF88;">→ Go to Admin Dashboard</a></div>`;
            
            resultDiv.innerHTML = html;
        }
        
        runDiagnostics();
    </script>
</body>
</html>
