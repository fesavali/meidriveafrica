                if (currentPage === 'home') renderHome();
                else if (currentPage === 'courses') renderCourses();

            .subscribe();

    async function fetchCourses() {
        try {
            const { data, error } = await supabase.from('courses').select('*').order('id');
            if (error) throw error;
            courses = data?.length ? data : FALLBACK_COURSES;
        } catch (e) {
            console.warn('Error fetching courses:', e);
            courses = FALLBACK_COURSES;
        }
    }
    
    async function fetchQuizQuestions() {
        try {
            const { data, error } = await supabase.from('quiz_questions').select('*');
            if (error) throw error;
            quizQuestions = data?.length ? data : FALLBACK_QUIZ;
        } catch (e) {
            console.warn('Error fetching quiz:', e);
            quizQuestions = FALLBACK_QUIZ;
        }
    }
    
    async function fetchUserEnrollments() {
        if (!currentUser) return;
        try {
            const { data, error } = await supabase.from('enrollments').select('course_id').eq('user_id', currentUser.id);
            if (error) throw error;
            userEnrollments = {};
            (data || []).forEach(e => { userEnrollments[e.course_id] = true; });
        } catch (e) {
            console.warn('Error fetching enrollments:', e);
            userEnrollments = {};
        }
    }
    
    async function loadData() {
        await Promise.all([fetchCourses(), fetchQuizQuestions()]);
        
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            currentUser = { id: user.id, email: user.email, is_admin: false };
            await fetchUserEnrollments();
            
            try {
                const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', user.id).maybeSingle();
                if (profile) isAdmin = profile.is_admin;
            } catch(e) {}
        }
        updateAuthUI();
        setupRealtimeSubscriptions();
    }
    
    // ============================================
    // AUTHENTICATION
    // ============================================
    function updateAuthUI() {
        const container = document.getElementById('authButtons');
        if (!container) return;
        if (currentUser) {
            container.innerHTML = `<div class="user-badge"><i class="fas fa-user-check"></i> ${escapeHtml(currentUser.email?.split('@')[0] || 'User')}</div><button onclick="logout()" class="btn-outline btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>`;
            document.getElementById('navDashboard').style.display = 'inline-block';
        } else {
            container.innerHTML = `<button onclick="showAuthModal('login')" class="btn-outline btn-sm"><i class="fas fa-key"></i> Login</button><button onclick="showAuthModal('signup')" class="btn-primary btn-sm"><i class="fas fa-user-plus"></i> Sign Up</button>`;
            document.getElementById('navDashboard').style.display = 'none';
        }
    }
    
    async function logout() { 
        await supabase.auth.signOut(); 
        currentUser = null; 
        userEnrollments = {}; 
        isAdmin = false;
        updateAuthUI(); 
        navigateTo('home'); 
        showToast('Logged out successfully', 'info'); 
    }
    
    function showAuthModal(mode) {
        document.getElementById('page-content').innerHTML = `<div class="modal" style="display:flex;"><div class="modal-content"><h2 style="text-align:center;">${mode === 'login' ? '🔐 Welcome Back' : '📝 Create Account'}</h2>${mode === 'signup' ? '<input type="text" id="signupName" placeholder="Full Name">' : ''}<input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password (min 6)"><button class="btn btn-primary" style="width:100%" onclick="handleAuth('${mode}')">${mode === 'login' ? 'Login' : 'Sign Up'}</button><p style="margin-top:1rem;text-align:center;">${mode === 'login' ? 'No account? ' : 'Have account? '}<span style="color:var(--primary);cursor:pointer;" onclick="showAuthModal('${mode === 'login' ? 'signup' : 'login'}')">${mode === 'login' ? 'Sign Up' : 'Login'}</span></p><button class="btn btn-outline" style="width:100%;margin-top:0.5rem;" onclick="navigateTo('home')">Cancel</button></div></div>`;
    }
    
    async function handleAuth(mode) {
        const email = document.getElementById('authEmail')?.value.trim();
        const password = document.getElementById('authPassword')?.value;
        const fullName = document.getElementById('signupName')?.value;
        
        if (!email || !password) { showToast('Enter email and password', 'error'); return; }
        if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
        
        if (mode === 'signup') {
            const result = await supabase.auth.signUp({ email, password });
            if (!result.error) {
                try {
                    await supabase.from('profiles').upsert({ id: result.data.user.id, email, full_name: fullName, is_admin: false, created_at: new Date() });
                } catch(e) { console.warn('Profile creation error:', e); }
                showToast('Account created! Please check your email to verify.', 'success');
                showAuthModal('login');
            } else { showToast(result.error.message, 'error'); }
        } else {
            const result = await supabase.auth.signInWithPassword({ email, password });
            if (!result.error) {
                await loadData();
                showToast(`Welcome back, ${email.split('@')[0]}!`, 'success');
                navigateTo('home');
            } else { showToast(result.error.message, 'error'); }
        }
    }
    
    // ============================================
    // COURSE ENROLLMENT
    // ============================================
    function isEnrolled(courseId) { return userEnrollments[courseId] === true; }
    
    async function enrollCourse(courseId) {
        if (!currentUser) { showAuthModal('login'); return; }
        const course = courses.find(c => c.id === courseId);
        if (!course) return;
        
        if (course.price > 0 && courseId !== 8) {
            pendingCourse = course;
            showPaymentModal(course);
        } else {
            const { error } = await supabase.from('enrollments').upsert({ 
                user_id: currentUser.id, 
                course_id: courseId, 
                amount_paid: 0, 
                enrolled_at: new Date() 
            });
            if (!error) { 
                userEnrollments[courseId] = true; 
                showToast(`✅ Successfully enrolled in ${course.name}!`, 'success'); 
                if (currentPage === 'courses') renderCourses();
                else if (currentPage === 'home') renderHome();
            } else { showToast('Enrollment failed', 'error'); }
        }
    }
    
    function showPaymentModal(course) {
        document.getElementById('page-content').innerHTML = `<div class="payment-modal" id="paymentModal"><div class="payment-card"><div class="mpesa-logo"><i class="fas fa-money-bill-wave"></i></div><h2>M-Pesa Payment</h2><p style="margin:1rem 0;">Course: <strong>${escapeHtml(course.name)}</strong></p><p style="font-size:1.8rem;color:var(--primary);">KES ${course.price.toLocaleString()}</p><div class="phone-input"><span>+254</span><input type="tel" id="mpesaPhone" placeholder="712345678" autocomplete="off"></div><p style="font-size:12px;opacity:0.7;">Enter your M-Pesa number to receive payment prompt</p><button class="btn btn-primary" style="width:100%;margin-top:1rem;" onclick="processPayment()"><i class="fas fa-arrow-right"></i> Pay Now</button><button class="btn btn-outline" style="width:100%;margin-top:0.5rem;" onclick="navigateTo('courses')">Cancel</button></div></div>`;
    }
    
    async function processPayment() {
        const phone = document.getElementById('mpesaPhone')?.value.trim();
        if (!phone) { showToast('Please enter your M-Pesa phone number', 'error'); return; }
        if (!pendingCourse || !currentUser) return;
        
        showToast(`Initiating payment of KES ${pendingCourse.price}...`, 'info');
        
        setTimeout(async () => {
            const { error } = await supabase.from('enrollments').upsert({ 
                user_id: currentUser.id, 
                course_id: pendingCourse.id, 
                amount_paid: pendingCourse.price, 
                transaction_id: 'MPESA_' + Date.now(),
                enrolled_at: new Date() 
            });
            if (!error) { 
                userEnrollments[pendingCourse.id] = true; 
                showToast('✅ Payment successful! Course unlocked.', 'success'); 
                navigateTo('courses'); 
            } else { showToast('Payment failed. Please try again.', 'error'); }
        }, 2000);
    }
    
    // ============================================
    // QUIZ FUNCTIONS
    // ============================================
    function renderQuiz() {
        if (quizState.questions.length === 0 && quizQuestions.length) {
            quizState.questions = quizQuestions.map(q => ({ 
                id: q.id, category: q.category, question: q.question, 
                options: [q.option_a, q.option_b, q.option_c, q.option_d], 
                correct: q.correct_option, explanation: q.explanation 
            }));
        }
        
        if (quizState.questions.length === 0) { 
            document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><div class="card"><h2>No quiz questions available</h2></div></div>`; 
            return; 
        }
        
        if (quizState.currentIndex >= quizState.questions.length) {
            const percent = Math.round((quizState.score / quizState.questions.length) * 100);
            document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;max-width:800px;"><div class="card" style="text-align:center;"><h2>🎉 Quiz Complete!</h2><p>Score: <strong>${quizState.score}</strong> / ${quizState.questions.length} (${percent}%)</p><div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div><button class="btn btn-primary" onclick="resetQuiz()">Restart Quiz</button><button class="btn btn-outline" onclick="navigateTo('home')">Back Home</button></div></div>`;
            return;
        }
        
        const q = quizState.questions[quizState.currentIndex];
        const hasAnswered = quizState.userAnswers[quizState.currentIndex] !== undefined;
        
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;max-width:800px;"><div class="card"><div style="display:flex;justify-content:space-between;"><span class="category-tag">${q.category}</span><span>${quizState.currentIndex+1}/${quizState.questions.length}</span></div><h3 style="margin:1rem 0;">${escapeHtml(q.question)}</h3><div>${q.options.map((opt, idx) => `<div class="quiz-option ${hasAnswered && idx === q.correct ? 'correct' : ''} ${hasAnswered && idx === quizState.userAnswers[quizState.currentIndex] && idx !== q.correct ? 'wrong' : ''}" onclick="${!hasAnswered ? `selectAnswer(${idx})` : ''}"><span style="font-weight:600;">${String.fromCharCode(65+idx)}.</span> ${escapeHtml(opt)}</div>`).join('')}</div>${hasAnswered ? `<div style="margin-top:1rem;padding:1rem;background:rgba(0,255,136,0.1);border-radius:12px;"><i class="fas ${quizState.userAnswers[quizState.currentIndex] === q.correct ? 'fa-check-circle' : 'fa-times-circle'}"></i> <strong>${quizState.userAnswers[quizState.currentIndex] === q.correct ? 'Correct!' : 'Incorrect'}</strong><p>${escapeHtml(q.explanation)}</p><div class="quiz-nav-buttons"><button class="btn btn-outline" onclick="previousQuestion()">Previous</button><button class="btn btn-primary" onclick="nextQuestion()">Next</button></div></div>` : '<p style="margin-top:1rem;text-align:center;"><i class="fas fa-hand-pointer"></i> Click on an option to answer</p>'}</div></div>`;
    }
    
    function selectAnswer(idx) { 
        if (quizState.userAnswers[quizState.currentIndex] !== undefined) return; 
        const q = quizState.questions[quizState.currentIndex]; 
        quizState.userAnswers[quizState.currentIndex] = idx; 
        if (idx === q.correct) quizState.score++; 
        renderQuiz(); 
    }
    
    function previousQuestion() { if (quizState.currentIndex > 0) { quizState.currentIndex--; renderQuiz(); } }
    function nextQuestion() { 
        if (quizState.userAnswers[quizState.currentIndex] === undefined) { showToast('Please answer the current question first', 'warning'); return; } 
        if (quizState.currentIndex < quizState.questions.length - 1) { quizState.currentIndex++; renderQuiz(); } 
        else { quizState.currentIndex++; renderQuiz(); } 
    }
    function resetQuiz() { quizState = { currentIndex: 0, score: 0, userAnswers: [], questions: [] }; renderQuiz(); }
    
    // ============================================
    // PAGE RENDERING
    // ============================================
    async function renderDashboard() {
        if (!currentUser) { navigateTo('home'); return; }
        const myCourses = courses.filter(c => isEnrolled(c.id));
        const totalSpent = myCourses.reduce((sum, c) => sum + (c.price || 0), 0);
        document.getElementById('page-content').innerHTML = `<div style="padding-top:100px;"><div class="container"><h1 class="section-title">My <span>Dashboard</span></h1><div class="stats-bar"><div class="stat-item"><h3>${myCourses.length}</h3><p>Enrolled Courses</p></div><div class="stat-item"><h3>${quizQuestions.length}</h3><p>Quiz Questions</p></div><div class="stat-item"><h3>KES ${totalSpent.toLocaleString()}</h3><p>Invested</p></div></div><h2><i class="fas fa-book-open"></i> My Courses</h2><div class="grid">${myCourses.map(c => `<div class="card" onclick="viewCourse(${c.id})"><i class="fas ${c.icon}" style="font-size:2rem;color:${c.color}"></i><h3>${escapeHtml(c.short_name)} <span class="badge">Enrolled</span></h3><p>${escapeHtml(c.description.substring(0, 100))}...</p><button class="btn btn-primary" style="margin-top:1rem;">Continue →</button></div>`).join('')}${myCourses.length === 0 ? `<div class="card" style="text-align:center;"><i class="fas fa-shopping-cart" style="font-size:3rem;color:var(--primary);"></i><h3>No Courses Yet</h3><button class="btn btn-primary" onclick="navigateTo('courses')">Browse Courses</button></div>` : ''}</div></div></div>`;
    }
    
    function renderHome() {
        const totalModules = courses.reduce((sum, c) => sum + c.lessons_count, 0);
        document.getElementById('page-content').innerHTML = `<div class="hero"><h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1><p>Professional driver training with 8 comprehensive courses and 1000+ exam questions.</p><button class="btn btn-primary" onclick="navigateTo('courses')">🚀 Explore Courses</button></div><div class="container"><div class="stats-bar"><div class="stat-item"><h3>8</h3><p>Professional Courses</p></div><div class="stat-item"><h3>${quizQuestions.length}+</h3><p>Quiz Questions</p></div><div class="stat-item"><h3>${totalModules}</h3><p>Training Modules</p></div></div><h2 class="section-title">Our <span>Courses</span></h2><div class="grid">${courses.slice(0, 4).map(c => `<div class="card" onclick="viewCourse(${c.id})"><i class="fas ${c.icon}" style="font-size:2rem;color:${c.color}"></i><h3>${escapeHtml(c.short_name)}${isEnrolled(c.id) ? '<span class="badge">Enrolled</span>' : ''}</h3><p>${escapeHtml(c.description.substring(0, 120))}...</p><div class="course-price">KES ${c.price.toLocaleString()}</div><button class="btn btn-primary" onclick="event.stopPropagation(); enrollCourse(${c.id})">${isEnrolled(c.id) ? 'Continue' : 'Enroll Now'}</button></div>`).join('')}</div></div>`;
    }
    
    function renderCourses() {
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><h1 class="section-title">All <span>Professional Courses</span></h1><div class="grid">${courses.map(c => `<div class="card" onclick="viewCourse(${c.id})"><i class="fas ${c.icon}" style="font-size:2rem;color:${c.color}"></i><h3>${escapeHtml(c.short_name)}${isEnrolled(c.id) ? '<span class="badge">Enrolled</span>' : ''}</h3><p>${escapeHtml(c.description)}</p><div class="course-price">KES ${c.price.toLocaleString()}</div><button class="btn btn-primary" onclick="event.stopPropagation(); enrollCourse(${c.id})">${isEnrolled(c.id) ? 'Continue Learning' : 'Enroll Now'}</button></div>`).join('')}</div></div>`;
    }
    
    function viewCourse(courseId) { 
        if (courseId === 8) navigateTo('quiz'); 
        else if (isEnrolled(courseId)) {
            showToast(`📚 Access ${courses.find(c=>c.id===courseId)?.name} content. Full course player coming soon!`, 'info');
        } else enrollCourse(courseId); 
    }
    
    async function navigateTo(page) {
        currentPage = page;
        if (page === 'home') renderHome();
        else if (page === 'courses') renderCourses();
        else if (page === 'quiz') { resetQuiz(); renderQuiz(); }
        else if (page === 'dashboard') await renderDashboard();
        else renderHome();
        
        document.querySelectorAll('.nav-links button').forEach(btn => btn.classList.remove('active'));
        if (page === 'home') document.getElementById('navHome')?.classList.add('active');
        if (page === 'courses') document.getElementById('navCourses')?.classList.add('active');
        if (page === 'quiz') document.getElementById('navQuiz')?.classList.add('active');
        if (page === 'dashboard') document.getElementById('navDashboard')?.classList.add('active');
        if (window.innerWidth <= 768) document.getElementById('navLinks')?.classList.remove('show');
        window.scrollTo({ top: 0 });
    }
    
    // ============================================
    // INITIALIZATION
    // ============================================
    async function init() { 
        await setupTables();
        await loadData(); 
        navigateTo('home'); 
    }
    
    // Expose functions to global scope
    window.navigateTo = navigateTo; 
    window.enrollCourse = enrollCourse; 
    window.viewCourse = viewCourse; 
    window.showAuthModal = showAuthModal; 
    window.handleAuth = handleAuth; 
    window.logout = logout; 
    window.selectAnswer = selectAnswer; 
    window.previousQuestion = previousQuestion; 
    window.nextQuestion = nextQuestion; 
    window.resetQuiz = resetQuiz; 
    window.processPayment = processPayment; 
    window.toggleMobileMenu = toggleMobileMenu;
    
    init();
</script>
</body>
</html>
