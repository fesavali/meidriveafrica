    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        const { data: { session } } = await supabase.auth.getSession();

            if (progress) { userProgress = {}; progress.forEach(p => { userProgress[p.course_id] = p.progress; }); }

            if (enrollments) { userEnrollments = {}; enrollments.forEach(e => { userEnrollments[e.course_id] = true; }); }
        }
    }

        if (!container) return;
        if (currentUser) {
            container.innerHTML = `<div class="user-badge"><i class="fas fa-user-check"></i> ${escapeHtml(currentUser.email.split('@')[0])}</div><button onclick="logout()" class="btn-outline btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>`;
        } else {
            container.innerHTML = `<button onclick="showAuthModal('login')" class="btn-outline btn-sm"><i class="fas fa-key"></i> Login</button><button onclick="showAuthModal('signup')" class="btn-primary btn-sm"><i class="fas fa-user-plus"></i> Sign Up</button>`;
        }
    }
    
    async function logout() { await supabase.auth.signOut(); currentUser = null; userProgress = {}; userEnrollments = {}; updateAuthUI(); navigateTo('home'); showToast('Logged out successfully', 'info'); }
    
    function showAuthModal(mode) {
        document.getElementById('page-content').innerHTML = `
            <div class="modal" style="display:flex;">
                <div class="modal-content">
                    <h2 style="text-align:center;">${mode === 'login' ? '🔐 Welcome Back' : '📝 Create Account'}</h2>
                    ${mode === 'signup' ? `<input type="text" id="signupName" placeholder="Full Name" style="width:100%; margin:10px 0;">` : ''}
                    <input type="email" id="authEmail" placeholder="Email address" style="width:100%; margin:10px 0;">
                    <input type="password" id="authPassword" placeholder="Password (min 6 characters)" style="width:100%; margin:10px 0;">
                    <button class="btn btn-primary" style="width:100%" onclick="handleAuth('${mode}')">${mode === 'login' ? 'Login' : 'Sign Up'}</button>
                    <p style="margin-top:1rem; text-align:center;">
                        ${mode === 'login' ? 'No account? ' : 'Already have an account? '}
                        <span style="color:var(--primary);cursor:pointer;" onclick="showAuthModal('${mode === 'login' ? 'signup' : 'login'}')">${mode === 'login' ? 'Sign Up' : 'Login'}</span>
                    </p>
                    <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="navigateTo('home')">Cancel</button>
                </div>
            </div>`;
    }
    
    async function handleAuth(mode) {
        const email = document.getElementById('authEmail')?.value.trim();
        const password = document.getElementById('authPassword')?.value;
        if (!email || !password) { showToast('Please fill all fields', 'error'); return; }
        if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
        
        if (mode === 'signup') {
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) { showToast(error.message, 'error'); return; }
            showToast('Account created! Please verify your email.', 'success');
            navigateTo('home');
        } else {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { showToast(error.message, 'error'); return; }
            showToast(`Welcome back!`, 'success');
            await loadUserData();
            navigateTo('home');
        }
    }
    
    function isEnrolled(courseId) { return userEnrollments[courseId] === true; }
    
    async function enrollCourse(courseId) {
        if (!currentUser) { showAuthModal('login'); return; }
        const course = courses.find(c => c.id === courseId);
        if (!course) return;
        
        const { error } = await supabase.from('user_enrollments').upsert({
            user_id: currentUser.id, course_id: courseId, payment_status: 'completed', amount_paid: course.price, paid_at: new Date().toISOString()
        });
        if (!error) { userEnrollments[courseId] = true; showToast('✅ Successfully enrolled!', 'success'); navigateTo('courses'); }
        else { showToast('Enrollment failed', 'error'); }
    }
    
    function viewCourse(courseId) { 
        if (courseId === 6) {
            navigateTo('quiz');
        } else {
            window.location.href = `course.html?id=${courseId}`;
        }
    }
    
    // Quiz functionality
    let quizState = { currentIndex: 0, score: 0, userAnswers: [], questions: [] };
    
    function renderQuiz() {
        if (quizState.questions.length === 0) quizState.questions = [...quizBank];
        if (quizState.currentIndex >= quizState.questions.length) {
            const percent = Math.round((quizState.score / quizState.questions.length) * 100);
            document.getElementById('page-content').innerHTML = `
                <div class="container" style="padding-top: 100px; max-width: 800px;">
                    <div class="card" style="text-align:center;">
                        <h2>🎉 Quiz Complete!</h2>
                        <div style="font-size: 4rem; margin: 1rem 0;">${percent >= 70 ? '🏆' : '📚'}</div>
                        <p style="font-size: 1.2rem;">Your score: <strong>${quizState.score}</strong> / ${quizState.questions.length} (${percent}%)</p>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                        <p style="margin-top: 1rem;">${percent >= 70 ? 'Excellent! You\'re ready for the NTSA exam!' : 'Keep practicing to improve your score!'}</p>
                        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                            <button class="btn btn-primary" onclick="resetQuiz()">🔄 Restart Quiz</button>
                            <button class="btn btn-outline" onclick="navigateTo('home')">🏠 Back to Home</button>
                        </div>
                    </div>
                </div>`;
            return;
        }
        
        const q = quizState.questions[quizState.currentIndex];
        const hasAnswered = quizState.userAnswers[quizState.currentIndex] !== undefined;
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px; max-width: 800px;">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span class="category-tag"><i class="fas fa-tag"></i> ${q.category}</span>
                        <span style="background: var(--primary); color: #0a192f; padding: 4px 12px; border-radius: 50px; font-weight:bold;">Question ${quizState.currentIndex + 1}/${quizState.questions.length}</span>
                    </div>
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.3rem;">${escapeHtml(q.question)}</h3>
                    <div id="quizOptions">
                        ${q.options.map((opt, idx) => {
                            let additionalClass = '';
                            if (hasAnswered && idx === q.correct) additionalClass = 'correct';
                            if (hasAnswered && idx === quizState.userAnswers[quizState.currentIndex] && idx !== q.correct) additionalClass = 'wrong';
                            return `<div class="quiz-option ${additionalClass}" onclick="${!hasAnswered ? `selectAnswer(${idx})` : ''}" style="${!hasAnswered ? 'cursor:pointer;' : ''}">
                                <span style="font-weight:bold;">${String.fromCharCode(65+idx)}.</span> ${escapeHtml(opt)}
                            </div>`;
                        }).join('')}
                    </div>
                    ${hasAnswered ? `
                        <div style="margin-top: 1rem; padding: 1rem; background: rgba(0,255,136,0.1); border-radius: 12px;">
                            <strong>${quizState.userAnswers[quizState.currentIndex] === q.correct ? '✓ Correct!' : '✗ Incorrect'}</strong>
                            <p style="margin-top: 0.5rem;">📖 ${escapeHtml(q.explanation)}</p>
                            <button class="btn btn-primary" style="margin-top: 1rem;" onclick="nextQuestion()">Next Question →</button>
                        </div>
                    ` : '<p style="margin-top: 1rem; opacity:0.7;"><i class="fas fa-info-circle"></i> Click on an option to answer</p>'}
                </div>
                <div style="text-align: center; margin-top: 1rem;">
                    <p style="opacity:0.6;">📊 ${quizState.score} correct so far</p>
                </div>
            </div>`;
    }
    
    window.selectAnswer = (idx) => {
        if (quizState.userAnswers[quizState.currentIndex] !== undefined) return;
        const q = quizState.questions[quizState.currentIndex];
        quizState.userAnswers[quizState.currentIndex] = idx;
        if (idx === q.correct) quizState.score++;
        renderQuiz();
    };
    
    window.nextQuestion = () => { quizState.currentIndex++; renderQuiz(); };
    window.resetQuiz = () => { quizState = { currentIndex: 0, score: 0, userAnswers: [], questions: [...quizBank] }; renderQuiz(); };
    
    function renderHome() {
        const totalEnrolled = Object.keys(userEnrollments).length;
        document.getElementById('page-content').innerHTML = `
            <div class="hero">
                <h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1>
                <p>NTSA-approved professional driver training with 6 comprehensive courses and 1000+ exam questions.</p>
                <button class="btn btn-primary" onclick="navigateTo('courses')">🚀 Explore Courses</button>
            </div>
            <div class="container">
                <div class="stats-bar">
                    <div class="stat-item"><h3>6</h3><p>Professional Courses</p></div>
                    <div class="stat-item"><h3>1000+</h3><p>Quiz Questions</p></div>
                    <div class="stat-item"><h3>${courses.reduce((sum, c) => sum + c.lessons, 0)}</h3><p>Training Modules</p></div>
                    <div class="stat-item"><h3>NTSA</h3><p>Approved</p></div>
                </div>
                <h2 class="section-title">Our <span>Professional Courses</span></h2>
                <div class="grid">
                    ${courses.map(c => `
                        <div class="card" onclick="viewCourse(${c.id})">
                            <i class="fas ${c.icon}" style="font-size: 2rem; color: var(--primary);"></i>
                            <h3>${escapeHtml(c.name)}${isEnrolled(c.id) ? ' <span class="badge"><i class="fas fa-check-circle"></i> Enrolled</span>' : ''}</h3>
                            <p>${escapeHtml(c.description)}</p>
                            <div><span class="category-tag"><i class="far fa-clock"></i> ${c.duration}</span><span class="category-tag"><i class="fas fa-book"></i> ${c.lessons} Modules</span></div>
                            <div class="course-price">${c.price === 0 ? 'FREE' : `KES ${c.price.toLocaleString()}`}</div>
                            ${userProgress[c.id] ? `<div class="progress-bar"><div class="progress-fill" style="width:${userProgress[c.id]}%"></div></div>` : ''}
                            <button class="btn btn-primary">${isEnrolled(c.id) ? 'Continue Learning' : 'Enroll Now'}</button>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    }
    
    function renderCourses() {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px;">
                <h1 class="section-title">All <span>Professional Courses</span></h1>
                <div class="grid">
                    ${courses.map(c => `
                        <div class="card" onclick="viewCourse(${c.id})">
                            <i class="fas ${c.icon}" style="font-size: 2rem; color: var(--primary);"></i>
                            <h3>${escapeHtml(c.name)}${isEnrolled(c.id) ? ' <span class="badge"><i class="fas fa-check-circle"></i> Enrolled</span>' : ''}</h3>
                            <p>${escapeHtml(c.description)}</p>
                            <div><span class="category-tag"><i class="far fa-clock"></i> ${c.duration}</span><span class="category-tag"><i class="fas fa-book"></i> ${c.lessons} Modules</span></div>
                            <div class="course-price">${c.price === 0 ? 'FREE' : `KES ${c.price.toLocaleString()}`}</div>
                            ${userProgress[c.id] ? `<div class="progress-bar"><div class="progress-fill" style="width:${userProgress[c.id]}%"></div></div>` : ''}
                            <button class="btn btn-primary">${isEnrolled(c.id) ? 'Continue Learning' : 'Enroll Now'}</button>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    }
    
    function navigateTo(page) {
        currentPage = page;
        if (page === 'home') renderHome();
        else if (page === 'courses') renderCourses();
        else if (page === 'quiz') { resetQuiz(); renderQuiz(); }
        else renderHome();
        
        document.querySelectorAll('.nav-links button').forEach(btn => btn.classList.remove('active'));
        if (page === 'home') document.getElementById('navHome')?.classList.add('active');
        if (page === 'courses') document.getElementById('navCourses')?.classList.add('active');
        if (page === 'quiz') document.getElementById('navQuiz')?.classList.add('active');
        if (window.innerWidth <= 768) document.getElementById('navLinks')?.classList.remove('show');
        window.scrollTo({ top: 0 });
    }
    
    async function init() {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        await loadUserData();
        navigateTo('home');
    }
    
    window.viewCourse = viewCourse;
    window.enrollCourse = enrollCourse;
    window.navigateTo = navigateTo;
    window.showAuthModal = showAuthModal;
    window.handleAuth = handleAuth;
    window.logout = logout;
    window.selectAnswer = selectAnswer;
    window.nextQuestion = nextQuestion;
    window.resetQuiz = resetQuiz;
    
    init();
</script>
</body>
</html>
