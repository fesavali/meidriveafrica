    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function toggleMobileMenu() { document.getElementById('navLinks')?.classList.toggle('show'); }
    
    async function loadAllData() {
        // Use predefined courses as primary source
        courses = [...predefinedCourses];
        
        // Try to fetch from Supabase and merge if available
        try {
            const dbCourses = await MEI.getAllCourses();
            if (dbCourses && dbCourses.length > 0) {
                // Merge prices and descriptions from DB if they exist
                courses = courses.map(c => {
                    const dbMatch = dbCourses.find(dbc => dbc.id === c.id);
                    if (dbMatch) {
                        return { ...c, price: dbMatch.price || c.price, description: dbMatch.description || c.description };
                    }
                    return c;
                });
            }
        } catch (e) {
            console.log('Using predefined courses');
        }
        
        // Load quiz questions
        quizQuestions = await MEI.getAllQuizQuestions();
        if (quizQuestions.length === 0) {
            // Fallback quiz questions
            quizQuestions = [
                { id: 1, category: 'Road Signs', question: 'What does a STOP sign mean?', option_a: 'Slow down only', option_b: 'Continue carefully', option_c: 'Come to a complete stop', option_d: 'Overtake carefully', correct_option: 2, explanation: 'A STOP sign requires you to come to a complete stop.' },

    function updateAuthUI() {

        updateAuthUI(); 
        navigateTo('home'); 
        showToast('Logged out successfully', 'info'); 
    }
    
    function showAuthModal(mode) {
        document.getElementById('page-content').innerHTML = `
            <div class="modal" style="display:flex;">
                <div class="modal-content">
                    <h2 style="text-align:center;">${mode === 'login' ? '🔐 Welcome Back' : '📝 Create Account'}</h2>
                    ${mode === 'signup' ? '<input type="text" id="signupName" placeholder="Full Name">' : ''}
                    <input type="email" id="authEmail" placeholder="Email address">
                    <input type="password" id="authPassword" placeholder="Password (min 6 characters)">
                    <button class="btn btn-primary" style="width:100%" onclick="handleAuth('${mode}')">${mode === 'login' ? 'Login' : 'Sign Up'}</button>
                    <p style="margin-top:1rem; text-align:center;">
                        ${mode === 'login' ? 'No account? ' : 'Already have an account? '}
                        <span style="color:var(--primary);cursor:pointer;" onclick="showAuthModal('${mode === 'login' ? 'signup' : 'login'}')">${mode === 'login' ? 'Sign Up' : 'Login'}</span>
                    </p>
                    <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="navigateTo('home')">Cancel</button>
                </div>
            </div>`;
    }
    
    async function handleAuth(mode) {
        const email = document.getElementById('authEmail')?.value.trim();
        const password = document.getElementById('authPassword')?.value;
        const fullName = document.getElementById('signupName')?.value;
        
        if (!email || !password) { showToast('Please enter both email and password', 'error'); return; }
        if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
        
        let result;
        if (mode === 'signup') {
            result = await MEI.signUp(email, password, fullName);
            if (result.success) {
                showToast('Account created! Please check your email to verify.', 'success');
                showAuthModal('login');
            } else {
                showToast(result.error, 'error');
            }
        } else {
            result = await MEI.signIn(email, password);
            if (result.success) {
                currentUser = result.user;
                await loadAllData();
                showToast(`Welcome back, ${email.split('@')[0]}!`, 'success');
                navigateTo('home');
            } else {
                showToast(result.error, 'error');
            }
        }
    }
    
    function isEnrolled(courseId) { return userEnrollments[courseId] === true; }
    
    function viewCourse(courseId) { 
        // Course 8 is Quiz Bank - redirect to quiz page
        if (courseId === 8) {
            navigateTo('quiz');
        } else {
            window.location.href = `course.html?id=${courseId}`;
        }
    }
    
    function showPaymentModal(course) {
        pendingCourse = course;
        document.getElementById('page-content').innerHTML = `
            <div class="payment-modal" id="paymentModal">
                <div class="payment-card">
                    <div class="mpesa-logo">
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                    <h2>M-Pesa Payment</h2>
                    <p style="margin: 1rem 0;">Course: <strong>${escapeHtml(course.name)}</strong></p>
                    <p style="font-size: 1.8rem; color: var(--primary);">KES ${course.price.toLocaleString()}</p>
                    <div class="phone-input">
                        <span>+254</span>
                        <input type="tel" id="mpesaPhone" placeholder="712345678" autocomplete="off">
                    </div>
                    <p style="font-size: 12px; opacity: 0.7;">Enter the M-Pesa number you want to pay from</p>
                    <p style="font-size: 12px; opacity: 0.7; margin-top: 5px;">Paybill: <strong>4095377</strong></p>
                    <button class="btn btn-primary" style="width:100%; margin-top:1rem;" onclick="processPayment()">
                        <i class="fas fa-arrow-right"></i> Pay Now
                    </button>
                    <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="navigateTo('courses')">
                        Cancel
                    </button>
                </div>
            </div>
        `;
    }
    
    async function processPayment() {
        const phone = document.getElementById('mpesaPhone')?.value.trim();
        if (!phone) {
            showToast('Please enter your M-Pesa phone number', 'error');
            return;
        }
        
        if (!pendingCourse) return;
        
        showToast(`Initiating payment of KES ${pendingCourse.price}...`, 'info');
        
        const result = await MEI.initiateMpesaPayment(
            phone, 
            pendingCourse.price, 
            pendingCourse.id, 
            currentUser.id,
            currentUser.email
        );
        
        if (result.success) {
            showToast('Payment request sent! Check your phone for M-Pesa prompt.', 'success');
            
            let attempts = 0;
            const interval = setInterval(async () => {
                attempts++;
                const status = await MEI.checkPaymentStatus(result.checkoutRequestID);
                if (status.success && status.status === 'completed') {
                    clearInterval(interval);
                    const enrollResult = await MEI.createEnrollment(currentUser.id, pendingCourse.id, pendingCourse.price);
                    if (enrollResult.success) {
                        userEnrollments[pendingCourse.id] = true;
                        showToast('✅ Payment successful! Course unlocked.', 'success');
                        navigateTo('courses');
                    }
                } else if (attempts > 20) {
                    clearInterval(interval);
                    showToast('Payment confirmation timeout. Please check your M-Pesa messages.', 'warning');
                }
            }, 3000);
            
            setTimeout(() => clearInterval(interval), 60000);
        } else {
            showToast(result.error || 'Payment initiation failed', 'error');
        }
    }
    
    async function enrollCourse(courseId) {
        if (!currentUser) { showAuthModal('login'); return; }
        const course = courses.find(c => c.id === courseId);
        if (!course) return;
        
        if (course.price > 0 && courseId !== 8) {
            showPaymentModal(course);
        } else {
            const result = await MEI.createEnrollment(currentUser.id, courseId, 0);
            if (result.success) {
                userEnrollments[courseId] = true;
                showToast(`✅ Successfully enrolled in ${course.name}!`, 'success');
                renderCourses();
            } else {
                showToast('Enrollment failed', 'error');
            }
        }
    }
    
    // Quiz functionality
    let quizState = { currentIndex: 0, score: 0, userAnswers: [], questions: [] };
    
    function renderQuiz() {
        if (quizState.questions.length === 0) {
            quizState.questions = quizQuestions.map(q => ({
                id: q.id,
                category: q.category,
                question: q.question,
                options: [q.option_a, q.option_b, q.option_c, q.option_d],
                correct: q.correct_option,
                explanation: q.explanation
            }));
        }
        
        if (quizState.currentIndex >= quizState.questions.length) {
            const percent = Math.round((quizState.score / quizState.questions.length) * 100);
            document.getElementById('page-content').innerHTML = `
                <div class="container" style="padding-top: 100px; max-width: 800px;">
                    <div class="card" style="text-align:center;">
                        <h2>🎉 Quiz Complete!</h2>
                        <div style="font-size: 4rem;">${percent >= 70 ? '🏆' : '📚'}</div>
                        <p>Score: <strong>${quizState.score}</strong> / ${quizState.questions.length} (${percent}%)</p>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                        <div style="margin-top: 2rem;">
                            <button class="btn btn-primary" onclick="resetQuiz()">Restart Quiz</button>
                            <button class="btn btn-outline" onclick="navigateTo('home')">Back Home</button>
                        </div>
                    </div>
                </div>`;
            return;
        }
        
        const q = quizState.questions[quizState.currentIndex];
        const hasAnswered = quizState.userAnswers[quizState.currentIndex] !== undefined;
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px; max-width: 800px;">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span class="category-tag">${q.category}</span>
                        <span style="background: var(--primary); color: #0a192f; padding: 4px 12px; border-radius: 50px;">${quizState.currentIndex + 1}/${quizState.questions.length}</span>
                    </div>
                    <h3>${escapeHtml(q.question)}</h3>
                    ${q.options.map((opt, idx) => {
                        let cls = 'quiz-option';
                        if (hasAnswered && idx === q.correct) cls += ' correct';
                        if (hasAnswered && idx === quizState.userAnswers[quizState.currentIndex] && idx !== q.correct) cls += ' wrong';
                        return `<div class="${cls}" onclick="${!hasAnswered ? `selectAnswer(${idx})` : ''}">
                            ${String.fromCharCode(65+idx)}. ${escapeHtml(opt)}
                        </div>`;
                    }).join('')}
                    ${hasAnswered ? `
                        <div style="margin-top: 1rem; padding: 1rem; background: rgba(0,255,136,0.1); border-radius: 12px;">
                            <strong>${quizState.userAnswers[quizState.currentIndex] === q.correct ? '✓ Correct!' : '✗ Incorrect'}</strong>
                            <p>${escapeHtml(q.explanation || 'No explanation available.')}</p>
                            <button class="btn btn-primary" onclick="nextQuestion()">Next →</button>
                        </div>
                    ` : '<p style="margin-top: 1rem;">Click an option to answer</p>'}
                </div>
            </div>`;
    }
    
    window.selectAnswer = (idx) => {
        if (quizState.userAnswers[quizState.currentIndex] !== undefined) return;
        const q = quizState.questions[quizState.currentIndex];
        quizState.userAnswers[quizState.currentIndex] = idx;
        if (idx === q.correct) quizState.score++;
        renderQuiz();
    };
    
    window.nextQuestion = () => { quizState.currentIndex++; renderQuiz(); };
    window.resetQuiz = () => { quizState = { currentIndex: 0, score: 0, userAnswers: [], questions: [] }; renderQuiz(); };
    window.processPayment = processPayment;
    
    function renderHome() {
        const totalModules = courses.reduce((sum, c) => sum + c.lessons_count, 0);
        document.getElementById('page-content').innerHTML = `
            <div class="hero">
                <h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1>
                <p>Professional driver training with 8 comprehensive courses and 1000+ exam questions.</p>
                <button class="btn btn-primary" onclick="navigateTo('courses')">🚀 Explore Courses</button>
            </div>
            <div class="container">
                <div class="stats-bar">
                    <div class="stat-item"><h3>8</h3><p>Professional Courses</p></div>
                    <div class="stat-item"><h3>1000+</h3><p>Quiz Questions</p></div>
                    <div class="stat-item"><h3>${totalModules}</h3><p>Training Modules</p></div>
                </div>
                <h2 class="section-title">Our <span>Courses</span></h2>
                <div class="grid">
                    ${courses.slice(0, 4).map(c => `
                        <div class="card" onclick="viewCourse(${c.id})">
                            <i class="fas ${c.icon || 'fa-car'}" style="font-size: 2rem; color: var(--primary);"></i>
                            <h3>${escapeHtml(c.name)}${isEnrolled(c.id) ? '<span class="badge">Enrolled</span>' : ''}</h3>
                            <p>${escapeHtml(c.description)}</p>
                            <div class="course-price">KES ${(c.price || 0).toLocaleString()}</div>
                            <button class="btn btn-primary">${isEnrolled(c.id) ? 'Continue' : 'Enroll'}</button>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    }
    
    function renderCourses() {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px;">
                <h1 class="section-title">All <span>Professional Courses</span></h1>
                <div class="grid">
                    ${courses.map(c => `
                        <div class="card" onclick="viewCourse(${c.id})">
                            <i class="fas ${c.icon || 'fa-car'}" style="font-size: 2rem; color: var(--primary);"></i>
                            <h3>${escapeHtml(c.name)}${isEnrolled(c.id) ? '<span class="badge">Enrolled</span>' : ''}</h3>
                            <p>${escapeHtml(c.description)}</p>
                            <div><span class="category-tag">${c.duration || 'Self-paced'}</span><span class="category-tag">${c.lessons_count || 0} Modules</span></div>
                            <div class="course-price">KES ${(c.price || 0).toLocaleString()}</div>
                            <button class="btn btn-primary" onclick="event.stopPropagation(); enrollCourse(${c.id})">${isEnrolled(c.id) ? 'Continue Learning' : 'Enroll Now'}</button>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    }
    
    function renderAdminDashboard() {
        const totalRevenue = payments.reduce((sum, p) => sum + (p.amount || 0), 0);
        const totalEnrollments = allEnrollments.length;
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px;">
                <h1 class="section-title"><i class="fas fa-user-shield"></i> Admin <span>Dashboard</span></h1>
                
                <div class="admin-stats">
                    <div class="stat-card"><h2>${users.length}</h2><p>Total Users</p></div>
                    <div class="stat-card"><h2>${totalEnrollments}</h2><p>Enrollments</p></div>
                    <div class="stat-card"><h2>KES ${totalRevenue.toLocaleString()}</h2><p>Total Revenue</p></div>
                    <div class="stat-card"><h2>${payments.length}</h2><p>Transactions</p></div>
                </div>
                
                <div class="card" style="margin-bottom: 2rem;">
                    <h3><i class="fas fa-credit-card"></i> Recent Payments</h3>
                    <table class="admin-table">
                        <thead><tr><th>Transaction ID</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody>
                            ${payments.slice(0, 10).map(p => `
                                <tr>
                                    <td>${escapeHtml(p.transaction_id || 'N/A')}</td>
                                    <td>KES ${(p.amount || 0).toLocaleString()}</td>
                                    <td><span style="color: ${p.status === 'completed' ? '#00ff88' : '#ffaa00'}">${p.status || 'pending'}</span></td>
                                    <td>${p.created_at ? new Date(p.created_at).toLocaleDateString() : 'N/A'}</td>
                                </tr>
                            `).join('')}
                            ${payments.length === 0 ? '<tr><td colspan="4" style="text-align:center;">No payments yet</td>' : ''}
                        </tbody>
                    </table>
                </div>
                
                <div class="card">
                    <h3><i class="fas fa-users"></i> Recent Enrollments</h3>
                    <table class="admin-table">
                        <thead><tr><th>User</th><th>Course</th><th>Amount</th><th>Date</th></tr></thead>
                        <tbody>
                            ${allEnrollments.slice(0, 10).map(e => `
                                <tr>
                                    <td>${escapeHtml(e.users?.email || 'N/A')}</td>
                                    <td>${escapeHtml(e.courses?.name || 'N/A')}</td>
                                    <td>KES ${(e.amount_paid || 0).toLocaleString()}</td>
                                    <td>${e.paid_at ? new Date(e.paid_at).toLocaleDateString() : 'N/A'}</td>
                                </tr>
                            `).join('')}
                            ${allEnrollments.length === 0 ? '<tr><td colspan="4" style="text-align:center;">No enrollments yet</td>' : ''}
                        </tbody>
                    </table>
                </div>
            </div>`;
    }
    
    function navigateTo(page) {
        currentPage = page;
        if (page === 'home') renderHome();
        else if (page === 'courses') renderCourses();
        else if (page === 'quiz') { resetQuiz(); renderQuiz(); }
        else if (page === 'admin' && isAdmin) renderAdminDashboard();
        else renderHome();
        
        document.querySelectorAll('.nav-links button').forEach(btn => btn.classList.remove('active'));
        if (page === 'home') document.getElementById('navHome')?.classList.add('active');
        if (page === 'courses') document.getElementById('navCourses')?.classList.add('active');
        if (page === 'quiz') document.getElementById('navQuiz')?.classList.add('active');
        if (window.innerWidth <= 768) document.getElementById('navLinks')?.classList.remove('show');
        window.scrollTo({ top: 0 });
    }
    
    async function init() {
        await loadAllData();
        navigateTo('home');
    }
    
    window.viewCourse = viewCourse;
    window.enrollCourse = enrollCourse;
    window.navigateTo = navigateTo;
    window.showAuthModal = showAuthModal;
    window.handleAuth = handleAuth;
    window.logout = logout;
    window.selectAnswer = selectAnswer;
    window.nextQuestion = nextQuestion;
    window.resetQuiz = resetQuiz;
    window.processPayment = processPayment;
    
    init();
</script>
</body>
</html>
