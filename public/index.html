<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI DRIVE AFRICA | NTSA Approved Driver Training</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #041B3D;
            color: #fff;
        }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(4, 27, 61, 0.96);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 255, 136, 0.15);
        }
        .nav-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #00FF88;
            cursor: pointer;
        }
        .logo span { color: #fff; }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-links a { color: #fff; text-decoration: none; }
        .nav-links a:hover { color: #00FF88; }
        .nav-btn {
            background: transparent;
            border: 1px solid #00FF88;
            color: #00FF88;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(135deg, rgba(4,27,61,0.9), rgba(10,35,79,0.95));
        }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero h1 span { color: #00FF88; }
        .hero p { color: #B7C4D6; max-width: 600px; margin: 0 auto 2rem; }
        .btn-primary {
            background: #00FF88;
            color: #041B3D;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
        }
        .section-title span { color: #00FF88; }
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .course-card {
            background: #0A234F;
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(0, 255, 136, 0.1);
            transition: all 0.3s;
        }
        .course-card:hover {
            transform: translateY(-5px);
            border-color: #00FF88;
        }
        .course-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .course-badge {
            display: inline-block;
            background: #00FF88;
            color: #041B3D;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .course-card h3 { margin: 0.5rem 0; }
        .course-card p { color: #B7C4D6; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .course-price { font-weight: bold; font-size: 1.2rem; margin: 0.5rem 0; }
        .course-price.free { color: #00FF88; }
        .course-price.premium { color: #ff9800; }
        .btn-view {
            width: 100%;
            background: transparent;
            border: 1px solid #00FF88;
            color: #fff;
            padding: 8px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-view:hover { background: #00FF88; color: #041B3D; }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,255,136,0.3);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer {
            background: #0A234F;
            text-align: center;
            padding: 2rem;
            color: #B7C4D6;
        }
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .courses-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="location.href='/'">MEI DRIVE <span>AFRICA</span></div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#courses">Courses</a>
            <button class="nav-btn" id="loginBtn">Login</button>
            <button class="nav-btn" id="registerBtn">Register</button>
        </div>
    </div>
</nav>

<section class="hero">
    <div>
        <h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1>
        <p>For Learners and Experienced Drivers — Refresh Your Skills with MEI DRIVE AFRICA. NTSA-approved courses.</p>
        <a href="#courses" class="btn-primary">Explore Courses</a>
    </div>
</section>

<div class="container" id="courses">
    <h2 class="section-title">Our <span>Courses</span></h2>
    <div id="coursesContainer" class="courses-grid">
        <div class="loading"><div class="spinner"></div><p>Loading courses...</p></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training</p>
</footer>

<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    document.getElementById('loginBtn').onclick = () => window.location.href = '/login.html';
    document.getElementById('registerBtn').onclick = () => window.location.href = '/register.html';
    
    async function loadCourses() {
        const container = document.getElementById('coursesContainer');
        
        try {
            console.log('Fetching courses from Supabase...');
            const { data, error } = await supabase.from('courses').select('*').order('id');
            
            if (error) {
                console.error('Supabase Error:', error);
                container.innerHTML = `<div style="text-align:center; padding:40px;"><i class="fas fa-exclamation-circle" style="font-size:2rem;"></i><p>Error loading courses. Please refresh.</p></div>`;
                return;
            }
            
            if (!data || data.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px;"><i class="fas fa-book-open" style="font-size:2rem;"></i><p>No courses available yet. Check back soon!</p></div>`;
                return;
            }
            
            container.innerHTML = '';
            const icons = ['🚗', '🚌', '⚡', '🛵', '📚', '📝', '🛡️', '🔄'];
            
            data.forEach((course, index) => {
                const isFree = course.type === 'free' || course.price === 0;
                const icon = course.icon || icons[index % icons.length];
                const card = document.createElement('div');
                card.className = 'course-card';
                card.innerHTML = `
                    <div class="course-icon">${icon}</div>
                    ${!isFree ? '<div class="course-badge">PREMIUM</div>' : '<div class="course-badge">FREE</div>'}
                    <h3>${escapeHtml(course.name)}</h3>
                    <p>${escapeHtml(course.description?.substring(0, 100) || 'Professional driver training course')}</p>
                    <div class="course-price ${isFree ? 'free' : 'premium'}">${isFree ? 'FREE' : `KES ${course.price?.toLocaleString()}`}</div>
                    <button class="btn-view" onclick="location.href='/login.html'">View Course →</button>
                `;
                container.appendChild(card);
            });
            
        } catch (err) {
            console.error('Error:', err);
            container.innerHTML = `<div style="text-align:center; padding:40px;"><i class="fas fa-exclamation-circle" style="font-size:2rem;"></i><p>Connection error. Please refresh.</p></div>`;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    loadCourses();
</script>
</body>
</html>
