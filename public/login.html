<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #041B3D, #0A234F);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { font-size: 48px; margin-bottom: 20px; }
        h2 { color: #041B3D; margin-bottom: 10px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .input-group input {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 12px; font-size: 16px;
        }
        .input-group input:focus { outline: none; border-color: #00FF88; }
        button {
            width: 100%; padding: 14px; background: #00FF88; color: #041B3D;
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            font-size: 16px;
        }
        button:hover { transform: translateY(-2px); }
        .error {
            color: #e74c3c; margin-top: 10px; background: #fde8e8;
            padding: 10px; border-radius: 8px; display: none; font-size: 14px;
        }
        .success {
            color: #27ae60; background: #e8f8f0;
            padding: 10px; border-radius: 8px; display: none; font-size: 14px;
            margin-top: 10px;
        }
        .spinner {
            display: none; width: 20px; height: 20px;
            border: 2px solid #041B3D; border-top-color: #00FF88;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 10px auto 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .auth-switch { margin-top: 20px; color: #666; }
        .auth-switch a { color: #00FF88; text-decoration: none; font-weight: bold; }
        .back-home { 
            margin-top: 20px; display: inline-block; color: #666; 
            text-decoration: none; font-size: 14px;
        }
        .back-home:hover { color: #00FF88; }
        @media (max-width: 480px) { .login-container { padding: 30px 20px; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🚗</div>
        <h2>MEI DRIVE AFRICA</h2>
        <p style="color: #666; margin-bottom: 20px;">Welcome back!</p>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" id="loginBtn">Login</button>
        </form>
        
        <div id="loadingSpinner" class="spinner"></div>
        
        <div class="auth-switch">
            Don't have an account? <a href="/register.html">Create Account</a>
        </div>
        <div>
            <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const loadingSpinner = document.getElementById('loadingSpinner');
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            setTimeout(() => successDiv.style.display = 'none', 3000);
        }
        
        function setLoading(loading) {
            if (loading) {
                loadingSpinner.style.display = 'block';
                loginBtn.disabled = true;
                loginBtn.style.opacity = '0.6';
                loginBtn.textContent = 'Logging in...';
            } else {
                loadingSpinner.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.style.opacity = '1';
                loginBtn.textContent = 'Login';
            }
        }
        
        // Handle login form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            // Basic email validation
            const emailRegex = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                return;
            }
            
            setLoading(true);
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                setLoading(false);
                
                if (error) {
                    if (error.message === 'Invalid login credentials') {
                        showError('Invalid email or password. Please try again.');
                    } else if (error.message.includes('Email not confirmed')) {
                        showError('Please verify your email before logging in. Check your inbox.');
                    } else {
                        showError(error.message);
                    }
                    return;
                }
                
                if (data.session) {
                    // Store session
                    localStorage.setItem('access_token', data.session.access_token);
                    localStorage.setItem('user_email', email);
                    localStorage.setItem('user_id', data.user.id);
                    
                    showSuccess('Login successful! Redirecting...');
                    
                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1000);
                }
            } catch (err) {
                setLoading(false);
                showError('Network error. Please check your connection.');
                console.error('Login error:', err);
            }
        });
        
        // Check for existing session
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Already logged in, redirect to dashboard
                window.location.href = '/dashboard.html';
            }
        }
        checkSession();
        
        // Listen for auth changes
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('Auth event:', event);
            if (event === 'SIGNED_IN' && session) {
                localStorage.setItem('access_token', session.access_token);
            }
            if (event === 'SIGNED_OUT') {
                localStorage.removeItem('access_token');
                localStorage.removeItem('user_email');
                localStorage.removeItem('user_id');
            }
        });
        
        // Enter key submission
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });
        
        // Test connection on load (for debugging)
        async function testConnection() {
            const { error } = await supabase.from('courses').select('id').limit(1);
            if (error && error.message.includes('row-level security')) {
                console.warn('⚠️ RLS policy needed on courses table for public access');
            }
        }
        testConnection();
    </script>
</body>
</html>
