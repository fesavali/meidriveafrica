<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #fff;
            --soft-gray: #B7C4D6;
            --correct: #00FF88;
            --incorrect: #ff4444;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
        }
        .navbar {
            background: var(--dark-navy);
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 100px 2rem 2rem;
        }
        .quiz-card {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(0,255,136,0.15);
            margin-bottom: 1rem;
        }
        .question-text {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }
        .option {
            background: var(--secondary-dark);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover {
            border-color: var(--neon-green);
            transform: translateX(5px);
        }
        .option.selected {
            border-color: var(--neon-green);
            background: rgba(0,255,136,0.1);
        }
        .option.correct {
            border-color: var(--correct);
            background: rgba(0,255,136,0.2);
        }
        .option.incorrect {
            border-color: var(--incorrect);
            background: rgba(255,68,68,0.1);
        }
        .explanation {
            background: var(--secondary-dark);
            border-radius: 12px;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid var(--neon-green);
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .progress {
            font-size: 0.9rem;
            color: var(--soft-gray);
        }
        .score {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--neon-green);
        }
        .btn-next {
            background: var(--neon-green);
            color: var(--dark-navy);
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .category-filter {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .category-btn {
            background: var(--secondary-dark);
            border: 1px solid rgba(0,255,136,0.3);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .category-btn.active {
            background: var(--neon-green);
            color: var(--dark-navy);
        }
        .result-card {
            text-align: center;
            padding: 2rem;
        }
        .final-score {
            font-size: 3rem;
            color: var(--neon-green);
            margin: 1rem 0;
        }
        @media (max-width: 768px) {
            .container { padding: 80px 1rem 1rem; }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
