<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI Drive Africa | Driver Training Platform</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Scripts - ORDER MATTERS -->
    <!-- 1. Supabase JS library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 2. Supabase config (SINGLE source of truth) -->
    <script src="supabase.js"></script>
    <!-- 3. App logic (uses initSupabase from supabase.js) -->
    <script src="js/app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #ffffff;
        }
        
        /* Auth Container */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0e27, #1a1f3a);
            padding: 20px;
        }
        
        .auth-box {
            background: #1a1f3a;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        
        .auth-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #00ff88;
        }
        
        .auth-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            background: #0a0e27;
            color: white;
            font-size: 16px;
        }
        
        .auth-box input:focus {
            outline: none;
            border: 1px solid #00ff88;
        }
        
        .auth-box button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #00ff88;
            color: #0a0e27;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            margin-top: 10px;
        }
        
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #a0a0c0;
        }
        
        .auth-switch a {
            color: #00ff88;
            text-decoration: none;
            cursor: pointer;
        }
        
        /* Dashboard */
        .dashboard {
            display: none;
        }
        
        .navbar {
            background: #1a1f3a;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
            cursor: pointer;
        }
        
        .logo span {
            color: white;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #00ff88;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0e27;
            font-weight: bold;
        }
        
        .logout-btn {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #ff4444;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .welcome-section {
            background: linear-gradient(135deg, #1a1f3a, #0a0e27);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        
        .welcome-section h1 {
            color: #00ff88;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #00ff88;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .tab {
            background: none;
            border: none;
            color: #a0a0c0;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #00ff88;
            border-bottom: 2px solid #00ff88;
        }
        
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        
        .course-card {
            background: #1a1f3a;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(0, 255, 136, 0.1);
            transition: all 0.3s;
        }
        
        .course-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.1);
        }
        
        .course-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        
        .badge-free {
            background: #ff9800;
            color: #0a0e27;
        }
        
        .badge-premium {
            background: #00ff88;
            color: #0a0e27;
        }
        
        .badge-enrolled {
            background: #00c851;
            color: white;
        }
        
        .course-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        
        .course-description {
            color: #a0a0c0;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 8px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #00ff88;
            height: 100%;
            transition: width 0.3s;
        }
        
        .btn-enroll, .btn-continue {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .btn-enroll {
            background: #00ff88;
            color: #0a0e27;
        }
        
        .btn-enroll:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }
        
        .btn-continue {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
        }
        
        .btn-continue:hover {
            background: #00ff88;
            color: #0a0e27;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            background: #1a1f3a;
            border-radius: 16px;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: #a0a0c0;
            margin-bottom: 20px;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1f3a;
            border-left: 4px solid #00ff88;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast.error {
            border-left-color: #ff4444;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 136, 0.2);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .courses-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

<!-- Auth Container -->
<div id="authContainer" class="auth-container">
    <div class="auth-box">
        <h2 id="authTitle">Login to MEI Drive</h2>
        <input type="email" id="authEmail" placeholder="Email Address">
        <input type="password" id="authPassword" placeholder="Password">
        <button id="authButton" class="btn-primary">Login</button>
        <div class="auth-switch">
            <span id="authSwitchText">Don't have an account?</span>
            <a href="#" id="toggleAuthLink"> Create Account</a>
        </div>
    </div>
</div>

<!-- Dashboard Container -->
<div id="dashboardContainer" class="dashboard">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="location.reload()">MEI DRIVE <span>AFRICA</span></div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">👤</div>
                <span id="userName">Loading...</span>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="welcome-section">
            <h1>Welcome back, <span id="welcomeName">Learner</span>! 👋</h1>
            <p>Continue your driving journey. Track progress and enroll in new courses.</p>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalCourses">0</div>
                    <div>Available Courses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="enrolledCount">0</div>
                    <div>Enrolled Courses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completedCount">0</div>
                    <div>Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="overallProgress">0%</div>
                    <div>Overall Progress</div>
                </div>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="all">📚 All Courses</button>
            <button class="tab" data-tab="enrolled">✅ My Courses</button>
            <button class="tab" data-tab="completed">🏆 Completed</button>
        </div>
        
        <div id="coursesContainer" class="courses-grid">
            <div class="loading"><div class="spinner"></div> Loading courses...</div>
        </div>
    </div>
</div>

</body>
</html>
