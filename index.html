<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0e27; color: white; }
        .navbar { background: #1a1f3a; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00ff8830; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #00ff88; cursor: pointer; text-decoration: none; }
        .logo span { color: white; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .btn-primary { background: #00ff88; color: #0a0e27; }
        .btn-primary:hover { background: #00cc6a; transform: translateY(-2px); }
        .btn-outline { background: transparent; color: #00ff88; border: 1px solid #00ff88; }
        .btn-outline:hover { background: #00ff8820; transform: translateY(-2px); }
        .btn-danger { background: #ff4444; color: white; }
        .hero { padding: 80px 20px; text-align: center; background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); }
        .hero h1 { font-size: 3rem; margin-bottom: 20px; }
        .hero span { color: #00ff88; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .course-card { background: #1a1f3a; padding: 20px; border-radius: 16px; border: 1px solid #00ff8820; transition: all 0.3s; cursor: pointer; }
        .course-card:hover { transform: translateY(-5px); border-color: #00ff88; }
        .course-card h3 { margin: 10px 0; color: #00ff88; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; margin-bottom: 10px; font-weight: bold; }
        .badge-free { background: #ff9800; color: black; }
        .badge-premium { background: #00ff88; color: black; }
        .dashboard { display: none; }
        .main-content { padding: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 25px 0; }
        .stat-card { background: #1a1f3a; padding: 20px; border-radius: 12px; text-align: center; }
        .stat-number { font-size: 2rem; color: #00ff88; font-weight: bold; }
        .progress-bar { height: 8px; background: #333; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #00ff88; transition: width 0.3s; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { width: 90%; max-width: 400px; background: #1a1f3a; padding: 30px; border-radius: 16px; border: 1px solid #00ff8830; }
        .modal-content h2 { color: #00ff88; margin-bottom: 20px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #00ff88; background: #0a0e27; color: white; font-size: 1rem; }
        .footer { text-align: center; padding: 30px; color: #666; border-top: 1px solid #1a1f3a; margin-top: 40px; }
        .loading { text-align: center; padding: 60px; color: #00ff88; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1a1f3a; border-left: 4px solid #00ff88; padding: 12px 20px; border-radius: 8px; z-index: 2000; animation: slideIn 0.3s; }
        .toast.error { border-left-color: #ff4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .hero h1 { font-size: 2rem; } .navbar { flex-direction: column; } }
    </style>
</head>
<body>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Login</h2>
        <input type="email" id="authEmail" placeholder="Email Address">
        <input type="password" id="authPassword" placeholder="Password">
        <button id="authBtn" class="btn btn-primary" style="width:100%;">Login</button>
        <p style="margin-top:15px; text-align:center;">
            <span id="switchText">Don't have an account?</span>
            <a href="#" id="toggleAuth" style="color:#00ff88;">Register</a>
        </p>
        <button onclick="closeAuthModal()" class="btn btn-outline" style="width:100%;margin-top:10px;">Cancel</button>
    </div>
</div>

<div id="landingPage">
    <nav class="navbar">
        <a href="#" class="logo">🚗 MEI DRIVE <span>AFRICA</span></a>
        <div>
            <button class="btn btn-outline" onclick="showAuthModal('login')">Login</button>
            <button class="btn btn-primary" onclick="showAuthModal('register')">Register</button>
        </div>
    </nav>
    <section class="hero">
        <h1>Drive Safe.<br><span>Learn With Confidence.</span></h1>
        <p>NTSA Approved Driver Training</p>
    </section>
    <section class="container">
        <h2 style="margin-bottom:25px;">📚 Our Courses</h2>
        <div id="coursesList" class="courses-grid"><div class="loading">Loading courses...</div></div>
    </section>
    <footer class="footer">© 2026 MEI DRIVE AFRICA</footer>
</div>

<div id="dashboard" class="dashboard">
    <nav class="navbar">
        <a href="#" class="logo">🚗 MEI DRIVE <span>AFRICA</span></a>
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
    </nav>
    <div class="main-content">
        <h2>Welcome, <span id="welcomeName">Student</span>! 👋</h2>
        <div class="stats-grid">
            <div class="stat-card"><div id="statTotal" class="stat-number">0</div><p>Total Courses</p></div>
            <div class="stat-card"><div id="statEnrolled" class="stat-number">0</div><p>Enrolled</p></div>
            <div class="stat-card"><div id="statCompleted" class="stat-number">0</div><p>Completed</p></div>
        </div>
        <h3 style="margin-bottom:20px;">📖 My Courses</h3>
        <div id="myCoursesList" class="courses-grid"></div>
    </div>
</div>

<script>
    let currentUser = null, allCourses = [], userEnrollments = new Map(), authMode = 'login';
    
    function showToast(msg, isError = false) { 
        const t = document.createElement('div'); 
        t.className = 'toast' + (isError ? ' error' : ''); 
        t.textContent = msg; 
        document.body.appendChild(t); 
        setTimeout(() => t.remove(), 3000); 
    }
    
    function escapeHtml(str) { 
        if (!str) return ''; 
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
    }
    
    function showAuthModal(mode) { 
        authMode = mode; 
        document.getElementById('authModal').classList.add('active'); 
        document.getElementById('modalTitle').textContent = mode === 'login' ? 'Login' : 'Create Account'; 
        document.getElementById('authBtn').textContent = mode === 'login' ? 'Login' : 'Register'; 
        document.getElementById('switchText').innerHTML = mode === 'login' ? 'Don\'t have an account?' : 'Already have an account?';
    }
    
    function closeAuthModal() { 
        document.getElementById('authModal').classList.remove('active'); 
        document.getElementById('authEmail').value = ''; 
        document.getElementById('authPassword').value = ''; 
    }
    
    async function loadCourses() {
        const courses = await window.MEIDrive.fetchCourses();
        if (!courses.length) { 
            document.getElementById('coursesList').innerHTML = '<div class="loading">No courses available</div>'; 
            return; 
        }
        allCourses = courses;
        document.getElementById('statTotal').textContent = allCourses.length;
        document.getElementById('coursesList').innerHTML = allCourses.map(c => `
            <div class="course-card" onclick="viewCourse(${c.id})">
                <span class="badge ${c.type === 'free' ? 'badge-free' : 'badge-premium'}">${c.type === 'free' ? 'FREE' : 'PREMIUM'}</span>
                <h3>${escapeHtml(c.name)}</h3>
                <p>${escapeHtml(c.description || '')}</p>
                <button class="btn btn-primary" onclick="event.stopPropagation(); enrollCourse(${c.id})">Enroll</button>
            </div>
        `).join('');
    }
    
    async function loadEnrollments() { 
        if (!currentUser) return; 
        const enrollments = await window.MEIDrive.fetchEnrollments(currentUser.id); 
        userEnrollments.clear(); 
        enrollments.forEach(e => userEnrollments.set(Number(e.course_id), { progress: Number(e.progress) || 0 })); 
        renderMyCourses(); 
        updateStats(); 
    }
    
    async function enrollCourse(courseId) { 
        if (!currentUser) { 
            showToast('Please login to enroll', true);
            showAuthModal('login'); 
            return; 
        } 
        if (userEnrollments.has(courseId)) { 
            viewCourse(courseId); 
            return; 
        } 
        const result = await window.MEIDrive.enrollInCourse(currentUser.id, courseId); 
        if (result.success) { 
            showToast('✅ Enrolled!'); 
            await loadEnrollments(); 
            viewCourse(courseId); 
        } else { 
            showToast('❌ ' + result.error, true); 
        } 
    }
    
    function viewCourse(courseId) { 
        window.location.href = `course.html?id=${courseId}`; 
    }
    
    function updateStats() { 
        document.getElementById('statEnrolled').textContent = userEnrollments.size; 
        document.getElementById('statCompleted').textContent = Array.from(userEnrollments.values()).filter(e => e.progress === 100).length; 
    }
    
    function renderMyCourses() { 
        const container = document.getElementById('myCoursesList'); 
        const enrolledCourses = allCourses.filter(c => userEnrollments.has(Number(c.id))); 
        if (!enrolledCourses.length) { 
            container.innerHTML = '<div class="loading">No enrolled courses yet</div>'; 
            return; 
        } 
        container.innerHTML = enrolledCourses.map(c => { 
            const progress = userEnrollments.get(Number(c.id))?.progress || 0; 
            return `
                <div class="course-card" onclick="viewCourse(${c.id})">
                    <h3>${escapeHtml(c.name)}</h3>
                    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                    <p>${progress}% Complete</p>
                </div>
            `; 
        }).join(''); 
    }
    
    function showDashboard() { 
        document.getElementById('landingPage').style.display = 'none'; 
        document.getElementById('dashboard').style.display = 'block'; 
        if (currentUser) document.getElementById('welcomeName').textContent = currentUser.email.split('@')[0]; 
    }
    
    function showLanding() { 
        document.getElementById('landingPage').style.display = 'block'; 
        document.getElementById('dashboard').style.display = 'none'; 
    }
    
    // AUTH BUTTON HANDLER - WORKING REGISTRATION
    document.getElementById('authBtn').onclick = async () => {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        
        if (!email || !password) {
            showToast('❌ Please enter email and password', true);
            return;
        }
        
        if (password.length < 6) {
            showToast('❌ Password must be at least 6 characters', true);
            return;
        }
        
        if (authMode === 'login') {
            // LOGIN
            const result = await window.MEIDrive.loginUser(email, password);
            if (result.success) {
                showToast('✅ Welcome back!');
                closeAuthModal();
                const user = await window.MEIDrive.getCurrentUser();
                if (user) {
                    currentUser = user;
                    await loadEnrollments();
                    showDashboard();
                }
            } else {
                showToast('❌ ' + result.error, true);
            }
        } else {
            // REGISTER
            showToast('📝 Creating account...');
            const result = await window.MEIDrive.registerUser(email, password);
            
            if (result.success) {
                showToast('✅ Account created! Please login.');
                document.getElementById('authPassword').value = '';
                showAuthModal('login');
                document.getElementById('authEmail').value = email;
            } else {
                if (result.error.includes('already registered')) {
                    showToast('❌ Email already exists. Please login.', true);
                    showAuthModal('login');
                } else {
                    showToast('❌ ' + result.error, true);
                }
            }
        }
    };
    
    document.getElementById('toggleAuth').onclick = (e) => { 
        e.preventDefault(); 
        showAuthModal(authMode === 'login' ? 'register' : 'login'); 
    };
    
    document.getElementById('logoutBtn').onclick = async () => { 
        await window.MEIDrive.logoutUser(); 
    };
    
    if (window.MEIDrive?.supabase) {
        window.MEIDrive.supabase.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN') { 
                currentUser = session.user; 
                await loadEnrollments(); 
                showDashboard(); 
            }
            if (event === 'SIGNED_OUT') { 
                currentUser = null; 
                userEnrollments.clear(); 
                showLanding(); 
                await loadCourses(); 
                showToast('👋 Logged out'); 
            }
        });
    }
    
    async function init() { 
        if (!window.MEIDrive) { 
            setTimeout(init, 200); 
            return; 
        } 
        await loadCourses(); 
        const session = await window.MEIDrive.getSession(); 
        if (session?.user) { 
            currentUser = session.user; 
            await loadEnrollments(); 
            showDashboard(); 
        } 
    }
    
    init();
</script>
</body>
</html>
