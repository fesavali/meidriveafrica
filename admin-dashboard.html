<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MEI DRIVE AFRICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a192f; color: #ffffff; line-height: 1.5; }
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc66;
            --gradient-green: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            --dark-card: #0d2137;
            --border: rgba(0, 255, 136, 0.25);
            --text-muted: #a0b3d9;
        }
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: #0d2137;
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 20px;
        }
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: var(--gradient-green);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }
        .nav-item i { width: 24px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #0d2137;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .stat-title { color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--primary); }
        .card {
            background: #0d2137;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h2 { font-size: 1.3rem; color: var(--primary); }
        .data-table { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--primary); font-weight: 600; }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-primary { background: var(--gradient-green); color: #0a192f; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-warning { background: #ffa502; color: #0a192f; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-success { background: #00cc66; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0d2137;
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content textarea, .modal-content select {
            background: #0f1a2c;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            color: white;
            width: 100%;
            margin: 8px 0;
        }
        .modal-content label { font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; display: block; }
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2100;
        }
        .toast {
            background: #0d2137;
            border-left: 4px solid var(--primary);
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 8px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e2a3a;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .chart-container { max-width: 100%; height: 300px; margin: 20px 0; }
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar .nav-text { display: none; }
            .main-content { margin-left: 70px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo" onclick="window.location.href='index.html'">
                <i class="fas fa-car"></i>
                <span class="nav-text">MEI DRIVE</span>
            </div>
        </div>
        <nav>
            <div class="nav-item" onclick="setTab('dashboard')"><i class="fas fa-chart-line"></i><span class="nav-text">Dashboard</span></div>
            <div class="nav-item" onclick="setTab('payments')"><i class="fas fa-credit-card"></i><span class="nav-text">Payments</span></div>
            <div class="nav-item" onclick="setTab('financial')"><i class="fas fa-chart-pie"></i><span class="nav-text">Financial</span></div>
            <div class="nav-item" onclick="setTab('courses')"><i class="fas fa-book"></i><span class="nav-text">Courses</span></div>
            <div class="nav-item" onclick="setTab('units')"><i class="fas fa-layer-group"></i><span class="nav-text">Units</span></div>
            <div class="nav-item" onclick="setTab('signs')"><i class="fas fa-traffic-light"></i><span class="nav-text">Signs</span></div>
            <div class="nav-item" onclick="setTab('quiz')"><i class="fas fa-question-circle"></i><span class="nav-text">Quiz</span></div>
            <div class="nav-item" onclick="setTab('safety')"><i class="fas fa-shield-alt"></i><span class="nav-text">Safety</span></div>
            <div class="nav-item" onclick="setTab('users')"><i class="fas fa-users"></i><span class="nav-text">Users</span></div>
            <div class="nav-item" onclick="setTab('enrollments')"><i class="fas fa-graduation-cap"></i><span class="nav-text">Enrollments</span></div>
            <div class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i><span class="nav-text">Logout</span></div>
        </nav>
    </div>
    <div class="main-content">
        <div id="adminContent"><div class="loading-spinner"></div></div>
    </div>
</div>
<div id="toast-container" class="toast-container"></div>

<script>
    const SUPABASE_URL = 'https://qpqkmmkrzxlhcpccefjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s';
    
    let supabase = null;
    let currentUser = null;
    let currentTab = 'dashboard';
    
    function showToast(msg, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${msg} <button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    async function init() {
        if (!window.supabase) {
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (!window.supabase) {
                document.getElementById('adminContent').innerHTML = '<div class="card"><h2>⚠️ Connection Error</h2><p>Unable to load Supabase. Please refresh.</p></div>';
                return;
            }
        }
        
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            showLoginModal();
            return;
        }
        
        currentUser = session.user;
        
        const { data: profile } = await supabase
            .from('user_profiles')
            .select('is_admin')
            .eq('id', currentUser.id)
            .single();
        
        if (!profile?.is_admin) {
            document.getElementById('adminContent').innerHTML = `
                <div class="card">
                    <h2>⛔ Access Denied</h2>
                    <p>You don't have admin privileges.</p>
                    <button class="btn btn-primary" onclick="window.location.href='index.html'">Back to Home</button>
                </div>
            `;
            return;
        }
        
        renderAdminDashboard();
    }
    
    async function renderAdminDashboard() {
        const [usersRes, coursesRes, unitsRes, signsRes, quizRes, safetyRes, enrollmentsRes, paymentsRes] = await Promise.all([
            supabase.from('user_profiles').select('id', { count: 'exact', head: true }),
            supabase.from('courses').select('id', { count: 'exact', head: true }),
            supabase.from('units').select('id', { count: 'exact', head: true }),
            supabase.from('traffic_signs').select('id', { count: 'exact', head: true }),
            supabase.from('quiz_questions').select('id', { count: 'exact', head: true }),
            supabase.from('safety_library').select('id', { count: 'exact', head: true }),
            supabase.from('enrollments').select('id', { count: 'exact', head: true }),
            supabase.from('payments').select('amount', { count: 'exact', head: true })
        ]);
        
        const stats = {
            users: usersRes.count || 0,
            courses: coursesRes.count || 0,
            units: unitsRes.count || 0,
            signs: signsRes.count || 0,
            quiz: quizRes.count || 0,
            safety: safetyRes.count || 0,
            enrollments: enrollmentsRes.count || 0,
            payments: paymentsRes.count || 0
        };
        
        const statsHtml = `<div class="stats-grid"><div class="stat-card"><div class="stat-title">Total Users</div><div class="stat-value">${stats.users}</div></div><div class="stat-card"><div class="stat-title">Courses</div><div class="stat-value">${stats.courses}</div></div><div class="stat-card"><div class="stat-title">Units</div><div class="stat-value">${stats.units}</div></div><div class="stat-card"><div class="stat-title">Enrollments</div><div class="stat-value">${stats.enrollments}</div></div><div class="stat-card"><div class="stat-title">Transactions</div><div class="stat-value">${stats.payments}</div></div></div>`;
        
        let contentHtml = '';
        if (currentTab === 'dashboard') contentHtml = await renderDashboardContent();
        else if (currentTab === 'payments') contentHtml = await renderPaymentsContent();
        else if (currentTab === 'financial') contentHtml = await renderFinancialMatrix();
        else if (currentTab === 'courses') contentHtml = await renderCoursesContent();
        else if (currentTab === 'units') contentHtml = await renderUnitsContent();
        else if (currentTab === 'signs') contentHtml = await renderSignsContent();
        else if (currentTab === 'quiz') contentHtml = await renderQuizContent();
        else if (currentTab === 'safety') contentHtml = await renderSafetyContent();
        else if (currentTab === 'users') contentHtml = await renderUsersContent();
        else if (currentTab === 'enrollments') contentHtml = await renderEnrollmentsContent();
        
        document.getElementById('adminContent').innerHTML = statsHtml + contentHtml;
        highlightActiveNav();
    }
    
    async function renderDashboardContent() {
        const { data: recentPayments } = await supabase.from('payments').select('*, user_profiles(email), courses(name)').order('payment_date', { ascending: false }).limit(10);
        const { data: revenueData } = await supabase.from('payments').select('amount, payment_date').eq('payment_status', 'completed');
        const totalRevenue = revenueData?.reduce((sum, p) => sum + p.amount, 0) || 0;
        return `<div class="card"><h2>💰 Revenue Overview</h2><div class="stats-grid" style="margin-bottom:0;"><div class="stat-card"><div class="stat-title">Total Revenue</div><div class="stat-value">KES ${totalRevenue.toLocaleString()}</div></div><div class="stat-card"><div class="stat-title">Avg Transaction</div><div class="stat-value">KES ${revenueData?.length ? Math.round(totalRevenue / revenueData.length).toLocaleString() : 0}</div></div><div class="stat-card"><div class="stat-title">Transactions</div><div class="stat-value">${revenueData?.length || 0}</div></div></div></div><div class="card"><h2>💳 Recent Payments</h2><div class="data-table"><table><thead><tr><th>User</th><th>Course</th><th>Amount</th><th>Method</th><th>Status</th><th>Date</th></tr></thead><tbody>${recentPayments?.map(p => `<tr><td>${escapeHtml(p.user_profiles?.email || 'N/A')}</td><td>${escapeHtml(p.courses?.name || 'N/A')}</td><td>KES ${p.amount.toLocaleString()}</td><td>${p.payment_method}</td><td><span style="color:${p.payment_status === 'completed' ? '#00ff88' : '#ffa502'}">${p.payment_status}</span></td><td>${new Date(p.payment_date).toLocaleDateString()}</td></tr>`).join('') || '<tr><td colspan="6">No payments yet</td>'}</tbody>}</div></div>`;
    }
    
    async function renderPaymentsContent() {
        const { data: payments } = await supabase.from('payments').select('*, user_profiles(email), courses(name)').order('payment_date', { ascending: false });
        return `<div class="card"><div class="card-header"><h2>💳 Payment Transactions</h2><button class="btn btn-primary" onclick="showPaymentModal()">+ Add Payment</button></div><div class="data-table"><table><thead><tr><th>ID</th><th>User</th><th>Course</th><th>Amount</th><th>Method</th><th>MPESA Code</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>${payments?.map(p => `<tr><td>${p.id}</td><td>${escapeHtml(p.user_profiles?.email || 'N/A')}</td><td>${escapeHtml(p.courses?.name || 'N/A')}</td><td>KES ${p.amount.toLocaleString()}</td><td>${p.payment_method}</td><td>${p.mpesa_code || '-'}</td><td><select onchange="updatePaymentStatus(${p.id}, this.value)" style="background:#0f1a2c; color:white; border:1px solid var(--border); border-radius:5px; padding:4px 8px;"><option value="pending" ${p.payment_status === 'pending' ? 'selected' : ''}>Pending</option><option value="completed" ${p.payment_status === 'completed' ? 'selected' : ''}>Completed</option><option value="failed" ${p.payment_status === 'failed' ? 'selected' : ''}>Failed</option><option value="refunded" ${p.payment_status === 'refunded' ? 'selected' : ''}>Refunded</option></select></td><td>${new Date(p.payment_date).toLocaleDateString()}</td><td><button class="btn btn-danger" onclick="deletePayment(${p.id})">Delete</button></td></tr>`).join('') || '<tr><td colspan="9">No payments yet</td></tr>'}</tbody>}</div></div>`;
    }
    
    async function renderFinancialMatrix() {
        const { data: payments } = await supabase.from('payments').select('amount, payment_method, payment_status, payment_date').eq('payment_status', 'completed');
        const totalRevenue = payments?.reduce((sum, p) => sum + p.amount, 0) || 0;
        const mpesaRevenue = payments?.filter(p => p.payment_method === 'mpesa').reduce((sum, p) => sum + p.amount, 0) || 0;
        const cardRevenue = payments?.filter(p => p.payment_method === 'card').reduce((sum, p) => sum + p.amount, 0) || 0;
        const monthlyData = {};
        payments?.forEach(p => { const month = new Date(p.payment_date).toLocaleString('default', { month: 'short', year: 'numeric' }); monthlyData[month] = (monthlyData[month] || 0) + p.amount; });
        const months = Object.keys(monthlyData);
        const revenues = Object.values(monthlyData);
        return `<div class="card"><h2>📊 Financial Matrix</h2><div class="stats-grid"><div class="stat-card"><div class="stat-title">Total Revenue</div><div class="stat-value">KES ${totalRevenue.toLocaleString()}</div></div><div class="stat-card"><div class="stat-title">M-PESA Revenue</div><div class="stat-value">KES ${mpesaRevenue.toLocaleString()}</div></div><div class="stat-card"><div class="stat-title">Card Revenue</div><div class="stat-value">KES ${cardRevenue.toLocaleString()}</div></div><div class="stat-card"><div class="stat-title">Transactions</div><div class="stat-value">${payments?.length || 0}</div></div></div></div><div class="card"><h2>📈 Monthly Revenue Chart</h2><div class="chart-container"><canvas id="revenueChart"></canvas></div></div><div class="card"><h2>💰 Revenue by Payment Method</h2><div class="chart-container"><canvas id="methodChart"></canvas></div></div><script>setTimeout(()=>{const c1=document.getElementById('revenueChart')?.getContext('2d');if(c1)new Chart(c1,{type:'line',data:{labels:${JSON.stringify(months)},datasets:[{label:'Revenue (KES)',data:${JSON.stringify(revenues)},borderColor:'#00ff88',backgroundColor:'rgba(0,255,136,0.1)',fill:true}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:'#fff'}}}}});const c2=document.getElementById('methodChart')?.getContext('2d');if(c2)new Chart(c2,{type:'doughnut',data:{labels:['M-PESA','Card'],datasets:[{data:[${mpesaRevenue},${cardRevenue}],backgroundColor:['#00ff88','#ffa502']}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:'#fff'}}}}});},100);<\/script><div class="card"><h2>📋 Financial Summary</h2><div class="data-table"><table><thead><tr><th>Metric</th><th>Value</th></tr></thead><tbody><tr><td>Total Revenue</td><td>KES ${totalRevenue.toLocaleString()}</td></tr><tr><td>Average Transaction Value</td><td>KES ${payments?.length ? Math.round(totalRevenue / payments.length).toLocaleString() : 0}</td></tr><tr><td>Highest Transaction</td><td>KES ${payments?.length ? Math.max(...payments.map(p => p.amount)).toLocaleString() : 0}</td></tr><tr><td>Lowest Transaction</td><td>KES ${payments?.length ? Math.min(...payments.map(p => p.amount)).toLocaleString() : 0}</td></tr><tr><td>M-PESA Share</td><td>${totalRevenue ? Math.round((mpesaRevenue / totalRevenue) * 100) : 0}%</td></tr><tr><td>Card Share</td><td>${totalRevenue ? Math.round((cardRevenue / totalRevenue) * 100) : 0}%</td></tr></tbody></div></div>`;
    }
    
    async function renderCoursesContent() {
        const { data: courses } = await supabase.from('courses').select('*').order('id');
        return `<div class="card"><div class="card-header"><h2>📚 Manage Courses</h2><button class="btn btn-primary" onclick="showCourseModal()">+ Add Course</button></div><div class="data-table"><table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Price</th><th>Icon</th><th>Actions</th></tr></thead><tbody>${courses?.map(c => `<tr><td>${c.id}</td><td>${escapeHtml(c.name)}</td><td>${escapeHtml(c.type)}</td><td>${c.price === 0 ? 'FREE' : `KES ${c.price}`}</td><td><i class="fas ${c.icon}"></i></td><td><button class="btn btn-warning" onclick="editCourse(${c.id})">Edit</button> <button class="btn btn-danger" onclick="deleteCourse(${c.id})">Delete</button></td></tr>`).join('')}</tbody></div></div>`;
    }
    
    async function renderUnitsContent() {
        const { data: units } = await supabase.from('units').select('*').order('unit_number');
        return `<div class="card"><div class="card-header"><h2>📘 Manage Units</h2><button class="btn btn-primary" onclick="showUnitModal()">+ Add Unit</button></div><div class="data-table"><tr><thead><tr><th>#</th><th>Title</th><th>Content Preview</th><th>Actions</th></tr></thead><tbody>${units?.map(u => `<tr><td>${u.unit_number}</td><td>${escapeHtml(u.title)}</td><td>${escapeHtml(u.content?.substring(0, 50))}...</td><td><button class="btn btn-warning" onclick="editUnit(${u.id})">Edit</button> <button class="btn btn-danger" onclick="deleteUnit(${u.id})">Delete</button></td></tr>`).join('')}</tbody></div></div>`;
    }
    
    async function renderSignsContent() {
        const { data: signs } = await supabase.from('traffic_signs').select('*').order('category');
        return `<div class="card"><div class="card-header"><h2>🚦 Manage Traffic Signs</h2><button class="btn btn-primary" onclick="showSignModal()">+ Add Sign</button></div><div class="data-table"><table><thead><tr><th>Category</th><th>Name</th><th>Description</th><th>Actions</th></tr></thead><tbody>${signs?.map(s => `<tr><td>${escapeHtml(s.category)}</td><td>${escapeHtml(s.name)}</td><td>${escapeHtml(s.description?.substring(0, 60))}...</td><td><button class="btn btn-warning" onclick="editSign(${s.id})">Edit</button> <button class="btn btn-danger" onclick="deleteSign(${s.id})">Delete</button></td></tr>`).join('')}</tbody></div></div>`;
    }
    
    async function renderQuizContent() {
        const { data: questions } = await supabase.from('quiz_questions').select('*');
        return `<div class="card"><div class="card-header"><h2>❓ Manage Quiz Questions</h2><button class="btn btn-primary" onclick="showQuestionModal()">+ Add Question</button></div><div class="data-table"><table><thead><tr><th>ID</th><th>Question</th><th>Options</th><th>Correct</th><th>Actions</th></tr></thead><tbody>${questions?.map(q => `<tr><td>${q.id}</td><td>${escapeHtml(q.question?.substring(0, 40))}...</td><td>A:${escapeHtml(q.option_a?.substring(0, 15))}<br>B:${escapeHtml(q.option_b?.substring(0, 15))}</td><td>${q.correct_answer}</td><td><button class="btn btn-warning" onclick="editQuestion(${q.id})">Edit</button> <button class="btn btn-danger" onclick="deleteQuestion(${q.id})">Delete</button></td></tr>`).join('')}</tbody></div></div>`;
    }
    
    async function renderSafetyContent() {
        const { data: items } = await supabase.from('safety_library').select('*').order('category');

    window.setTab = (tab) => { currentTab = tab; renderAdminDashboard(); };

    function highlightActiveNav() {
        document.querySelectorAll('.nav-item').forEach((item) => {
            const text = item.querySelector('.nav-text')?.innerText?.toLowerCase() || '';
            if ((currentTab === 'dashboard' && text === 'dashboard') || text === currentTab) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }
    
    function showLoginModal() {

    window.adminLogin = async () => {
