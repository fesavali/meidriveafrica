<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MEI DRIVE AFRICA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a192f; color: #ffffff; line-height: 1.5; }
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc66;
            --gradient-green: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            --dark-card: #0d2137;
            --border: rgba(0, 255, 136, 0.25);
            --text-muted: #a0b3d9;
        }
        
        /* Layout */
        .admin-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: #0d2137;
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 20px;
        }
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: var(--gradient-green);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-muted);
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }
        .nav-item i { width: 24px; }
        
        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #0d2137;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: var(--primary); }
        .stat-title { color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 800; color: var(--primary); }
        
        .card {
            background: #0d2137;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-header h2 { font-size: 1.3rem; color: var(--primary); }
        
        /* Tables */
        .data-table {
            width: 100%;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--primary); font-weight: 600; }
        
        /* Buttons */
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-primary { background: var(--gradient-green); color: #0a192f; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-warning { background: #ffa502; color: #0a192f; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0d2137;
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content textarea, .modal-content select {
            background: #0f1a2c;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            color: white;
            width: 100%;
            margin: 8px 0;
        }
        .modal-content label { font-size: 0.85rem; color: var(--text-muted); margin-top: 10px; display: block; }
        
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2100;
        }
        .toast {
            background: #0d2137;
            border-left: 4px solid var(--primary);
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 8px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e2a3a;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar .nav-text { display: none; }
            .main-content { margin-left: 70px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="admin-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo" onclick="window.location.href='index.html'">
                <i class="fas fa-car"></i>
                <span class="nav-text">MEI DRIVE</span>
            </div>
        </div>
        <nav>
            <div class="nav-item" onclick="setTab('dashboard')">
                <i class="fas fa-chart-line"></i><span class="nav-text">Dashboard</span>
            </div>
            <div class="nav-item" onclick="setTab('courses')">
                <i class="fas fa-book"></i><span class="nav-text">Courses</span>
            </div>
            <div class="nav-item" onclick="setTab('units')">
                <i class="fas fa-layer-group"></i><span class="nav-text">Units</span>
            </div>
            <div class="nav-item" onclick="setTab('signs')">
                <i class="fas fa-traffic-light"></i><span class="nav-text">Traffic Signs</span>
            </div>
            <div class="nav-item" onclick="setTab('quiz')">
                <i class="fas fa-question-circle"></i><span class="nav-text">Quiz Bank</span>
            </div>
            <div class="nav-item" onclick="setTab('safety')">
                <i class="fas fa-shield-alt"></i><span class="nav-text">Safety Library</span>
            </div>
            <div class="nav-item" onclick="setTab('users')">
                <i class="fas fa-users"></i><span class="nav-text">Users</span>
            </div>
            <div class="nav-item" onclick="setTab('enrollments')">
                <i class="fas fa-graduation-cap"></i><span class="nav-text">Enrollments</span>
            </div>
            <div class="nav-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i><span class="nav-text">Logout</span>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div id="adminContent">
            <div class="loading-spinner"></div>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script>
    const SUPABASE_URL = 'https://qpqkmmkrzxlhcpccefjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s';
    
    let supabase = null;
    let currentUser = null;
    let currentTab = 'dashboard';
    
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${msg} <button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    async function init() {
        if (!window.supabase) {
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (!window.supabase) {
                document.getElementById('adminContent').innerHTML = '<div class="card"><h2>⚠️ Connection Error</h2><p>Unable to load Supabase. Please refresh.</p></div>';
                return;
            }
        }
        
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            showLoginModal();
            return;
        }
        
        currentUser = session.user;
        
        const { data: profile } = await supabase
            .from('user_profiles')
            .select('is_admin')
            .eq('id', currentUser.id)
            .single();
        
        if (!profile?.is_admin) {
            document.getElementById('adminContent').innerHTML = `
                <div class="card">
                    <h2>⛔ Access Denied</h2>
                    <p>You don't have admin privileges.</p>
                    <button class="btn btn-primary" onclick="window.location.href='index.html'">Back to Home</button>
                </div>
            `;
            return;
        }
        
        renderAdminDashboard();
    }
    
    async function renderAdminDashboard() {
        // Fetch stats
        const [usersRes, coursesRes, unitsRes, signsRes, quizRes, safetyRes, enrollmentsRes] = await Promise.all([
            supabase.from('user_profiles').select('id', { count: 'exact', head: true }),
            supabase.from('courses').select('id', { count: 'exact', head: true }),
            supabase.from('units').select('id', { count: 'exact', head: true }),
            supabase.from('traffic_signs').select('id', { count: 'exact', head: true }),
            supabase.from('quiz_questions').select('id', { count: 'exact', head: true }),
            supabase.from('safety_library').select('id', { count: 'exact', head: true }),
            supabase.from('enrollments').select('id', { count: 'exact', head: true })
        ]);
        
        const stats = {
            users: usersRes.count || 0,
            courses: coursesRes.count || 0,
            units: unitsRes.count || 0,
            signs: signsRes.count || 0,
            quiz: quizRes.count || 0,
            safety: safetyRes.count || 0,
            enrollments: enrollmentsRes.count || 0
        };
        
        const statsHtml = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-title">Total Users</div><div class="stat-value">${stats.users}</div></div>
                <div class="stat-card"><div class="stat-title">Courses</div><div class="stat-value">${stats.courses}</div></div>
                <div class="stat-card"><div class="stat-title">Units</div><div class="stat-value">${stats.units}</div></div>
                <div class="stat-card"><div class="stat-title">Traffic Signs</div><div class="stat-value">${stats.signs}</div></div>
                <div class="stat-card"><div class="stat-title">Quiz Questions</div><div class="stat-value">${stats.quiz}</div></div>
                <div class="stat-card"><div class="stat-title">Safety Articles</div><div class="stat-value">${stats.safety}</div></div>
                <div class="stat-card"><div class="stat-title">Enrollments</div><div class="stat-value">${stats.enrollments}</div></div>
            </div>
        `;
        
        let contentHtml = '';
        if (currentTab === 'dashboard') contentHtml = await renderDashboardContent();
        else if (currentTab === 'courses') contentHtml = await renderCoursesContent();
        else if (currentTab === 'units') contentHtml = await renderUnitsContent();
        else if (currentTab === 'signs') contentHtml = await renderSignsContent();
        else if (currentTab === 'quiz') contentHtml = await renderQuizContent();
        else if (currentTab === 'safety') contentHtml = await renderSafetyContent();
        else if (currentTab === 'users') contentHtml = await renderUsersContent();
        else if (currentTab === 'enrollments') contentHtml = await renderEnrollmentsContent();
        
        document.getElementById('adminContent').innerHTML = statsHtml + contentHtml;
        highlightActiveNav();
    }
    
    async function renderDashboardContent() {
        const { data: recentEnrollments } = await supabase
            .from('enrollments')
            .select('*, user_profiles(email), courses(name)')
            .order('enrolled_at', { ascending: false })
            .limit(10);
        
        const { data: recentUsers } = await supabase
            .from('user_profiles')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(5);
        
        return `
            <div class="card">
                <h2>📋 Recent Enrollments</h2>
                <div class="data-table">
                    <table>
                        <thead><tr><th>User</th><th>Course</th><th>Date</th></tr></thead>
                        <tbody>
                            ${recentEnrollments?.map(e => `
                                <tr><td>${escapeHtml(e.user_profiles?.email || 'N/A')}</td><td>${escapeHtml(e.courses?.name || 'N/A')}</td><td>${new Date(e.enrolled_at).toLocaleDateString()}</td></tr>
                            `).join('') || '<tr><td colspan="3">No enrollments yet</td></tr>'}
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card">
                <h2>👤 Recent Users</h2>
                <div class="data-table">
                    <table>
                        <thead><tr><th>Email</th><th>Name</th><th>Joined</th><th>Admin</th></tr></thead>
                        <tbody>
                            ${recentUsers?.map(u => `
                                <tr><td>${escapeHtml(u.email)}</td><td>${escapeHtml(u.full_name)}</td><td>${new Date(u.created_at).toLocaleDateString()}</td><td>${u.is_admin ? '✅' : '❌'}</td></tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    async function renderCoursesContent() {
        const { data: courses } = await supabase.from('courses').select('*').order('id');
        return `
            <div class="card">
                <div class="card-header">
                    <h2>📚 Manage Courses</h2>
                    <button class="btn btn-primary" onclick="showCourseModal()">+ Add Course</button>
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Price</th><th>Icon</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${courses?.map(c => `
                                <tr>
                                    <td>${c.id}</td>
                                    <td>${escapeHtml(c.name)}</td>
                                    <td>${escapeHtml(c.type)}</td>
                                    <td>${c.price === 0 ? 'FREE' : `KES ${c.price}`}</td>
                                    <td><i class="fas ${c.icon}"></i></td>
                                    <td><button class="btn btn-warning" onclick="editCourse(${c.id})">Edit</button> <button class="btn btn-danger" onclick="deleteCourse(${c.id})">Delete</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    async function renderUnitsContent() {
        const { data: units } = await supabase.from('units').select('*').order('unit_number');
        return `
            <div class="card">
                <div class="card-header">
                    <h2>📘 Manage Units</h2>
                    <button class="btn btn-primary" onclick="showUnitModal()">+ Add Unit</button>
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>#</th><th>Title</th><th>Content Preview</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${units?.map(u => `
                                <tr>
                                    <td>${u.unit_number}</td>
                                    <td>${escapeHtml(u.title)}</td>
                                    <td>${escapeHtml(u.content?.substring(0, 50))}...</td>
                                    <td><button class="btn btn-warning" onclick="editUnit(${u.id})">Edit</button> <button class="btn btn-danger" onclick="deleteUnit(${u.id})">Delete</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    async function renderSignsContent() {
        const { data: signs } = await supabase.from('traffic_signs').select('*').order('category');
        return `
            <div class="card">
                <div class="card-header">
                    <h2>🚦 Manage Traffic Signs</h2>
                    <button class="btn btn-primary" onclick="showSignModal()">+ Add Sign</button>
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>Category</th><th>Name</th><th>Description</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${signs?.map(s => `
                                <tr>
                                    <td>${escapeHtml(s.category)}</td>
                                    <td>${escapeHtml(s.name)}</td>
                                    <td>${escapeHtml(s.description?.substring(0, 60))}...</td>
                                    <td><button class="btn btn-warning" onclick="editSign(${s.id})">Edit</button> <button class="btn btn-danger" onclick="deleteSign(${s.id})">Delete</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    async function renderQuizContent() {
        const { data: questions } = await supabase.from('quiz_questions').select('*');
        return `
            <div class="card">
                <div class="card-header">
                    <h2>❓ Manage Quiz Questions</h2>
                    <button class="btn btn-primary" onclick="showQuestionModal()">+ Add Question</button>
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>ID</th><th>Question</th><th>Options</th><th>Correct</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${questions?.map(q => `
                                <tr>
                                    <td>${q.id}</td>
                                    <td>${escapeHtml(q.question?.substring(0, 40))}...</td>
                                    <td>A:${escapeHtml(q.option_a?.substring(0, 15))}<br>B:${escapeHtml(q.option_b?.substring(0, 15))}</td>
                                    <td>${q.correct_answer}</td>
                                    <td><button class="btn btn-warning" onclick="editQuestion(${q.id})">Edit</button> <button class="btn btn-danger" onclick="deleteQuestion(${q.id})">Delete</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    async function renderSafetyContent() {
        const { data: items } = await supabase.from('safety_library').select('*').order('category');
        return `
            <div class="card">
                <div class="card-header">
                    <h2>🛡️ Manage Safety Library</h2>
                    <button class="btn btn-primary" onclick="showSafetyModal()">+ Add Article</button>
                </div>
                <div class="data-table">
                    <table>
                        <thead><tr><th>Category</th><th>Title</th><th>Content Preview</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${items?.map(i => `
                                <tr>
                                    <td>${escapeHtml(i.category)}</td>
                                    <td>${escapeHtml(i.title)}</td>
                                    <td>${escapeHtml(i.content?.substring(0, 50))}...</td>
                                    <td><button class="btn btn-warning" onclick="editSafety(${i.id})">Edit</button> <button class="btn btn-danger" onclick="deleteSafety(${i.id})">Delete</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    async function renderUsersContent() {
        const { data: users } = await supabase.from('user_profiles').select('*').order('created_at', { ascending: false });
        return `
            <div class="card">
                <h2>👥 Manage Users</h2>
                <div class="data-table">
                    <table>
                        <thead><tr><th>Email</th><th>Full Name</th><th>Admin</th><th>Joined</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${users?.map(u => `
                                <tr>
                                    <td>${escapeHtml(u.email)}</td>
                                    <td>${escapeHtml(u.full_name)}</td>
                                    <td>${u.is_admin ? '✅ Yes' : '❌ No'}</td>
                                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                                    <td><button class="btn btn-warning" onclick="toggleAdmin('${u.id}', ${!u.is_admin})">${u.is_admin ? 'Remove Admin' : 'Make Admin'}</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    async function renderEnrollmentsContent() {
        const { data: enrollments } = await supabase
            .from('enrollments')
            .select('*, user_profiles(email), courses(name)')
            .order('enrolled_at', { ascending: false });
        return `
            <div class="card">
                <h2>📋 All Enrollments</h2>
                <div class="data-table">
                    <table>
                        <thead><tr><th>User</th><th>Course</th><th>Status</th><th>Amount</th><th>Date</th></tr></thead>
                        <tbody>
                            ${enrollments?.map(e => `
                                <tr>
                                    <td>${escapeHtml(e.user_profiles?.email || 'N/A')}</td>
                                    <td>${escapeHtml(e.courses?.name || 'N/A')}</td>
                                    <td>${escapeHtml(e.payment_status)}</td>
                                    <td>${e.amount_paid > 0 ? `KES ${e.amount_paid}` : 'FREE'}</td>
                                    <td>${new Date(e.enrolled_at).toLocaleDateString()}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }
    
    // ==================== CRUD Functions ====================
    window.setTab = (tab) => { currentTab = tab; renderAdminDashboard(); };
    
    function highlightActiveNav() {
        document.querySelectorAll('.nav-item').forEach((item, i) => {
            const text = item.querySelector('.nav-text')?.innerText?.toLowerCase() || '';
            if ((currentTab === 'dashboard' && i === 0) || text.includes(currentTab)) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }
    
    // Course CRUD
    window.showCourseModal = (course = null) => {
        const isEdit = !!course;
        const modalHtml = `
            <div class="modal active" id="editModal">
                <div class="modal-content">
                    <h2>${isEdit ? 'Edit' : 'Add'} Course</h2>
                    <label>Course Name</label><input type="text" id="courseName" value="${escapeHtml(course?.name || '')}">
                    <label>Type (unique slug)</label><input type="text" id="courseType" value="${escapeHtml(course?.type || '')}">
                    <label>Price (0 for free)</label><input type="number" id="coursePrice" value="${course?.price || 0}">
                    <label>Description</label><textarea id="courseDesc" rows="3">${escapeHtml(course?.description || '')}</textarea>
                    <label>Icon (Font Awesome class)</label><input type="text" id="courseIcon" value="${escapeHtml(course?.icon || 'fa-book')}">
                    <button class="btn btn-primary" onclick="saveCourse(${isEdit ? course.id : 'null'})">Save</button>
                    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    window.editCourse = async (id) => {
        const { data } = await supabase.from('courses').select('*').eq('id', id).single();
        showCourseModal(data);
    };
    window.saveCourse = async (id) => {
        const data = {
            name: document.getElementById('courseName').value,
            type: document.getElementById('courseType').value,
            price: parseInt(document.getElementById('coursePrice').value),
            description: document.getElementById('courseDesc').value,
            icon: document.getElementById('courseIcon').value
        };
        if (id) await supabase.from('courses').update(data).eq('id', id);
        else await supabase.from('courses').insert(data);
        closeModal();
        showToast(id ? 'Course updated!' : 'Course added!', 'success');
        renderAdminDashboard();
    };
    window.deleteCourse = async (id) => { if (confirm('Delete?')) { await supabase.from('courses').delete().eq('id', id); showToast('Deleted', 'success'); renderAdminDashboard(); } };
    
    // Unit CRUD
    window.showUnitModal = (unit = null) => {
        const isEdit = !!unit;
        const modalHtml = `
            <div class="modal active" id="editModal">
                <div class="modal-content">
                    <h2>${isEdit ? 'Edit' : 'Add'} Unit</h2>
                    <label>Unit Number</label><input type="number" id="unitNumber" value="${unit?.unit_number || ''}">
                    <label>Title</label><input type="text" id="unitTitle" value="${escapeHtml(unit?.title || '')}">
                    <label>Content (Full text)</label><textarea id="unitContent" rows="8">${escapeHtml(unit?.content || '')}</textarea>
                    <button class="btn btn-primary" onclick="saveUnit(${isEdit ? unit.id : 'null'})">Save</button>
                    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    window.editUnit = async (id) => { const { data } = await supabase.from('units').select('*').eq('id', id).single(); showUnitModal(data); };
    window.saveUnit = async (id) => {
        const data = { unit_number: parseInt(document.getElementById('unitNumber').value), title: document.getElementById('unitTitle').value, content: document.getElementById('unitContent').value };
        if (id) await supabase.from('units').update(data).eq('id', id);
        else await supabase.from('units').insert(data);
        closeModal(); showToast(id ? 'Unit updated!' : 'Unit added!', 'success'); renderAdminDashboard();
    };
    window.deleteUnit = async (id) => { if (confirm('Delete?')) { await supabase.from('units').delete().eq('id', id); showToast('Deleted', 'success'); renderAdminDashboard(); } };
    
    // Sign CRUD
    window.showSignModal = (sign = null) => {
        const isEdit = !!sign;
        const modalHtml = `
            <div class="modal active" id="editModal">
                <div class="modal-content">
                    <h2>${isEdit ? 'Edit' : 'Add'} Traffic Sign</h2>
                    <label>Category</label><select id="signCategory"><option value="regulatory" ${sign?.category === 'regulatory' ? 'selected' : ''}>Regulatory</option><option value="warning" ${sign?.category === 'warning' ? 'selected' : ''}>Warning</option><option value="information" ${sign?.category === 'information' ? 'selected' : ''}>Information</option></select>
                    <label>Sign Name</label><input type="text" id="signName" value="${escapeHtml(sign?.name || '')}">
                    <label>Description</label><textarea id="signDesc" rows="3">${escapeHtml(sign?.description || '')}</textarea>
                    <button class="btn btn-primary" onclick="saveSign(${isEdit ? sign.id : 'null'})">Save</button>
                    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    window.editSign = async (id) => { const { data } = await supabase.from('traffic_signs').select('*').eq('id', id).single(); showSignModal(data); };
    window.saveSign = async (id) => {
        const data = { category: document.getElementById('signCategory').value, name: document.getElementById('signName').value, description: document.getElementById('signDesc').value };
        if (id) await supabase.from('traffic_signs').update(data).eq('id', id);
        else await supabase.from('traffic_signs').insert(data);
        closeModal(); showToast(id ? 'Sign updated!' : 'Sign added!', 'success'); renderAdminDashboard();
    };
    window.deleteSign = async (id) => { if (confirm('Delete?')) { await supabase.from('traffic_signs').delete().eq('id', id); showToast('Deleted', 'success'); renderAdminDashboard(); } };
    
    // Quiz CRUD
    window.showQuestionModal = (q = null) => {
        const isEdit = !!q;
        const modalHtml = `
            <div class="modal active" id="editModal">
                <div class="modal-content">
                    <h2>${isEdit ? 'Edit' : 'Add'} Quiz Question</h2>
                    <label>Question</label><textarea id="questionText" rows="2">${escapeHtml(q?.question || '')}</textarea>
                    <label>Option A</label><input type="text" id="optA" value="${escapeHtml(q?.option_a || '')}">
                    <label>Option B</label><input type="text" id="optB" value="${escapeHtml(q?.option_b || '')}">
                    <label>Option C</label><input type="text" id="optC" value="${escapeHtml(q?.option_c || '')}">
                    <label>Option D</label><input type="text" id="optD" value="${escapeHtml(q?.option_d || '')}">
                    <label>Correct Answer</label><select id="correctAnswer"><option value="A" ${q?.correct_answer === 'A' ? 'selected' : ''}>A</option><option value="B" ${q?.correct_answer === 'B' ? 'selected' : ''}>B</option><option value="C" ${q?.correct_answer === 'C' ? 'selected' : ''}>C</option><option value="D" ${q?.correct_answer === 'D' ? 'selected' : ''}>D</option></select>
                    <label>Explanation (optional)</label><textarea id="explanation" rows="2">${escapeHtml(q?.explanation || '')}</textarea>
                    <button class="btn btn-primary" onclick="saveQuestion(${isEdit ? q.id : 'null'})">Save</button>
                    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    window.editQuestion = async (id) => { const { data } = await supabase.from('quiz_questions').select('*').eq('id', id).single(); showQuestionModal(data); };
    window.saveQuestion = async (id) => {
        const data = { question: document.getElementById('questionText').value, option_a: document.getElementById('optA').value, option_b: document.getElementById('optB').value, option_c: document.getElementById('optC').value, option_d: document.getElementById('optD').value, correct_answer: document.getElementById('correctAnswer').value, explanation: document.getElementById('explanation').value };
        if (id) await supabase.from('quiz_questions').update(data).eq('id', id);
        else await supabase.from('quiz_questions').insert(data);
        closeModal(); showToast(id ? 'Question updated!' : 'Question added!', 'success'); renderAdminDashboard();
    };
    window.deleteQuestion = async (id) => { if (confirm('Delete?')) { await supabase.from('quiz_questions').delete().eq('id', id); showToast('Deleted', 'success'); renderAdminDashboard(); } };
    
    // Safety Library CRUD
    window.showSafetyModal = (item = null) => {
        const isEdit = !!item;
        const modalHtml = `
            <div class="modal active" id="editModal">
                <div class="modal-content">
                    <h2>${isEdit ? 'Edit' : 'Add'} Safety Article</h2>
                    <label>Category</label><select id="safetyCategory"><option value="emergency" ${item?.category === 'emergency' ? 'selected' : ''}>Emergency</option><option value="first-aid" ${item?.category === 'first-aid' ? 'selected' : ''}>First Aid</option><option value="maintenance" ${item?.category === 'maintenance' ? 'selected' : ''}>Maintenance</option><option value="rules" ${item?.category === 'rules' ? 'selected' : ''}>Rules</option></select>
                    <label>Title</label><input type="text" id="safetyTitle" value="${escapeHtml(item?.title || '')}">
                    <label>Content</label><textarea id="safetyContent" rows="6">${escapeHtml(item?.content || '')}</textarea>
                    <button class="btn btn-primary" onclick="saveSafety(${isEdit ? item.id : 'null'})">Save</button>
                    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };
    window.editSafety = async (id) => { const { data } = await supabase.from('safety_library').select('*').eq('id', id).single(); showSafetyModal(data); };
    window.saveSafety = async (id) => {
        const data = { category: document.getElementById('safetyCategory').value, title: document.getElementById('safetyTitle').value, content: document.getElementById('safetyContent').value };
        if (id) await supabase.from('safety_library').update(data).eq('id', id);
        else await supabase.from('safety_library').insert(data);
        closeModal(); showToast(id ? 'Article updated!' : 'Article added!', 'success'); renderAdminDashboard();
    };
    window.deleteSafety = async (id) => { if (confirm('Delete?')) { await supabase.from('safety_library').delete().eq('id', id); showToast('Deleted', 'success'); renderAdminDashboard(); } };
    
    // User Management
    window.toggleAdmin = async (userId, makeAdmin) => {
        await supabase.from('user_profiles').update({ is_admin: makeAdmin }).eq('id', userId);
        showToast(`User ${makeAdmin ? 'is now admin' : 'admin rights removed'}`, 'success');
        renderAdminDashboard();
    };
    
    window.closeModal = () => { document.getElementById('editModal')?.remove(); };
    
    function showLoginModal() {
        const modalHtml = `
            <div class="modal active" id="loginModal">
                <div class="modal-content">
                    <h2>Admin Login Required</h2>
                    <p>Please sign in with your admin account</p>
                    <input type="email" id="adminEmail" placeholder="Email">
                    <input type="password" id="adminPassword" placeholder="Password">
                    <button class="btn btn-primary" onclick="adminLogin()">Login</button>
                    <button class="btn btn-outline" onclick="window.location.href='index.html'">Back to Site</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    
    window.adminLogin = async () => {
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { showToast(error.message, 'error'); return; }
        window.location.reload();
    };
    
    window.logout = async () => { await supabase.auth.signOut(); window.location.href = 'index.html'; };
    
    init();
</script>
</body>
</html>
