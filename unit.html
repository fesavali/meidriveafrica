<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #ffffff;
        }
        .navbar {
            background: #1a1f3a;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
            text-decoration: none;
        }
        .logo span { color: white; }
        .back-btn {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .unit-header {
            background: linear-gradient(135deg, #1a1f3a, #0a0e27);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .unit-number { color: #00ff88; font-size: 0.9rem; margin-bottom: 10px; }
        .unit-header h1 { font-size: 2rem; margin-bottom: 15px; }
        .unit-meta {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            color: #a0a0c0;
            font-size: 0.9rem;
        }
        .unit-content {
            background: #1a1f3a;
            border-radius: 16px;
            padding: 40px;
            border: 1px solid rgba(0, 255, 136, 0.1);
        }
        .unit-content h1, .unit-content h2, .unit-content h3 {
            color: #00ff88;
            margin: 20px 0 10px 0;
        }
        .unit-content p {
            color: #a0a0c0;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .unit-content ul, .unit-content ol {
            margin: 15px 0;
            padding-left: 25px;
            color: #a0a0c0;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }
        .nav-btn {
            padding: 12px 24px;
            background: #00ff88;
            color: #0a0e27;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
        }
        .nav-btn.secondary {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        .loading { text-align: center; padding: 60px; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,255,136,0.2);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .unit-header h1 { font-size: 1.5rem; }
            .unit-content { padding: 20px; }
            .nav-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">MEI DRIVE <span>AFRICA</span></a>
            <a href="javascript:history.back()" class="back-btn">← Back to Course</a>
        </div>
    </nav>
    
    <div class="container" id="unitContent">
        <div class="loading"><div class="spinner"></div> Loading unit...</div>
    </div>

    <script>
        const supabase = window._supabase || window.getSupabase?.() || window.supabase;
        
        let unitData = null;
        let courseData = null;
        let currentUser = null;
        
        function getUnitId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id') ? parseInt(params.get('id')) : 1;
        }
        
        function getCourseId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('course_id') ? parseInt(params.get('course_id')) : 1;
        }
        
        async function loadUnit() {
            const unitId = getUnitId();
            const courseId = getCourseId();
            
            console.log('📖 Loading unit:', unitId);
            
            try {
                // Load unit data
                const { data: unit, error: unitError } = await supabase
                    .from('course_units')
                    .select('*')
                    .eq('id', unitId)
                    .single();
                
                if (unitError) throw unitError;
                unitData = unit;
                
                // Load course data
                const { data: course, error: courseError } = await supabase
                    .from('courses')
                    .select('*')
                    .eq('id', courseId)
                    .single();
                
                if (!courseError) courseData = course;
                
                renderPage();
            } catch (error) {
                console.error('Error loading unit:', error);
                document.getElementById('unitContent').innerHTML = `
                    <div class="error-message">
                        <h3>Error Loading Unit</h3>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #00ff88; border: none; border-radius: 8px; cursor: pointer;">Retry</button>
                    </div>
                `;
            }
        }
        
        async function markComplete() {
            const { data: { session } } = await supabase.auth.getSession();
            currentUser = session?.user;
            
            if (!currentUser) {
                alert('Please login to track your progress');
                window.location.href = '/';
                return;
            }
            
            try {
                await supabase
                    .from('user_progress')
                    .upsert({
                        user_id: currentUser.id,
                        course_id: getCourseId(),
                        unit_id: getUnitId(),
                        completed: true,
                        completed_at: new Date().toISOString()
                    });
                
                alert('✅ Unit marked as complete!');
                window.location.href = `course.html?id=${getCourseId()}`;
            } catch (error) {
                alert('Progress saved!');
                window.location.href = `course.html?id=${getCourseId()}`;
            }
        }
        
        function renderPage() {
            const container = document.getElementById('unitContent');
            
            if (!unitData) {
                container.innerHTML = `<div class="error-message"><h3>Unit not found</h3></div>`;
                return;
            }
            
            let contentHtml = unitData.content || `# ${unitData.title}\n\nContent coming soon...`;
            contentHtml = contentHtml
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/\n- (.*)/g, '\n<li>$1</li>')
                .replace(/<li>(.*)<\/li>/g, '<ul><li>$1</li></ul>')
                .replace(/<\/ul><ul>/g, '')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            
            container.innerHTML = `
                <div class="unit-header">
                    <div class="unit-number">Unit ${unitData.unit_number}</div>
                    <h1>${escapeHtml(unitData.title)}</h1>
                    <div class="unit-meta">
                        <span><i class="fas fa-clock"></i> ${unitData.duration || '1 hour'}</span>
                        <span><i class="fas fa-book"></i> ${courseData?.name || 'Course'}</span>
                    </div>
                </div>
                <div class="unit-content">${contentHtml}</div>
                <div class="nav-buttons">
                    <a href="javascript:history.back()" class="nav-btn secondary">← Back to Course</a>
                    <button class="nav-btn" onclick="markComplete()">✓ Mark as Complete & Continue</button>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.markComplete = markComplete;
        
        loadUnit();
    </script>
</body>
</html>
