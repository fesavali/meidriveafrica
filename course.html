<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course - MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: #0A192F;
            color: #fff;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0D2137; }
        ::-webkit-scrollbar-thumb { background: #00FF88; border-radius: 4px; }

        .navbar {
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(12px);
            padding: 16px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
        }
        .logo span { color: #00FF88; }

        .back-btn {
            background: rgba(0, 255, 136, 0.1);
            color: #00FF88;
            border: 1px solid #00FF88;
            padding: 10px 28px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
        }
        .back-btn:hover {
            background: #00FF88;
            color: #0A192F;
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-login, .btn-register {
            padding: 8px 24px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        .btn-login {
            background: transparent;
            border: 1.5px solid #00FF88;
            color: #00FF88;
        }

        .btn-login:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        .btn-register {
            background: #00FF88;
            color: #0A192F;
        }

        .btn-register:hover {
            background: #00cc6a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-email {
            color: #00FF88;
            font-size: 14px;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 1000px;
            margin: 100px auto 60px;
            padding: 0 20px;
        }

        .course-header {
            background: rgba(13, 33, 55, 0.8);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .course-title {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .course-title span { color: #00FF88; }

        .course-description {
            opacity: 0.8;
            line-height: 1.6;
        }

        .progress-container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin: 25px 0 10px;
        }
        .progress-bar {
            background: #00FF88;
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 13px;
            opacity: 0.6;
            text-align: right;
        }

        .units-list {
            display: grid;
            gap: 12px;
        }

        .unit-item {
            background: rgba(13, 33, 55, 0.6);
            border-radius: 12px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #00FF88;
        }
        .unit-item:hover {
            background: rgba(13, 33, 55, 0.9);
            transform: translateX(5px);
        }

        .unit-number {
            font-size: 12px;
            color: #00FF88;
            font-weight: 600;
        }
        .unit-title {
            font-size: 18px;
            margin-top: 5px;
        }

        .unit-content {
            background: rgba(13, 33, 55, 0.8);
            border-radius: 16px;
            padding: 30px;
            margin-top: 30px;
            border: 1px solid rgba(0, 255, 136, 0.15);
        }
        .unit-content h2 {
            color: #00FF88;
            margin-bottom: 20px;
        }
        .unit-content p {
            line-height: 1.8;
            opacity: 0.85;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .nav-btn {
            background: #00FF88;
            color: #0A192F;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.02);
            background: #00cc6a;
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,255,136,0.2);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: #0D2137;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #00FF88;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(10, 25, 47, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #00FF88;
        }

        .modal-content button {
            width: 100%;
            padding: 14px;
            background: #00FF88;
            color: #0A192F;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .modal-content button:hover { background: #00cc6a; }

        .modal-switch {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }

        .modal-switch span { color: #00FF88; }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            cursor: pointer;
            color: white;
        }

        .error-msg {
            color: #ff4444;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .success-msg {
            color: #00FF88;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container { margin-top: 140px; }
            .course-title { font-size: 24px; }
            .unit-content { padding: 20px; }
            .nav-buttons { flex-direction: column; gap: 12px; }
            .nav-btn { width: 100%; }
            .navbar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MEI DRIVE <span>AFRICA</span></div>
        <div id="authContainer" class="auth-buttons">
            <button class="btn-login" onclick="openModal('login')">Login</button>
            <button class="btn-register" onclick="openModal('register')">Register</button>
        </div>
        <a href="index.html" class="back-btn">← Back to Courses</a>
    </nav>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <div id="modalError" class="error-msg"></div>
            <div id="modalSuccess" class="success-msg"></div>
            <input type="email" id="modalEmail" placeholder="Email address">
            <input type="password" id="modalPassword" placeholder="Password">
            <button id="modalSubmitBtn" onclick="handleAuth()">Login</button>
            <div class="modal-switch" id="modalSwitch" onclick="switchAuthMode()">
                Don't have an account? <span>Register</span>
            </div>
        </div>
    </div>

    <div class="container" id="container">
        <div class="loading"><div class="spinner"></div>Loading course...</div>
    </div>

    <script>
        // ============================================
        // SINGLE SUPABASE INITIALIZATION
        // ============================================
        const SUPABASE_CONFIG = {
            url: 'https://qpqkmmkrzxlhcpccefjn.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s'
        };
        
        const supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
        
        // ============================================
        // AUTH STATE MANAGEMENT
        // ============================================
        let currentAuthMode = 'login';
        let currentUser = null;

        async function checkAuthState() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                updateAuthUI();
            }
        }

        function updateAuthUI() {
            const authContainer = document.getElementById('authContainer');
            if (currentUser) {
                authContainer.innerHTML = `
                    <div class="user-info">
                        <span class="user-email">${currentUser.email}</span>
                        <button class="btn-logout" onclick="logout()">Logout</button>
                    </div>
                    <a href="index.html" class="back-btn" style="margin-left:10px;">← Back to Courses</a>
                `;
            } else {
                authContainer.innerHTML = `
                    <button class="btn-login" onclick="openModal('login')">Login</button>
                    <button class="btn-register" onclick="openModal('register')">Register</button>
                    <a href="index.html" class="back-btn" style="margin-left:10px;">← Back to Courses</a>
                `;
            }
        }

        function openModal(mode) {
            currentAuthMode = mode;
            const modal = document.getElementById('authModal');
            const title = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('modalSubmitBtn');
            const switchText = document.getElementById('modalSwitch');
            const errorDiv = document.getElementById('modalError');
            const successDiv = document.getElementById('modalSuccess');
            
            errorDiv.textContent = '';
            successDiv.textContent = '';
            document.getElementById('modalEmail').value = '';
            document.getElementById('modalPassword').value = '';
            
            if (mode === 'login') {
                title.textContent = 'Login';
                submitBtn.textContent = 'Login';
                switchText.innerHTML = `Don't have an account? <span>Register</span>`;
            } else {
                title.textContent = 'Register';
                submitBtn.textContent = 'Register';
                switchText.innerHTML = `Already have an account? <span>Login</span>`;
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('authModal').classList.remove('active');
        }

        function switchAuthMode() {
            if (currentAuthMode === 'login') {
                openModal('register');
            } else {
                openModal('login');
            }
        }

        async function handleAuth() {
            const email = document.getElementById('modalEmail').value;
            const password = document.getElementById('modalPassword').value;
            const errorDiv = document.getElementById('modalError');
            const successDiv = document.getElementById('modalSuccess');
            
            errorDiv.textContent = '';
            successDiv.textContent = '';
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter both email and password';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            try {
                if (currentAuthMode === 'login') {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    
                    if (error) throw error;
                    
                    successDiv.textContent = 'Login successful! Redirecting...';
                    currentUser = data.user;
                    updateAuthUI();
                    setTimeout(() => {
                        closeModal();
                        window.location.reload();
                    }, 1500);
                } else {
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password
                    });
                    
                    if (error) throw error;
                    
                    successDiv.textContent = 'Registration successful! You can now login.';
                    setTimeout(() => {
                        openModal('login');
                    }, 2000);
                }
            } catch (error) {
                errorDiv.textContent = error.message;
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            currentUser = null;
            updateAuthUI();
            window.location.reload();
        }

        // ============================================
        // COURSE DATA LOADING
        // ============================================
        let currentCourse = null;
        let currentUnits = [];
        let currentIndex = 0;

        async function loadCourse() {
            const storedCourse = sessionStorage.getItem('currentCourse');
            const storedUnits = sessionStorage.getItem('currentUnits');
            
            if (storedCourse && storedUnits) {
                currentCourse = JSON.parse(storedCourse);
                currentUnits = JSON.parse(storedUnits);
                renderCourse();
                return;
            }
            
            const courseTitle = sessionStorage.getItem('selectedCourse');
            if (!courseTitle) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const { data: course, error: cErr } = await supabase
                    .from('courses')
                    .select('*')
                    .eq('title', courseTitle)
                    .single();
                
                if (cErr) throw cErr;
                currentCourse = course;
                
                const { data: units, error: uErr } = await supabase
                    .from('units')
                    .select('*')
                    .eq('course_id', course.id)
                    .order('unit_number');
                
                if (uErr) throw uErr;
                currentUnits = units || [];
                
                renderCourse();
                
            } catch (err) {
                console.error('Error:', err);
                document.getElementById('container').innerHTML = `
                    <div class="loading">Error loading course. <a href="index.html" style="color:#00FF88">Go back</a></div>
                `;
            }
        }
        
        function renderCourse() {
            const container = document.getElementById('container');
            container.innerHTML = `
                <div class="course-header">
                    <h1 class="course-title"><span>${currentCourse.title}</span></h1>
                    <p class="course-description">${currentCourse.description}</p>
                    <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
                    <div class="progress-text" id="progressText">0% Complete</div>
                </div>
                <div class="units-list" id="unitsList">
                    ${currentUnits.map(unit => `
                        <div class="unit-item" onclick="loadUnit(${unit.unit_number - 1})">
                            <div class="unit-number">UNIT ${unit.unit_number}</div>
                            <div class="unit-title">${unit.title}</div>
                        </div>
                    `).join('')}
                </div>
                <div id="unitContent"></div>
            `;
        }
        
        function loadUnit(index) {
            currentIndex = index;
            const unit = currentUnits[index];
            if (!unit) return;
            
            const contentDiv = document.getElementById('unitContent');
            contentDiv.innerHTML = `
                <div class="unit-content">
                    <h2>Unit ${unit.unit_number}: ${unit.title}</h2>
                    <p>${unit.content || 'Content coming soon. Please check back later.'}</p>
                    <div class="nav-buttons">
                        <button class="nav-btn" onclick="prevUnit()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                        <button class="nav-btn" onclick="nextUnit()" ${index === currentUnits.length - 1 ? 'disabled' : ''}>Next →</button>
                    </div>
                </div>
            `;
            
            const progress = ((index + 1) / currentUnits.length) * 100;
            const bar = document.getElementById('progressBar');
            const text = document.getElementById('progressText');
            if (bar) bar.style.width = `${progress}%`;
            if (text) text.innerText = `${Math.round(progress)}% Complete`;
            
            contentDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function prevUnit() { if (currentIndex > 0) loadUnit(currentIndex - 1); }
        function nextUnit() {
            if (currentIndex < currentUnits.length - 1) {
                loadUnit(currentIndex + 1);
            } else {
                alert('🎉 Congratulations! You have completed the course!');
            }
        }

        window.onclick = function(event) {
            const modal = document.getElementById('authModal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        checkAuthState();
        loadCourse();
    </script>
</body>
</html>
