<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course - MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .logo span {
            color: #00ff88;
        }

        .back-btn {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #00ff88;
            color: #0a0a0a;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .course-header {
            background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(0,255,136,0) 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(0,255,136,0.2);
        }

        .course-title {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .course-title span {
            color: #00ff88;
        }

        .course-description {
            opacity: 0.9;
            line-height: 1.6;
        }

        .progress-container {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 8px;
            margin: 25px 0 10px;
        }

        .progress-bar {
            background: #00ff88;
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 14px;
            opacity: 0.7;
            text-align: right;
        }

        .units-list {
            display: grid;
            gap: 12px;
        }

        .unit-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #00ff88;
        }

        .unit-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .unit-number {
            font-size: 12px;
            color: #00ff88;
            font-weight: 600;
        }

        .unit-title {
            font-size: 18px;
            margin-top: 5px;
        }

        .unit-content {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-top: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .unit-content h2 {
            color: #00ff88;
            margin-bottom: 20px;
        }

        .unit-content p {
            line-height: 1.8;
            opacity: 0.9;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .nav-btn {
            background: #00ff88;
            color: #0a0a0a;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,255,136,0.3);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .course-title {
                font-size: 24px;
            }
            
            .unit-content {
                padding: 20px;
            }
            
            .nav-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            .nav-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MEI DRIVE <span>AFRICA</span></div>
        <a href="index.html" class="back-btn">← Back to Courses</a>
    </nav>

    <div class="container" id="container">
        <div class="loading">
            <div class="spinner"></div>
            Loading course...
        </div>
    </div>

    <script>
        const SUPABASE_CONFIG = {
            url: 'https://qpqkmmkrzxlhcpccefjn.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s'
        };
        
        const supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
        
        let currentCourse = null;
        let currentUnits = [];
        let currentIndex = 0;

        async function loadCourse() {
            // Try to get from session storage first
            const storedCourse = sessionStorage.getItem('currentCourse');
            const storedUnits = sessionStorage.getItem('currentUnits');
            
            if (storedCourse && storedUnits) {
                currentCourse = JSON.parse(storedCourse);
                currentUnits = JSON.parse(storedUnits);
                renderCourse();
                return;
            }
            
            // Fallback: load from Supabase
            const courseTitle = sessionStorage.getItem('selectedCourse');
            if (!courseTitle) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const { data: course, error: courseError } = await supabase
                    .from('courses')
                    .select('*')
                    .eq('title', courseTitle)
                    .single();
                
                if (courseError) throw courseError;
                currentCourse = course;
                
                const { data: units, error: unitsError } = await supabase
                    .from('units')
                    .select('*')
                    .eq('course_id', course.id)
                    .order('unit_number');
                
                if (unitsError) throw unitsError;
                currentUnits = units || [];
                
                renderCourse();
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('container').innerHTML = `
                    <div class="loading">Error loading course. <a href="index.html" style="color:#00ff88">Go back</a></div>
                `;
            }
        }
        
        function renderCourse() {
            const container = document.getElementById('container');
            
            container.innerHTML = `
                <div class="course-header">
                    <h1 class="course-title"><span>${currentCourse.title}</span></h1>
                    <p class="course-description">${currentCourse.description}</p>
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="progress-text" id="progressText">0% Complete</div>
                </div>
                <div class="units-list" id="unitsList">
                    ${currentUnits.map(unit => `
                        <div class="unit-item" onclick="loadUnit(${unit.unit_number - 1})">
                            <div class="unit-number">UNIT ${unit.unit_number}</div>
                            <div class="unit-title">${unit.title}</div>
                        </div>
                    `).join('')}
                </div>
                <div id="unitContent"></div>
            `;
        }
        
        function loadUnit(index) {
            currentIndex = index;
            const unit = currentUnits[index];
            
            if (!unit) return;
            
            const unitContent = document.getElementById('unitContent');
            unitContent.innerHTML = `
                <div class="unit-content">
                    <h2>Unit ${unit.unit_number}: ${unit.title}</h2>
                    <p>${unit.content || 'Content coming soon. Please check back later for complete material.'}</p>
                    <div class="nav-buttons">
                        <button class="nav-btn" onclick="previousUnit()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                        <button class="nav-btn" onclick="nextUnit()" ${index === currentUnits.length - 1 ? 'disabled' : ''}>Next →</button>
                    </div>
                </div>
            `;
            
            const progress = ((index + 1) / currentUnits.length) * 100;
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            if (progressBar) progressBar.style.width = `${progress}%`;
            if (progressText) progressText.textContent = `${Math.round(progress)}% Complete`;
            
            unitContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function previousUnit() {
            if (currentIndex > 0) loadUnit(currentIndex - 1);
        }
        
        function nextUnit() {
            if (currentIndex < currentUnits.length - 1) {
                loadUnit(currentIndex + 1);
            } else {
                alert('🎉 Congratulations! You have completed the course! 🎉');
            }
        }
        
        loadCourse();
    </script>
</body>
</html>
