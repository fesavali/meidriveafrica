<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #ffffff;
        }
        .navbar {
            background: #1a1f3a;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
            cursor: pointer;
            text-decoration: none;
        }
        .logo span { color: white; }
        .back-btn {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .course-header {
            background: linear-gradient(135deg, #1a1f3a, #0a0e27);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
            margin-bottom: 30px;
        }
        .course-header h1 { color: #00ff88; margin-bottom: 10px; }
        .course-header p { color: #a0a0c0; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #1a1f3a;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.1);
        }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: #00ff88; }
        .stat-label { color: #a0a0c0; margin-top: 5px; }
        .progress-section {
            background: #1a1f3a;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .progress-bar-container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .unit-card {
            background: #1a1f3a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 136, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }
        .unit-card:hover {
            transform: translateY(-3px);
            border-color: #00ff88;
        }
        .unit-number { color: #00ff88; font-size: 0.8rem; margin-bottom: 5px; }
        .unit-title { font-size: 1.1rem; margin-bottom: 10px; }
        .unit-status { font-size: 0.75rem; color: #a0a0c0; margin-top: 10px; }
        .unit-status.completed { color: #00ff88; }
        .loading { text-align: center; padding: 60px; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,255,136,0.2);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #a0a0c0;
            font-size: 0.8rem;
            border-top: 1px solid rgba(0,255,136,0.1);
            margin-top: 40px;
        }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .units-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">MEI DRIVE <span>AFRICA</span></a>
            <a href="/" class="back-btn">← All Courses</a>
        </div>
    </nav>
    
    <div class="container" id="courseContent">
        <div class="loading"><div class="spinner"></div> Loading course...</div>
    </div>
    
    <div class="footer">
        <p>© 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training</p>
    </div>

    <script>
        // ✅ CORRECT - Use existing Supabase instance (NO createClient!)
        const supabase = window._supabase || window.getSupabase?.() || window.supabase;
        
        if (!supabase) {
            console.error('❌ Supabase not loaded!');
            document.getElementById('courseContent').innerHTML = '<div class="error-message"><h3>Error loading database</h3><p>Please refresh the page.</p></div>';
        } else {
            console.log('✅ Supabase ready in course.html');
        }
        
        let currentUser = null;
        let courseData = null;
        let courseUnits = [];
        let completedUnitIds = new Set();
        let userEnrollments = new Set();
        
        function getCourseId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id') ? parseInt(params.get('id')) : 1;
        }
        
        async function loadCourse() {
            const courseId = getCourseId();
            console.log('📚 Loading course ID:', courseId);
            
            try {
                const { data, error } = await supabase
                    .from('courses')
                    .select('*')
                    .eq('id', courseId)
                    .single();
                
                if (error) throw error;
                
                courseData = data;
                console.log('✅ Course loaded:', courseData.name);
                return courseData;
            } catch (error) {
                console.error('Error loading course:', error);
                document.getElementById('courseContent').innerHTML = `
                    <div class="error-message">
                        <h3>Error Loading Course</h3>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #00ff88; border: none; border-radius: 8px; cursor: pointer;">Retry</button>
                    </div>
                `;
                return null;
            }
        }
        
        async function loadUnits(courseId) {
            console.log('📖 Loading units for course:', courseId);
            
            try {
                const { data, error } = await supabase
                    .from('course_units')
                    .select('*')
                    .eq('course_id', courseId)
                    .order('unit_number', { ascending: true });
                
                if (error) throw error;
                
                courseUnits = data || [];
                console.log(`✅ Loaded ${courseUnits.length} units`);
                return courseUnits;
            } catch (error) {
                console.error('Error loading units:', error);
                courseUnits = [];
                return [];
            }
        }
        
        async function checkUser() {
            const { data: { session } } = await supabase.auth.getSession();
            currentUser = session?.user || null;
            console.log('User logged in:', currentUser?.email || 'No user');
            return currentUser;
        }
        
        async function loadUserProgress(courseId) {
            if (!currentUser) {
                console.log('No user logged in');
                return;
            }
            
            try {
                const { data, error } = await supabase
                    .from('user_progress')
                    .select('unit_id, completed')
                    .eq('user_id', currentUser.id)
                    .eq('course_id', courseId)
                    .eq('completed', true);
                
                if (error) throw error;
                
                completedUnitIds.clear();
                if (data) {
                    data.forEach(p => completedUnitIds.add(p.unit_id));
                }
                console.log(`✅ Loaded ${completedUnitIds.size} completed units`);
            } catch (error) {
                console.error('Error loading progress:', error);
                const saved = localStorage.getItem(`course_${courseId}_progress`);
                if (saved) {
                    const arr = JSON.parse(saved);
                    completedUnitIds.clear();
                    arr.forEach(id => completedUnitIds.add(id));
                }
            }
        }
        
        async function loadEnrollments() {
            if (!currentUser) return;
            
            try {
                const { data, error } = await supabase
                    .from('enrollments')
                    .select('course_id')
                    .eq('user_id', currentUser.id);
                
                if (error) throw error;
                
                userEnrollments.clear();
                if (data) {
                    data.forEach(e => userEnrollments.add(e.course_id));
                }
            } catch (error) {
                console.error('Error loading enrollments:', error);
            }
        }
        
        async function enrollInCourse() {
            if (!currentUser) {
                alert('Please login to enroll in this course');
                window.location.href = '/';
                return;
            }
            
            if (userEnrollments.has(courseData.id)) {
                alert('You are already enrolled in this course!');
                return;
            }
            
            try {
                const { error } = await supabase
                    .from('enrollments')
                    .insert([{
                        user_id: currentUser.id,
                        course_id: courseData.id,
                        progress: 0,
                        status: 'active'
                    }]);
                
                if (error) throw error;
                
                userEnrollments.add(courseData.id);
                alert('Successfully enrolled!');
                renderPage();
            } catch (error) {
                console.error('Enrollment error:', error);
                alert('Error enrolling: ' + error.message);
            }
        }
        
        async function toggleUnit(unitId, completed) {
            if (!currentUser) {
                alert('Please login to track your progress');
                window.location.href = '/';
                return;
            }
            
            try {
                if (completed) {
                    await supabase
                        .from('user_progress')
                        .upsert({
                            user_id: currentUser.id,
                            course_id: courseData.id,
                            unit_id: unitId,
                            completed: true,
                            completed_at: new Date().toISOString()
                        });
                    completedUnitIds.add(unitId);
                } else {
                    await supabase
                        .from('user_progress')
                        .delete()
                        .eq('user_id', currentUser.id)
                        .eq('course_id', courseData.id)
                        .eq('unit_id', unitId);
                    completedUnitIds.delete(unitId);
                }
                
                const progress = Math.round((completedUnitIds.size / courseUnits.length) * 100);
                await supabase
                    .from('enrollments')
                    .update({ progress: progress, last_accessed: new Date().toISOString() })
                    .eq('user_id', currentUser.id)
                    .eq('course_id', courseData.id);
                
                renderPage();
            } catch (error) {
                console.error('Error updating progress:', error);
                if (completed) {
                    completedUnitIds.add(unitId);
                } else {
                    completedUnitIds.delete(unitId);
                }
                localStorage.setItem(`course_${courseData.id}_progress`, JSON.stringify(Array.from(completedUnitIds)));
                renderPage();
            }
        }
        
        function viewUnit(unitId) {
            window.location.href = `unit.html?id=${unitId}&course_id=${courseData.id}`;
        }
        
        function calculateProgress() {
            if (!courseUnits.length) return 0;
            return Math.round((completedUnitIds.size / courseUnits.length) * 100);
        }
        
        function renderPage() {
            const container = document.getElementById('courseContent');
            
            if (!courseData) {
                container.innerHTML = `<div class="error-message"><h3>Course not found</h3></div>`;
                return;
            }
            
            const progress = calculateProgress();
            const completedCount = completedUnitIds.size;
            const isEnrolled = userEnrollments.has(courseData.id);
            
            container.innerHTML = `
                <div class
