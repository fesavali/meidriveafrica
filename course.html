<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course - MEI Drive Africa</title>
    
    <!-- Cache Prevention -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #ffffff;
        }
        
        .navbar {
            background: #1a1f3a;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
            cursor: pointer;
            text-decoration: none;
        }
        
        .logo span { color: white; }
        
        .back-btn {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: #00ff88;
            color: #0a0e27;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #00ff88;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0e27;
            font-weight: bold;
            cursor: pointer;
        }
        
        .login-btn {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .course-header {
            background: linear-gradient(135deg, #1a1f3a, #0a0e27);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
            margin-bottom: 30px;
        }
        
        .course-header h1 {
            color: #00ff88;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .course-header p {
            color: #a0a0c0;
            font-size: 1rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: #1a1f3a;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.1);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: #00ff88;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff88;
        }
        
        .stat-label {
            color: #a0a0c0;
            margin-top: 5px;
        }
        
        .progress-section {
            background: #1a1f3a;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .progress-bar-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }
        
        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .unit-card {
            background: #1a1f3a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 136, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .unit-card:hover {
            transform: translateY(-3px);
            border-color: #00ff88;
        }
        
        .unit-number {
            color: #00ff88;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        
        .unit-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        
        .unit-status {
            font-size: 0.75rem;
            color: #a0a0c0;
            margin-top: 10px;
        }
        
        .unit-status.completed {
            color: #00ff88;
        }
        
        .unit-status i {
            margin-right: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 136, 0.2);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }
        
        .footer {
            text-align: center;
            padding: 30px;
            color: #a0a0c0;
            font-size: 0.8rem;
            border-top: 1px solid rgba(0, 255, 136, 0.1);
            margin-top: 40px;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .units-grid {
                grid-template-columns: 1fr;
            }
            .course-header h1 {
                font-size: 1.5rem;
            }
            .nav-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">MEI DRIVE <span>AFRICA</span></a>
            <div style="display: flex; gap: 15px; align-items: center;">
                <a href="/" class="back-btn">← All Courses</a>
                <div id="userSection">
                    <div class="user-avatar" id="userAvatar" style="display: none;" onclick="goToDashboard()">👤</div>
                    <button class="login-btn" id="loginBtn" onclick="showLogin()">Login</button>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container" id="courseContent">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading course content...</p>
        </div>
    </div>
    
    <div class="footer">
        <p>© 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training | Instructor: ILR-7WA1P62</p>
    </div>

    <script>
        // Get Supabase instance
        const supabase = window._supabase || window.getSupabase?.() || window.supabase;
        
        let currentUser = null;
        let courseData = null;
        let courseUnits = [];
        let completedUnits = new Set();
        
        // Get course ID from URL
        function getCourseId() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            return id ? parseInt(id) : 1;
        }
        
        // Load course from Supabase
        async function loadCourse() {
            const courseId = getCourseId();
            console.log('📚 Loading course ID:', courseId);
            
            try {
                const { data, error } = await supabase
                    .from('courses')
                    .select('*')
                    .eq('id', courseId)
                    .single();
                
                if (error) throw error;
                
                courseData = data;
                console.log('✅ Course loaded:', courseData.name);
                return courseData;
            } catch (error) {
                console.error('Error loading course:', error);
                // Return mock course data
                return getMockCourse(courseId);
            }
        }
        
        // Mock course data
        function getMockCourse(courseId) {
            const courses = {
                1: { id: 1, name: 'Learner Hub - Complete Driver Training', description: 'NTSA-approved curriculum from basics to road readiness. Covers traffic rules, vehicle controls, defensive driving, and exam preparation.', icon: '🚗', duration: '40 hours', level: 'Beginner', total_units: 21 },
                2: { id: 2, name: 'Boda Boda Professional Course', description: 'Professional motorcycle taxi training including safety, customer service, and defensive riding techniques.', icon: '🏍️', duration: '20 hours', level: 'Beginner', total_units: 15 },
                3: { id: 3, name: 'Defensive Driving Course', description: 'Master advanced driving techniques, hazard perception, and accident avoidance strategies.', icon: '🛡️', duration: '16 hours', level: 'Advanced', total_units: 12 },
                4: { id: 4, name: 'Professional Driver Course', description: 'Comprehensive training for PSV, logistics, and commercial drivers.', icon: '🚛', duration: '32 hours', level: 'Professional', total_units: 20 },
                5: { id: 5, name: 'Electric Vehicle Course', description: 'Master EV technology, charging systems, and battery maintenance.', icon: '⚡', duration: '12 hours', level: 'Intermediate', total_units: 10 },
                6: { id: 6, name: 'School Transport Safety', description: 'Specialized certification for school bus drivers.', icon: '🚸', duration: '24 hours', level: 'Professional', total_units: 8 },
                7: { id: 7, name: 'E-Safety Library', description: 'Digital safety for drivers - online records management and cybersecurity.', icon: '💻', duration: 'Self-paced', level: 'All Levels', total_units: 6 },
                8: { id: 8, name: 'Quiz Bank - Exam Preparation', description: '1000+ NTSA practice questions for driving theory test.', icon: '📝', duration: 'Self-paced', level: 'All Levels', total_units: 10 }
            };
            return courses[courseId] || courses[1];
        }
        
        // Load units for this course
        async function loadUnits(courseId) {
            console.log('📖 Loading units for course:', courseId);
            
            try {
                const { data, error } = await supabase
                    .from('course_units')
                    .select('*')
                    .eq('course_id', courseId)
                    .order('unit_number');
                
                if (error) throw error;
                
                if (data && data.length > 0) {
                    courseUnits = data;
                } else {
                    courseUnits = generateMockUnits(courseId);
                }
                
                console.log(`✅ Loaded ${courseUnits.length} units`);
                return courseUnits;
            } catch (error) {
                console.log('Using mock units');
                courseUnits = generateMockUnits(courseId);
                return courseUnits;
            }
        }
        
        // Generate mock units
        function generateMockUnits(courseId) {
            const totalUnits = courseData?.total_units || 12;
            const units = [];
            const titles = [
                'Introduction to Driving',
                'Vehicle Controls & Operation',
                'Safety Procedures & Gear',
                'Traffic Rules & Regulations',
                'Defensive Driving Techniques',
                'Emergency Handling',
                'Parking & Maneuvering',
                'Highway Driving',
                'Night & Weather Driving',
                'Passenger Safety',
                'Vehicle Maintenance',
                'Final Assessment & Certification'
            ];
            
            for (let i = 1; i <= totalUnits; i++) {
                units.push({
                    id: i,
                    course_id: courseId,
                    unit_number: i,
                    title: titles[i - 1] || `Unit ${i}: Learning Module`,
                    description: `Learn essential skills for unit ${i} of this course.`,
                    duration: '1-2 hours',
                    content: `# Unit ${i}: ${titles[i - 1] || 'Learning Module'}\n\nDetailed content for this unit will be available soon.`
                });
            }
            return units;
        }
        
        // Load user's progress
        async function loadUserProgress(courseId) {
            const { data: { session } } = await supabase.auth.getSession();
            currentUser = session?.user || null;
            
            // Update UI based on login status
            const userAvatar = document.getElementById('userAvatar');
            const loginBtn = document.getElementById('loginBtn');
            
            if (currentUser) {
                userAvatar.style.display = 'flex';
                loginBtn.style.display = 'none';
                const name = currentUser.email.split('@')[0];
                userAvatar.textContent = name.charAt(0).toUpperCase();
            } else {
                userAvatar.style.display = 'none';
                loginBtn.style.display = 'block';
            }
            
            if (!currentUser) {
                console.log('No user logged in');
                return;
            }
            
            try {
                const { data, error } = await supabase
                    .from('user_progress')
                    .select('unit_id')
                    .eq('user_id', currentUser.id)
                    .eq('course_id', courseId)
                    .eq('completed', true);
                
                if (!error && data) {
                    completedUnits.clear();
                    data.forEach(p => completedUnits.add(p.unit_id));
                }
            } catch (error) {
                // Load from localStorage as fallback
                const saved = localStorage.getItem(`course_${courseId}_completed`);
                if (saved) {
                    const arr = JSON.parse(saved);
                    completedUnits.clear();
                    arr.forEach(id => completedUnits.add(id));
                }
            }
        }
        
        // Calculate progress percentage
        function calculateProgress() {
            if (!courseUnits.length) return 0;
            return Math.round((completedUnits.size / courseUnits.length) * 100);
        }
        
        // Save progress
        async function saveProgress(unitId, completed) {
            if (!currentUser) return;
            
            try {
                if (completed) {
                    await supabase.from('user_progress').upsert({
                        user_id: currentUser.id,
                        course_id: courseData.id,
                        unit_id: unitId,
                        completed: true,
                        completed_at: new Date()
                    });
                } else {
                    await supabase.from('user_progress')
                        .delete()
                        .eq('user_id', currentUser.id)
                        .eq('course_id', courseData.id)
                        .eq('unit_id', unitId);
                }
            } catch (error) {
                // Save to localStorage as fallback
                localStorage.setItem(`course_${courseData.id}_completed`, JSON.stringify(Array.from(completedUnits)));
            }
        }
        
        // Toggle unit completion
        window.toggleUnit = async (unitId) => {
            if (!currentUser) {
                alert('Please login to track your progress');
                window.location.href = '/';
                return;
            }
            
            if (completedUnits.has(unitId)) {
                completedUnits.delete(unitId);
                await saveProgress(unitId, false);
            } else {
                completedUnits.add(unitId);
                await saveProgress(unitId, true);
            }
            
            renderPage();
        };
        
        // View unit details
        window.viewUnit = (unitId) => {
            window.location.href = `unit.html?id=${unitId}&course_id=${courseData.id}`;
        };
        
        function goToDashboard() {
            window.location.href = '/';
        }
        
        function showLogin() {
            window.location.href = '/';
        }
        
        // Render the page
        function renderPage() {
            const container = document.getElementById('courseContent');
            
            if (!courseData) {
                container.innerHTML = `<div class="error-message"><h3>Course not found</h3><p>Please go back and try again.</p><a href="/" style="color: #00ff88;">← Back to Courses</a></div>`;
                return;
            }
            
            const progress = calculateProgress();
            const completedCount = completedUnits.size;
            
            container.innerHTML = `
                <div class="course-header">
                    <div style="font-size: 4rem;">${courseData.icon || '📚'}</div>
                    <h1>${escapeHtml(courseData.name)}</h1>
                    <p>${escapeHtml(courseData.description || 'NTSA-approved curriculum - from basics to road readiness')}</p>
                    <div style="margin-top: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                        <span><i class="fas fa-clock"></i> ${courseData.duration || 'Self-paced'}</span>
                        <span><i class="fas fa-signal"></i> ${courseData.level || 'Beginner'}</span>
                        <span><i class="fas fa-layer-group"></i> ${courseUnits.length} units</span>
                    </div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number">${courseUnits.length}</div>
                        <div class="stat-label">Total Units</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${completedCount}</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${progress}%</div>
                        <div class="stat-label">Progress</div>
                    </div>
                </div>
                
                <div class="progress-section">
                    <h3><i class="fas fa-chart-line"></i> Your Learning Journey Progress</h3>
                    <div class="progress-bar-container">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                    <p style="text-align: center; color: #a0a0c0; margin-top: 10px;">
                        ${progress}% Complete (${completedCount}/${courseUnits.length} units)
                    </p>
                </div>
                
                <h3><i class="fas fa-book-open"></i> Course Units</h3>
                <div class="units-grid">
                    ${courseUnits.map(unit => `
                        <div class="unit-card" onclick="viewUnit(${unit.id})">
                            <div class="unit-number">Unit ${unit.unit_number}</div>
                            <div class="unit-title">${escapeHtml(unit.title)}</div>
                            <div class="unit-status ${completedUnits.has(unit.id) ? 'completed' : ''}">
                                ${completedUnits.has(unit.id) ? '<i class="fas fa-check-circle"></i> Completed' : '<i class="fas fa-circle-notch"></i> Not started'}
                            </div>
                            <div style="margin-top: 10px; font-size: 0.7rem; color: #a0a0c0;">
                                <i class="fas fa-clock"></i> ${unit.duration || '1 hour'}
                            </div>
                            <button class="btn-complete" onclick="event.stopPropagation(); toggleUnit(${unit.id})" style="margin-top: 10px; padding: 5px 10px; background: ${completedUnits.has(unit.id) ? '#ff4444' : '#00ff88'}; border: none; border-radius: 5px; cursor: pointer; color: ${completedUnits.has(unit.id) ? 'white' : '#0a0e27'}; font-size: 0.7rem;">
                                ${completedUnits.has(unit.id) ? 'Mark Incomplete' : 'Mark Complete'}
                            </button>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Initialize the page
        async function init() {
            console.log('🚀 Initializing course page...');
            
            await loadCourse();
            await loadUnits(courseData?.id || getCourseId());
            await loadUserProgress(courseData?.id || getCourseId());
            renderPage();
        }
        
        // Make functions global
        window.goToDashboard = goToDashboard;
        window.showLogin = showLogin;
        window.toggleUnit = toggleUnit;
        window.viewUnit = viewUnit;
        
        init();
    </script>
</body>
</html>
